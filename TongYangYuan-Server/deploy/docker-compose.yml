version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: tongyangyuan-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: TongYuan@2026
      MYSQL_DATABASE: mental_health_db
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - tongyuan-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pTongYuan@2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: tongyangyuan-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes --requirepass Redis@2026
    networks:
      - tongyuan-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis@2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiveKit 视频服务
  livekit:
    image: livekit/livekit-server:latest
    container_name: tongyangyuan-livekit
    restart: always
    ports:
      - "7880:7880"      # HTTP API
      - "7881:7881"      # WebSocket
      - "7882:7882/udp"  # UDP 媒体
    volumes:
      - ./livekit/config.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    networks:
      - tongyuan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7880/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenIM 即时通讯服务
  openim:
    image: ghcr.io/openimsdk/open-im-server:latest
    container_name: tongyangyuan-openim
    restart: always
    ports:
      - "10001:10001"    # WebSocket
      - "10002:10002"    # HTTP API
    volumes:
      - ./openim/config:/etc/openim-server/config
    environment:
      - TZ=Asia/Shanghai
    networks:
      - tongyuan-net
    depends_on:
      - mysql
      - redis

  # 后端 Spring Boot 应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tongyangyuan-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    networks:
      - tongyuan-net

  # 前端 Nginx
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tongyangyuan-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - tongyuan-net

networks:
  tongyuan-net:
    driver: bridge
