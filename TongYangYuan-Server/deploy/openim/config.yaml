# OpenIM Server 配置
# 完整配置 - 所有依赖指向 Docker 内部网络容器名

api:
  openImApiPort: [10002]
  openImApiUrl: http://0.0.0.0:10002

ws:
  openImWsPort: [10001]

# 用户注册配置
user:
  Nickname: "系统管理员"
  FaceUrl: "http://106.120.183.117/uploads/avatar.jpg"

# 认证配置
auth:
  openImAdminUserID: [openIMAdmin]
  openImAdminSecret: openIMAdmin@2026

# 数据库配置 - OpenIM 使用 MongoDB 作为主存储
# MySQL 暂不使用（业务数据走 Spring Boot + Windows MySQL）
db:
  mongoDB:
    Uri: mongodb://openIM:openIM123@tongyuan-mongodb:27017/openim_v3?authSource=admin

# Redis 配置
redis:
  openImRedis:
    Username: ""
    Password: Redis@2026
    Address:
      - tongyuan-redis:6379

# 日志配置
log:
  StorageLocation: /tmp/openim
  MaxSize: 10000
