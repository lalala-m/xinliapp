# OpenIM Server 配置
# 完整配置 - MySQL/Redis/MongoDB 指向 Windows 主机

api:
  openImApiPort: [10002]
  
ws:
  openImWsPort: [10001]

# 用户注册配置
user:
  Nickname: "系统管理员"
  FaceUrl: "http://106.120.183.117/uploads/avatar.jpg"

# 认证配置  
auth:
  openImAdminUserID: [openIMAdmin]
  openImAdminSecret: OpenIMAdmin@2026

# MySQL 配置（使用 host.docker.internal 访问 Windows 主机）
db:
  mongoDB:
    Uri: mongodb://openIM:openIM123@host.docker.internal:27017/openim_v3?authSource=openim_v3
  mysql:
    openImMysql:
      DB: openim_v2
      Tables:
        - conversation
        - friend_request
        - black
        - user
      Address:
        - host.docker.internal:3306
      Username: root
      Password: 123456

# Redis 配置（Windows 主机 Redis 在 6379）
redis:
  openImRedis:
    Username: ""
    Password: Redis@2026
    Address:
      - host.docker.internal:6379

# 日志配置
log:
  StorageLocation: /tmp/openim
  MaxSize: 10000
