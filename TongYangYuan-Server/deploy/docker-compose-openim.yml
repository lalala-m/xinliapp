services:
  # =========================================
  # OpenIM Server - 即时通讯核心服务
  # =========================================
  openim-server:
    image: ghcr.io/openimsdk/openim-server:latest
    container_name: tongyangyuan-openim
    restart: always
    ports:
      - "10001:10001"
      - "10002:10002"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./openim/config/config.yaml:/openim-server/config/config.yaml
      - ./openim/config/discovery.yml:/openim-server/config/discovery.yml
      - ./openim/config/redis.yml:/openim-server/config/redis.yml
      - ./openim/config/mongodb.yml:/openim-server/config/mongodb.yml
      - ./openim/config/kafka.yml:/openim-server/config/kafka.yml
      - ./openim/config/minio.yml:/openim-server/config/minio.yml
    depends_on:
      - mongodb
      - redis
      - kafka
      - minio
      - etcd
    networks:
      - tongyuan-openim-net

  # =========================================
  # MongoDB - OpenIM 消息存储
  # =========================================
  mongodb:
    image: mongo:7.0
    container_name: tongyuan-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: openIM
      MONGO_INITDB_ROOT_PASSWORD: openIM123
      MONGO_INITDB_DATABASE: openim_v3
    volumes:
      - ./mongodb/data:/data/db
    networks:
      - tongyuan-openim-net

  # =========================================
  # Redis - OpenIM 缓存 + 聊天消息队列
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: tongyuan-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: >
      redis-server
      --requirepass Redis@2026
      --appendonly yes
      --appendfilename "appendonly.aof"
      --save ""
    networks:
      - tongyuan-openim-net

  # =========================================
  # Kafka - OpenIM 消息队列
  # =========================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: tongyuan-kafka
    restart: always
    ports:
      - "19092:9092"
      - "19094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://tongyuan-kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@tongyuan-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - ./kafka/data:/var/lib/kafka/data
    networks:
      - tongyuan-openim-net

  # =========================================
  # etcd - OpenIM 服务发现
  # =========================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: tongyuan-etcd
    restart: always
    ports:
      - "12379:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    volumes:
      - ./etcd/data:/opt/bitnami/etcd/data
    networks:
      - tongyuan-openim-net

  # =========================================
  # MinIO - OpenIM 文件存储（头像、文件等）
  # =========================================
  minio:
    image: minio/minio:latest
    container_name: tongyuan-minio
    restart: always
    ports:
      - "10005:9000"
      - "10006:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: openIM123
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    networks:
      - tongyuan-openim-net

networks:
  tongyuan-openim-net:
    name: tongyuan-openim-net
    driver: bridge
