# 应用配置
spring.application.name=tongyangyuan-mental-health-server

# 服务器配置
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api

# 数据库配置（Docker部署时使用服务名）
spring.datasource.url=jdbc:mysql://mysql:3306/mental_health_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=TongYuan@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis配置（Docker部署时使用服务名）
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=Redis@2026
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT配置
jwt.secret=TongYangYuanMentalHealthSecretKey2026VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# WebSocket配置
websocket.allowed-origins=*

# 日志配置
logging.level.root=INFO
logging.level.com.tongyangyuan=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS配置
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# OpenIM Configuration（方案A - 自建）
openim.api-url=http://openim:10002
openim.ws-url=ws://openim:10001
openim.admin-user-id=openIMAdmin
openim.secret=OpenIMAdmin@2026
# 对外暴露的地址（供手机端连接）
openim.external-api-url=http://106.120.183.117:10002
openim.external-ws-url=ws://106.120.183.117:10001
openim.sdk-url=ws://106.120.183.117:10001

# LiveKit Configuration（方案A - 自建）
livekit.url=http://livekit:7880
livekit.api-key=devkey
livekit.api-secret=TongYuanLiveKit@2026SecretKey
