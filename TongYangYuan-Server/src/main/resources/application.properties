# 应用配置
spring.application.name=tongyangyuan-mental-health-server
spring.devtools.add-properties=false

# 服务器配置
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/api

# 数据库配置（本地开发时使用 localhost）
spring.datasource.url=jdbc:mysql://localhost:3306/mental_health_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis配置（本地开发时使用 localhost）
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=Redis@2026
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT配置
jwt.secret=TongYangYuanMentalHealthSecretKey2026VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# WebSocket配置
websocket.allowed-origins=*

# 日志配置
logging.level.root=INFO
logging.level.com.tongyangyuan=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS配置
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# OpenIM Configuration（本地开发使用 localhost，端口映射在 docker-compose 中）
openim.api-url=http://localhost:10002
openim.ws-url=ws://localhost:10001
openim.admin-user-id=imAdmin
openim.secret=openIM123

# 对外暴露的地址（供客户端连接）
# 实际信令走的是 Spring Boot STOMP（ws://host:8080/stomp），不是 OpenIM 原生 WS
# 模拟器：用 adb reverse tcp:8080 tcp:8080 映射后使用 ws://127.0.0.1:8080/stomp
# 真机/局域网：用电脑局域网IP，如 ws://192.168.x.x:8080/stomp
# 生产：填服务器公网IP
openim.external-api-url=http://127.0.0.1:8080
openim.external-ws-url=ws://127.0.0.1:8080/stomp
openim.sdk-url=ws://127.0.0.1:8080/stomp

# LiveKit（本地开发使用 localhost）
# 模拟器：adb reverse tcp:7880 tcp:7880 后用 ws://127.0.0.1:7880
# 真机/局域网：用电脑局域网IP
livekit.url=ws://127.0.0.1:7880
livekit.api-key=devkey
livekit.api-secret=devsecret

# 支付配置（沙箱模式）
payment.alipay.notify-url=http://localhost:8080/api/orders/callback
payment.wechat.notify-url=http://localhost:8080/api/orders/callback
payment.mode=sandbox

# 测试配置
app.test-mode=true
app.server-url=http://localhost:8080
