server:
  port: 8083
  servlet:
    context-path: /oss

spring:
  application:
    name: jslh-oss-server
  #环境 dev|test|prod
  profiles:
    active: dev
  messages:
    encoding: UTF-8
    basename: i18n/messages,i18n/messages_common
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          management:
            context-path: ${server.servlet.context-path}/actuator
        server-addr: ${nacos_host:nacos-host}:${nacos_port:8848}
        namespace: ${nacos_namespace:}
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: ${nacos_namespace:}
      username: ${nacos_username:nacos}
      password: ${nacos_password:nacos}
  config:
    import:
      - optional:nacos:datasource.yaml?group=JSLH_CLOUD_GROUP&namespace=${nacos_namespace:}&refreshEnabled=true
      - optional:nacos:common.yaml?group=JSLH_CLOUD_GROUP&namespace=${nacos_namespace:}&refreshEnabled=true

fdfs:
  so-timeout: 600000
  connect-timeout: 6000
  tracker-list:            #TrackerList参数,支持多个
    - 192.168.10.10:22122
