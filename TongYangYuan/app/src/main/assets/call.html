<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音视频通话</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0B0B14;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* -------- 顶部信息栏 -------- */
        .call-top {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            padding-top: max(env(safe-area-inset-top), 16px);
        }
        .call-top .back-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .call-top .call-type-badge {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        /* -------- 主通话区域 -------- */
        .call-main {
            position: relative;
            height: calc(100vh - 220px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 头像 */
        .avatar-wrap {
            position: relative;
            margin-bottom: 28px;
        }
        .avatar-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(111,166,248,0.35);
            animation: pulse-ring 2s ease-out infinite;
        }
        .avatar-ring-2 {
            animation-delay: 1s;
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .call-avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #6FA6F8 0%, #A78BFA 60%, #F472B6 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 52px; font-weight: 700; color: white;
            box-shadow: 0 0 60px rgba(111,166,248,0.35), 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        /* 来电动画（振铃头像抖动） */
        .avatar-wrap.ringing .call-avatar {
            animation: ring-shake 0.6s ease-in-out infinite;
        }
        @keyframes ring-shake {
            0%, 100% { transform: rotate(-3deg); }
            50%       { transform: rotate(3deg); }
        }

        /* 昵称 & 状态 */
        .call-name {
            font-size: 26px; font-weight: 600; color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .call-status {
            font-size: 15px; color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
            min-height: 22px;
            transition: color 0.3s;
        }
        .call-status.active { color: #4ADE80; }
        .call-status.ringing {
            color: rgba(255,255,255,0.55);
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* 通话时长 */
        .call-duration {
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        /* -------- 远端视频（来电时显示对方摄像头预览） -------- */
        .remote-video-area {
            display: none;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #1a1a2a;
            position: relative;
        }
        .remote-video-area video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .remote-video-area .video-hint {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 14px; gap: 10px;
        }

        /* -------- 控制栏 -------- */
        .call-controls {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 24px 20px;
            padding-bottom: max(env(safe-area-inset-bottom), 24px);
            background: linear-gradient(to top, #0B0B14 0%, transparent 100%);
        }

        .ctrl-btn {
            width: 58px; height: 58px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn svg { width: 26px; height: 26px; }

        .ctrl-btn.mute,
        .ctrl-btn.video,
        .ctrl-btn.speaker {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .ctrl-btn.mute.on  { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); }
        .ctrl-btn.video.on { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); }
        .ctrl-btn.speaker.on{ background: rgba(111,166,248,0.3); border-color: rgba(111,166,248,0.5); }

        .ctrl-btn.hangup {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #EF4444, #DC2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.45);
        }
        .ctrl-btn.hangup:active { box-shadow: 0 2px 10px rgba(239,68,68,0.3); }

        .ctrl-btn.accept {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #22C55E, #16A34A);
            box-shadow: 0 4px 20px rgba(34,197,94,0.45);
        }

        /* 来电接听/拒绝两按钮 */
        .incoming-controls {
            display: none;
            gap: 50px;
        }
        .incoming-controls.show { display: flex; }

        /* 标签 */
        .ctrl-label {
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        /* -------- 测试面板（默认隐藏） -------- */
        .test-panel {
            position: fixed;
            bottom: 140px; left: 16px; right: 16px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            display: none;
            z-index: 30;
        }
        .test-panel.show { display: block; }
        .test-panel h4 { font-size: 13px; color: #6FA6F8; margin-bottom: 12px; }
        .test-panel .test-row {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .test-panel input {
            width: 100%; padding: 8px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: white;
            font-size: 13px; margin-bottom: 8px;
        }
        .test-panel input::placeholder { color: rgba(255,255,255,0.3); }
        .test-btn {
            padding: 7px 14px;
            background: rgba(111,166,248,0.15);
            border: 1px solid rgba(111,166,248,0.3);
            border-radius: 8px; color: #6FA6F8;
            font-size: 12px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .test-toggle {
            position: fixed;
            top: max(env(safe-area-inset-top), 12px);
            right: 16px;
            z-index: 30;
            padding: 6px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="call-top">
        <button class="back-btn" onclick="goBack()">✕</button>
        <div class="call-type-badge" id="callTypeBadge">视频通话</div>
    </div>

    <!-- 主通话区 -->
    <div class="call-main" id="callMainArea">
        <div class="avatar-wrap" id="avatarWrap">
            <div class="avatar-ring" id="avatarRing1"></div>
            <div class="avatar-ring avatar-ring-2" id="avatarRing2"></div>
            <div class="call-avatar" id="callAvatar">张</div>
        </div>
        <div class="call-name" id="callName">咨询师</div>
        <div class="call-status" id="callStatus">等待接听...</div>
        <div class="call-duration" id="callDuration" style="display:none;">00:00</div>
    </div>

    <!-- 控制栏：通话中 -->
    <div class="call-controls" id="callControls">
        <button class="ctrl-btn mute" id="btnMute" onclick="toggleMute()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconMic">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconMicOff" style="display:none">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
            </svg>
            <span class="ctrl-label" id="lblMute">静音</span>
        </button>

        <button class="ctrl-btn hangup" onclick="endCall()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </button>

        <button class="ctrl-btn video" id="btnVideo" onclick="toggleVideo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconVideoOn">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconVideoOff" style="display:none">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34m-7.72-2.06A4 4 0 1 1 7.93 9"/>
            </svg>
            <span class="ctrl-label" id="lblVideo">关闭</span>
        </button>
    </div>

    <!-- 来电接听控制栏（默认隐藏） -->
    <div class="call-controls incoming-controls" id="incomingControls">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <button class="ctrl-btn" style="background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);" onclick="declineCall()">
                <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
            </button>
            <span style="font-size:10px;color:rgba(255,255,255,0.4);">拒绝</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <button class="ctrl-btn accept" onclick="acceptCall()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
                    <polyline points="15 3 20 3 20 8"/>
                    <line x1="10" y1="12" x2="20" y2="12"/>
                    <line x1="10" y1="16" x2="20" y2="16"/>
                </svg>
            </button>
            <span style="font-size:10px;color:rgba(255,255,255,0.4);">接听</span>
        </div>
    </div>

    <!-- 测试面板 -->
    <button class="test-toggle" onclick="toggleTestPanel()">测试 ⚙</button>
    <div class="test-panel" id="testPanel">
        <h4>调试控制台</h4>
        <input type="number" id="tAptId" placeholder="预约ID" value="1">
        <input type="number" id="tTargetId" placeholder="目标用户ID" value="2">
        <input type="text" id="tName" placeholder="咨询师姓名" value="张老师">
        <div class="test-row">
            <button class="test-btn" onclick="startVideoCall()">📹 发起视频</button>
            <button class="test-btn" onclick="startVoiceCall()">📞 发起语音</button>
            <button class="test-btn" onclick="simulateIncoming()">📲 模拟来电</button>
            <button class="test-btn" onclick="simAccept()">✅ 模拟接听</button>
            <button class="test-btn" onclick="simHangup()">❌ 模拟挂断</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let isMuted = false;
        let isVideoEnabled = true;
        let isSpeakerOn = false;
        let isInCall = false;
        let isIncoming = false;
        let callStartTime = null;
        let durationTimer = null;
        let isTestPanelVisible = false;

        function getParams() {
            const p = new URLSearchParams(window.location.search);
            return {
                appointmentId: p.get('appointmentId') || document.getElementById('tAptId').value || '1',
                consultantName: p.get('consultantName') || document.getElementById('tName').value || '咨询师',
                targetUserId: p.get('targetUserId') || document.getElementById('tTargetId').value || '2',
                callType: p.get('callType') || 'video',
                incoming: p.get('incoming') === '1'
            };
        }

        function updateUI(params) {
            const name = params.consultantName || '咨询师';
            document.getElementById('callName').textContent = name;
            document.getElementById('callAvatar').textContent = name.charAt(0).toUpperCase();
            const badge = document.getElementById('callTypeBadge');
            badge.textContent = params.callType === 'audio' ? '语音通话' : '视频通话';
        }

        function showIncomingUI() {
            document.getElementById('callControls').style.display = 'none';
            document.getElementById('incomingControls').classList.add('show');
            document.getElementById('avatarWrap').classList.add('ringing');
            document.getElementById('avatarRing1').style.borderColor = 'rgba(34,197,94,0.5)';
            document.getElementById('avatarRing2').style.borderColor = 'rgba(34,197,94,0.5)';
            document.getElementById('callStatus').textContent = '来电呼叫中...';
            document.getElementById('callStatus').className = 'call-status ringing';
        }

        function showInCallUI() {
            isInCall = true;
            document.getElementById('callControls').style.display = 'flex';
            document.getElementById('incomingControls').classList.remove('show');
            document.getElementById('avatarWrap').classList.remove('ringing');
            document.getElementById('avatarRing1').style.borderColor = 'rgba(111,166,248,0.35)';
            document.getElementById('avatarRing2').style.borderColor = 'rgba(111,166,248,0.35)';
            document.getElementById('callStatus').textContent = '通话中';
            document.getElementById('callStatus').className = 'call-status active';
            document.getElementById('callDuration').style.display = 'block';
            callStartTime = Date.now();
            durationTimer = setInterval(() => {
                const s = Math.floor((Date.now() - callStartTime) / 1000);
                document.getElementById('callDuration').textContent =
                    String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
            }, 1000);
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('btnMute');
            btn.classList.toggle('on', isMuted);
            document.getElementById('iconMic').style.display = isMuted ? 'none' : 'block';
            document.getElementById('iconMicOff').style.display = isMuted ? 'block' : 'none';
            document.getElementById('lblMute').textContent = isMuted ? '取消' : '静音';
            if (window.Android && Android.setMute) Android.setMute(isMuted);
            showToast(isMuted ? '已静音' : '已取消静音');
        }

        function toggleVideo() {
            isVideoEnabled = !isVideoEnabled;
            const btn = document.getElementById('btnVideo');
            btn.classList.toggle('on', !isVideoEnabled);
            document.getElementById('iconVideoOn').style.display = isVideoEnabled ? 'block' : 'none';
            document.getElementById('iconVideoOff').style.display = isVideoEnabled ? 'none' : 'block';
            document.getElementById('lblVideo').textContent = isVideoEnabled ? '关闭' : '开启';
            if (window.Android && Android.setVideoEnabled) Android.setVideoEnabled(isVideoEnabled);
            showToast(isVideoEnabled ? '摄像头已开启' : '摄像头已关闭');
        }

        function endCall() {
            if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
            document.getElementById('callStatus').textContent = '通话已结束';
            document.getElementById('callStatus').className = 'call-status';
            if (window.Android && Android.endCurrentCall) Android.endCurrentCall();
            setTimeout(() => {
                if (window.Android && Android.goBack) Android.goBack();
            }, 1200);
        }

        function declineCall() {
            if (window.Android && Android.declineCall) Android.declineCall();
            if (window.history.length > 1) window.history.back();
        }

        function acceptCall() {
            document.getElementById('callStatus').textContent = '正在连接...';
            if (window.Android && Android.acceptCall) Android.acceptCall();
            setTimeout(showInCallUI, 800);
        }

        function startVideoCall() {
            const p = getParams(); updateUI(p);
            document.getElementById('callStatus').textContent = '正在呼叫...';
            document.getElementById('callStatus').className = 'call-status';
            if (window.Android && Android.startOutgoingCall) {
                Android.startOutgoingCall(p.appointmentId, p.consultantName, parseInt(p.targetUserId), 'video');
            } else {
                document.getElementById('callStatus').textContent = 'Android 接口不可用';
            }
        }

        function startVoiceCall() {
            const p = getParams(); updateUI(p);
            document.getElementById('callStatus').textContent = '正在呼叫...';
            document.getElementById('callStatus').className = 'call-status';
            if (window.Android && Android.startOutgoingCall) {
                Android.startOutgoingCall(p.appointmentId, p.consultantName, parseInt(p.targetUserId), 'audio');
            }
        }

        function simulateIncoming() {
            const p = getParams(); updateUI(p);
            isIncoming = true;
            showIncomingUI();
        }

        function simAccept() { showInCallUI(); }
        function simHangup() { endCall(); }

        function goBack() {
            if (window.Android && Android.goBack) Android.goBack();
            else if (window.history.length > 1) window.history.back();
        }

        function toggleTestPanel() {
            isTestPanelVisible = !isTestPanelVisible;
            document.getElementById('testPanel').classList.toggle('show', isTestPanelVisible);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const p = getParams();
            updateUI(p);
            if (p.incoming) showIncomingUI();
        });
    </script>
</body>
</html>
