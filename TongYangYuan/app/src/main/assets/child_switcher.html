<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孩子切换器</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 孩子切换器组件样式 */
        .child-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(111, 166, 248, 0.1);
            border: 1px solid rgba(111, 166, 248, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 180px;
        }

        .child-switcher:active {
            transform: scale(0.96);
            background: rgba(111, 166, 248, 0.15);
        }

        .child-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .child-avatar.girl {
            background: linear-gradient(135deg, #FFB7C5 0%, #FF8FAB 100%);
        }

        .child-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .child-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .child-age {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.2;
        }

        .switch-arrow {
            font-size: 10px;
            color: var(--primary-color);
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .child-switcher.active .switch-arrow {
            transform: rotate(180deg);
        }

        /* 孩子选择弹窗遮罩 */
        .child-picker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .child-picker-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* 孩子选择弹窗 */
        .child-picker-modal {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 24px 24px 0 0;
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .child-picker-modal.show {
            transform: translateX(-50%) translateY(0);
        }

        .picker-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .picker-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .picker-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .picker-close:active {
            transform: scale(0.9);
            background: #E0E0E0;
        }

        .picker-close svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .picker-content {
            padding: 16px 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .picker-child-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            background: var(--surface);
            border: 2px solid transparent;
        }

        .picker-child-item:last-child {
            margin-bottom: 0;
        }

        .picker-child-item:active {
            transform: scale(0.98);
        }

        .picker-child-item.selected {
            border-color: var(--primary-color);
            background: rgba(111, 166, 248, 0.08);
        }

        .picker-child-item .item-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .picker-child-item .item-avatar.girl {
            background: linear-gradient(135deg, #FFB7C5 0%, #FF8FAB 100%);
        }

        .picker-child-item .item-info {
            flex: 1;
        }

        .picker-child-item .item-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .picker-child-item .item-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .picker-child-item .item-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #E0E0E0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .picker-child-item.selected .item-check {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .picker-child-item .item-check svg {
            width: 14px;
            height: 14px;
            color: white;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .picker-child-item.selected .item-check svg {
            opacity: 1;
        }

        .picker-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border-radius: 16px;
            border: 2px dashed #E0E0E0;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            width: 100%;
        }

        .picker-add-btn:active {
            transform: scale(0.98);
            border-color: var(--primary-color);
            background: rgba(111, 166, 248, 0.05);
        }

        .picker-add-btn svg {
            width: 20px;
            height: 20px;
            color: var(--primary-color);
        }

        .picker-add-btn span {
            font-size: 15px;
            font-weight: 500;
            color: var(--primary-color);
        }

        .no-child-tip {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .no-child-tip a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 孩子切换器组件 (可嵌入页面顶部) -->
    <div class="child-switcher" id="childSwitcher" onclick="showChildPicker()">
        <div class="child-avatar" id="switcherAvatar">子</div>
        <div class="child-info">
            <div class="child-name" id="switcherName">请选择孩子</div>
            <div class="child-age" id="switcherAge"></div>
        </div>
        <span class="switch-arrow">▼</span>
    </div>

    <!-- 遮罩层 -->
    <div class="child-picker-overlay" id="childPickerOverlay" onclick="hideChildPicker()"></div>

    <!-- 孩子选择弹窗 -->
    <div class="child-picker-modal" id="childPickerModal">
        <div class="picker-header">
            <span class="picker-title">选择孩子</span>
            <button class="picker-close" onclick="hideChildPicker()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="picker-content" id="childPickerContent">
            <!-- 孩子列表动态生成 -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let childProfiles = [];
        let currentChildId = -1;
        let currentChildPickerCallback = null;

        /**
         * 初始化孩子切换器
         * @param {Object} options 配置选项
         * @param {Function} options.onChildSelected - 孩子选中后的回调函数
         */
        function initChildSwitcher(options = {}) {
            currentChildPickerCallback = options.onChildSelected || null;
            loadChildren();
        }

        /**
         * 加载孩子列表
         */
        function loadChildren() {
            if (window.Android && typeof Android.getChildProfiles === 'function') {
                try {
                    const json = Android.getChildProfiles();
                    const parsed = JSON.parse(json || '[]');
                    if (Array.isArray(parsed)) {
                        childProfiles = parsed;
                    }
                } catch (e) {
                    console.warn('加载孩子列表失败', e);
                    childProfiles = [];
                }
            }

            // 获取当前孩子
            if (window.Android && typeof Android.getCurrentChildId === 'function') {
                try {
                    currentChildId = parseInt(Android.getCurrentChildId());
                } catch (e) {
                    currentChildId = -1;
                }
            }

            updateSwitcherUI();
        }

        /**
         * 更新切换器显示
         */
        function updateSwitcherUI() {
            const avatar = document.getElementById('switcherAvatar');
            const name = document.getElementById('switcherName');
            const age = document.getElementById('switcherAge');

            // 查找当前孩子
            const currentChild = childProfiles.find(c => {
                const cid = typeof c.id === 'string' ? parseInt(c.id) : c.id;
                return cid === currentChildId;
            });

            if (currentChild) {
                const initial = (currentChild.name || '子').charAt(0);
                avatar.textContent = initial;
                avatar.className = 'child-avatar' + (currentChild.gender === 'GIRL' ? ' girl' : '');
                name.textContent = currentChild.name || '未命名';
                
                if (currentChild.birthDate) {
                    const childAge = calculateAge(currentChild.birthDate);
                    age.textContent = childAge > 0 ? childAge + '岁' : '年龄未知';
                } else {
                    age.textContent = '';
                }
            } else if (childProfiles.length > 0) {
                // 没有当前孩子但有孩子列表，选第一个
                const first = childProfiles[0];
                const initial = (first.name || '子').charAt(0);
                avatar.textContent = initial;
                avatar.className = 'child-avatar' + (first.gender === 'GIRL' ? ' girl' : '');
                name.textContent = first.name || '未命名';
                
                if (first.birthDate) {
                    const childAge = calculateAge(first.birthDate);
                    age.textContent = childAge > 0 ? childAge + '岁' : '年龄未知';
                } else {
                    age.textContent = '';
                }
            } else {
                avatar.textContent = '子';
                avatar.className = 'child-avatar';
                name.textContent = '请选择孩子';
                age.textContent = '';
            }
        }

        /**
         * 计算年龄
         */
        function calculateAge(birthDate) {
            if (!birthDate) return 0;
            try {
                const birth = new Date(birthDate);
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                const monthDiff = today.getMonth() - birth.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }
                return age;
            } catch (e) {
                return 0;
            }
        }

        /**
         * 显示孩子选择弹窗
         */
        function showChildPicker() {
            const overlay = document.getElementById('childPickerOverlay');
            const modal = document.getElementById('childPickerModal');
            const content = document.getElementById('childPickerContent');
            const switcher = document.getElementById('childSwitcher');

            // 更新当前孩子ID
            if (window.Android && typeof Android.getCurrentChildId === 'function') {
                try {
                    currentChildId = parseInt(Android.getCurrentChildId());
                } catch (e) {
                    currentChildId = -1;
                }
            }

            // 生成孩子列表
            if (childProfiles.length === 0) {
                content.innerHTML = `
                    <div class="no-child-tip">
                        暂无孩子档案<br>
                        <a href="javascript:void(0)" onclick="openChildInfo(); hideChildPicker();">去添加孩子信息</a>
                    </div>
                `;
            } else {
                content.innerHTML = childProfiles.map(child => {
                    const cid = typeof child.id === 'string' ? parseInt(child.id) : child.id;
                    const isSelected = cid === currentChildId;
                    const initial = (child.name || '子').charAt(0);
                    const gender = child.gender === 'GIRL' ? 'girl' : '';
                    const genderText = child.gender === 'GIRL' ? '女孩' : '男孩';
                    const ageText = child.birthDate ? calculateAge(child.birthDate) + '岁' : '年龄未知';

                    return `
                        <div class="picker-child-item ${isSelected ? 'selected' : ''}" 
                             onclick="selectChild('${child.id}', '${child.name || ''}', '${child.gender || ''}')">
                            <div class="item-avatar ${gender}">${initial}</div>
                            <div class="item-info">
                                <div class="item-name">${child.name || '未命名'}</div>
                                <div class="item-meta">${genderText} · ${ageText}</div>
                            </div>
                            <div class="item-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <path d="M20 6L9 17l-5-5"/>
                                </svg>
                            </div>
                        </div>
                    `;
                }).join('');

                // 添加按钮
                content.innerHTML += `
                    <button class="picker-add-btn" onclick="openChildInfo(); hideChildPicker();">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span>添加孩子</span>
                    </button>
                `;
            }

            // 显示弹窗
            overlay.classList.add('show');
            modal.classList.add('show');
            switcher.classList.add('active');
        }

        /**
         * 隐藏孩子选择弹窗
         */
        function hideChildPicker() {
            const overlay = document.getElementById('childPickerOverlay');
            const modal = document.getElementById('childPickerModal');
            const switcher = document.getElementById('childSwitcher');

            overlay.classList.remove('show');
            modal.classList.remove('show');
            switcher.classList.remove('active');
        }

        /**
         * 选择孩子
         */
        function selectChild(childId, childName, gender) {
            const id = typeof childId === 'string' ? parseInt(childId) : childId;
            currentChildId = id;

            // 同步到本地和服务器
            if (window.Android && typeof Android.setCurrentChild === 'function') {
                Android.setCurrentChild(String(childId), childName || '');
            }

            // 更新切换器UI
            updateSwitcherUI();

            // 调用回调
            if (currentChildPickerCallback) {
                const child = childProfiles.find(c => {
                    const cid = typeof c.id === 'string' ? parseInt(c.id) : c.id;
                    return cid === id;
                });
                currentChildPickerCallback(child);
            }

            // 关闭弹窗
            hideChildPicker();

            // 显示提示
            if (window.Android && typeof Android.showToast === 'function') {
                Android.showToast('已切换为：' + (childName || '未命名孩子'));
            }
        }

        /**
         * 打开孩子信息管理页面
         */
        function openChildInfo() {
            if (window.Android && typeof Android.openChildManagement === 'function') {
                Android.openChildManagement();
            } else if (window.Android && typeof Android.openWebPage === 'function') {
                Android.openWebPage('child_info.html');
            }
        }

        /**
         * 刷新孩子列表（外部调用）
         */
        function refreshChildList() {
            loadChildren();
        }
    </script>
</body>
</html>
