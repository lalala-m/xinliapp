<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>咨询聊天</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 24px;
            background: var(--surface);
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .consultant-info {
            text-align: center;
        }

        .consultant-name {
            font-size: 18px;
            font-weight: 600;
            color: #6FA6F8;
            margin-bottom: 4px;
        }

        .child-info {
            font-size: 14px;
            color: #6FA6F8;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .appointment-info {
            font-size: 14px;
            color: #999999;
        }

        .call-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
        }

        .call-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #E0E0E0;
            background: white;
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .call-btn svg {
            width: 20px;
            height: 20px;
        }

        .call-btn:active {
            background: #F5F5F5;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #F5F5F5;
            padding-bottom: 200px;
            -webkit-overflow-scrolling: touch;
        }

        /* 下拉刷新 */
        .pull-to-refresh {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 0;
            overflow: hidden;
            transition: height 0.2s;
            background: #f0f0f0;
            font-size: 12px;
            color: #999;
        }
        .pull-to-refresh.pulling, .pull-to-refresh.refreshing {
            height: 48px;
        }
        .pull-to-refresh .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #6FA6F8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.consultant {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.consultant .message-bubble {
            background: white;
            color: #333333;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: #6FA6F8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
            text-align: center;
        }

        .message.system-message {
            justify-content: center;
            margin: 8px 0;
        }

        .message.system-message .system-bubble {
            background: rgba(0, 0, 0, 0.05);
            color: #999999;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 12px;
            text-align: center;
        }

        .message.system-message .call-ended-bubble {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #E8F5E9, #F1F8E9);
            color: #2E7D32;
            border: 1px solid #C8E6C9;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
        }

        .call-ended-icon {
            display: inline-flex;
            align-items: center;
            opacity: 0.8;
        }

        .input-container {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 0px);
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 150;
        }

        .input-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:active {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(0.95);
        }

        .action-btn.recording {
            background: rgba(111, 166, 248, 0.15);
            color: #6FA6F8;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 24px;
            font-size: 16px;
            background: white;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #6FA6F8;
        }

        .send-btn {
            padding: 12px 24px;
            border-radius: 24px;
            background: #6FA6F8;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:active {
            background: #4A8AE8;
            transform: scale(0.98);
        }

        .media-preview {
            margin-top: 8px;
            border-radius: 8px;
            overflow: hidden;
            max-width: 200px;
        }

        .media-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .media-button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 16px;
            background: rgba(111, 166, 248, 0.15);
            color: #1d4ed8;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .media-button svg {
            flex-shrink: 0;
        }

        .media-sheet {
            position: fixed;
            inset: 0;
            z-index: 400;
            pointer-events: none;
        }

        .media-sheet .sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .media-sheet .sheet-panel {
            position: absolute;
            left: 50%;
            bottom: -320px;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px 20px 32px;
            box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.08);
            transition: bottom 0.25s ease;
        }

        .media-sheet.visible {
            pointer-events: auto;
        }

        .media-sheet.visible .sheet-backdrop {
            opacity: 1;
        }

        .media-sheet.visible .sheet-panel {
            bottom: 0;
        }

        .sheet-handle {
            width: 50px;
            height: 5px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 auto 16px;
        }

        .sheet-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3345;
        }

        .sheet-option {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            text-align: left;
            background: rgba(111, 166, 248, 0.12);
            color: #2c3345;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sheet-option span {
            font-weight: 600;
        }

        .sheet-option small {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 400;
            color: #627089;
        }

        .sheet-option:active {
            transform: scale(0.97);
            background: rgba(111, 166, 248, 0.2);
        }

        .sheet-option.cancel {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #627089;
            font-weight: 500;
        }

        /* ============================================
           通话状态通知样式（像微信那样）
           ============================================ */

        .call-notification-container {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            width: calc(100% - 32px);
            max-width: 400px;
        }

        .call-notification {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: callNotifSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        @keyframes callNotifSlideIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.85); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .call-notification.fade-out {
            animation: callNotifFadeOut 0.3s ease forwards;
        }

        @keyframes callNotifFadeOut {
            to { opacity: 0; transform: translateY(-15px) scale(0.9); }
        }

        .call-notif-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .call-notif-icon svg {
            width: 26px;
            height: 26px;
        }

        .call-notif-icon.calling {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            animation: callNotifPulse 1.5s ease-in-out infinite;
        }

        .call-notif-icon.connected {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
        }

        .call-notif-icon.ended, .call-notif-icon.rejected {
            background: linear-gradient(135deg, #9E9E9E, #BDBDBD);
        }

        .call-notif-icon.error {
            background: linear-gradient(135deg, #F44336, #EF5350);
        }

        @keyframes callNotifPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .call-notif-content {
            flex: 1;
            min-width: 0;
        }

        .call-notif-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }

        .call-notif-subtitle {
            font-size: 13px;
            color: #666;
        }

        .call-ringing-dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 8px;
        }

        .call-ringing-dots span {
            width: 5px;
            height: 5px;
            background: #4CAF50;
            border-radius: 50%;
            animation: ringDot 1.2s ease-in-out infinite;
        }

        .call-ringing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .call-ringing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes ringDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .call-notif-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .call-notif-btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .call-notif-btn.accept {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
        }

        .call-notif-btn.reject {
            background: #F44336;
            color: white;
        }

        .call-notif-btn:active {
            transform: scale(0.95);
        }

        .call-notif-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .call-notif-close svg {
            width: 16px;
            height: 16px;
            stroke: #999;
        }
    </style>
</head>
<body class="chat-page">
    <div class="chat-container">
    <div class="top-app-bar glass">
        <div class="title" id="toolbarTitle">咨询聊天</div>
    </div>

        <div class="chat-header">
            <div class="consultant-info">
                <div class="consultant-name" id="consultantName">咨询师</div>
                <div class="child-info" id="childInfo" style="display: none;"></div>
                <div class="appointment-info" id="appointmentInfo" style="display: none;"></div>
            </div>
        </div>

        <div class="call-actions">
            <div class="call-btn" onclick="startCall('audio')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91" />
                </svg>
                语音通话
            </div>
            <div class="call-btn" onclick="startCall('video')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                视频通话
            </div>
        </div>

        <div class="end-consultation-section" id="endConsultationSection" style="display: none;">
            <button class="btn btn-secondary" onclick="endConsultation()" style="width: calc(100% - 32px); margin: 16px;">
                结束咨询并评价
            </button>
        </div>

        <div class="pull-to-refresh" id="pullToRefresh">
            <div class="spinner"></div>
            <span id="pullToRefreshText">下拉加载更多</span>
        </div>
        <div class="messages-container" id="messagesContainer">
            <!-- 消息将动态添加到这里 -->
        </div>

        <div class="input-container">
            <div class="input-actions">
                <button class="action-btn" onclick="attachImage()" title="发送图片">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>
                <button class="action-btn" id="voiceBtn" onclick="toggleVoiceRecord()" title="语音消息">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10a7 7 0 0 1-14 0"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
            </div>
            <textarea class="message-input" id="messageInput" placeholder="和咨询师说点什么…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="media-sheet" id="mediaActionSheet" data-media-type="">
        <div class="sheet-backdrop" onclick="hideMediaActionSheet()"></div>
        <div class="sheet-panel">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="mediaSheetTitle">发送图片</div>
            <button type="button" class="sheet-option" onclick="handleMediaAction('camera')">
                <span>使用相机</span>
                <small>即时拍摄并发送</small>
            </button>
            <button type="button" class="sheet-option" onclick="handleMediaAction('library')">
                <span>从相册选择</span>
                <small>选取已保存的照片或视频</small>
            </button>
            <button type="button" class="sheet-option cancel" onclick="hideMediaActionSheet()">取消</button>
        </div>
    </div>

    <!-- 通话状态通知（像微信那样浮动显示） -->
    <div class="call-notification-container" id="callNotificationContainer"></div>

    <script src="js/stomp.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let messages = [];
        let historyLoaded = false;
        let shouldShowWelcome = true;
        let stompClient = null;
        let currentAppointmentId = '';
        let serverAppointmentId = -1;
        let currentUserId = -1;
        let consultantUserId = 2;
        /** 自己的 userId（从 Android 接口获取后缓存，避免重复调用） */
        let _cachedUserId = null;
        // 通话状态
        let callType = 'video';
        let callState = null; // 'calling' | 'connected' | 'ended' | 'rejected'
        let callStartTime = null;

        function loadChatData() {
            // 从URL参数或Android接口获取数据
            const consultantName = getUrlParam('consultant_name') || getUrlParam('consultant') || '咨询师';
            const date = getUrlParam('date') || '';
            const slot = getUrlParam('slot') || '';
            const appointmentId = getUrlParam('appointment_id') || getUrlParam('appointmentId') || '';
            const childId = getUrlParam('childId') || '';
            const childName = getUrlParam('childName') || '';
            
            serverAppointmentId = parseInt(getUrlParam('serverAppointmentId') || '-1');
            const cId = getUrlParam('consultantUserId');
            if (cId) {
                consultantUserId = parseInt(cId);
            }

            document.getElementById('consultantName').textContent = consultantName + ' 咨询师';
            const toolbarTitle = document.getElementById('toolbarTitle');
            if (toolbarTitle) {
                toolbarTitle.textContent = consultantName + ' 咨询师';
            }

            // 显示孩子信息
            if (childName) {
                const childInfoEl = document.getElementById('childInfo');
                childInfoEl.textContent = `咨询对象：${childName}`;
                childInfoEl.style.display = 'block';
            } else if (childId && window.Android && typeof Android.getChildProfileById === 'function') {
                // 如果只有childId，从数据库获取孩子信息
                try {
                    const childJson = Android.getChildProfileById(childId);
                    const childProfile = JSON.parse(childJson);
                    if (childProfile && childProfile.name) {
                        const childInfoEl = document.getElementById('childInfo');
                        childInfoEl.textContent = `咨询对象：${childProfile.name}`;
                        childInfoEl.style.display = 'block';
                    }
                } catch (e) {
                    console.error('Failed to load child profile', e);
                }
            }

            if (date && slot) {
                const infoEl = document.getElementById('appointmentInfo');
                infoEl.textContent = `预约时间：${date} ${slot}`;
                infoEl.style.display = 'block';
            }

            // 保存appointmentId供后续使用
            window.appointmentId = appointmentId;
            currentAppointmentId = appointmentId;

            // 加载历史消息
            loadHistoryMessages();
            
            // 初始化WebSocket连接
            connectWebSocket();
        }

        function getCurrentUserId() {
            if (_cachedUserId !== null) return _cachedUserId;
            try {
                if (window.Android && Android.getUserId) {
                    _cachedUserId = Android.getUserId();
                    return _cachedUserId;
                }
            } catch (e) { /* ignore */ }
            return -1;
        }

        function showConnectionStatus(status) {
            const existing = document.getElementById('wsStatusBar');
            if (existing) existing.remove();
            if (status === 'ok') return; // 连接成功，隐藏状态条
            const colors = { connecting: '#f39c12', error: '#e74c3c', disconnected: '#95a5a6' };
            const labels = { connecting: '正在连接聊天服务器…', error: '聊天连接失败（消息仍可发送）', disconnected: '聊天已断开' };
            const color = colors[status] || '#95a5a6';
            const label = labels[status] || status;
            const bar = document.createElement('div');
            bar.id = 'wsStatusBar';
            bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:' + color + ';color:white;text-align:center;font-size:12px;padding:4px 8px;z-index:9999;transition:opacity 0.3s;';
            bar.textContent = label;
            document.body.appendChild(bar);
        }

        function connectWebSocket() {
            if (!window.Android || !Android.getAuthToken) {
                console.warn("Android interface not available");
                showConnectionStatus('error');
                return;
            }

            const token = Android.getAuthToken();
            currentUserId = getCurrentUserId();
            console.log('WS connecting with userId=' + currentUserId + ', token present=' + !!token);

            if (!token) {
                console.warn("No auth token available");
                showConnectionStatus('error');
                return;
            }

            if (!Android.getBaseUrl) {
                console.warn("Android.getBaseUrl not available");
                showConnectionStatus('error');
                return;
            }

            let baseUrl = Android.getBaseUrl();
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            // 使用原生 WebSocket /stomp（服务端单独注册），避免 SockJS 依赖 /info + JSESSIONID，在 file:// WebView 下无法建会话导致一直卡住
            var wsNative = baseUrl;
            if (wsNative.indexOf('https://') === 0) {
                wsNative = 'wss://' + wsNative.substring(8);
            } else if (wsNative.indexOf('http://') === 0) {
                wsNative = 'ws://' + wsNative.substring(7);
            }
            const wsUrl = wsNative + '/stomp';
            console.log('WS native target: ' + wsUrl);

            showConnectionStatus('connecting');

            const socket = new WebSocket(wsUrl);
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            socket.addEventListener('open',   function() { console.log('[WS] open'); });
            socket.addEventListener('close',  function(e) { console.log('[WS] close', e && e.code, e && e.reason); });
            socket.addEventListener('error',  function(e) { console.error('[WS] error', e); });

            // 超过 10 秒未连接成功，强制切换到 error 状态
            const connectTimeout = setTimeout(function() {
                console.error('WS connect timeout after 10s');
                try { socket.close(); } catch(err) {}
                showConnectionStatus('error');
            }, 10000);

            stompClient.connect(
                { 'Authorization': 'Bearer ' + token },
                function (frame) {
                    clearTimeout(connectTimeout);
                    console.log('STOMP Connected: ' + frame + ' (userId=' + currentUserId + ')');
                    showConnectionStatus('ok');
                    setupWsHeartbeat();

                    stompClient.subscribe('/user/queue/messages', function (messageOutput) {
                        const message = JSON.parse(messageOutput.body);
                        console.log('WS received message:', message);
                        handleIncomingMessage(message);
                    });

                    stompClient.subscribe('/user/queue/webrtc', function (messageOutput) {
                        const signal = JSON.parse(messageOutput.body);
                        handleWebRTCSignal(signal);
                    });

                    stompClient.send("/app/chat.online", {}, JSON.stringify(currentUserId));
                }, function (error) {
                    clearTimeout(connectTimeout);
                    console.error('STOMP error:', error);
                    showConnectionStatus('error');
                    setTimeout(connectWebSocket, 5000);
                }
            );
        }

        // WebSocket 断连监听（STOMP.js 用 webSocket.onclose）
        function setupWsHeartbeat() {
            if (!stompClient || !stompClient.ws) return;
            stompClient.ws.onclose = function() {
                console.warn('STOMP disconnected');
                showConnectionStatus('disconnected');
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        function handleIncomingMessage(messageDTO) {
            const typeIncoming = (messageDTO.messageType || '').toLowerCase();
            // 自己发的普通消息不再重复展示；SYSTEM（如通话结束）多端同步仍需写入并展示
            if (messageDTO.senderUserId == currentUserId && typeIncoming !== 'system') {
                return;
            }

            const isFromConsultant = messageDTO.isFromConsultant;
            const type = messageDTO.messageType.toLowerCase();
            const content = messageDTO.content;
            const mediaUrl = messageDTO.mediaUrl;
            
            addMessage(isFromConsultant, type, content, mediaUrl, false); 
        }

        function handleWebRTCSignal(signal) {
            if (!signal || !signal.type) return;
            const targetAppointmentId = serverAppointmentId > 0 ? String(serverAppointmentId) : String(currentAppointmentId);
            if (signal.appointmentId && targetAppointmentId && String(signal.appointmentId) !== targetAppointmentId) {
                return;
            }
            if (signal.type === 'call') {
                const incomingCallType = signal.data && signal.data.callType ? signal.data.callType : 'video';
                startIncomingCallNotification(signal, targetAppointmentId, incomingCallType);
            }
        }

                            : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`

                    <button class="call-notif-close" onclick="dismissCallNotification()">

                    </button>

            // 自动拒绝超时（60秒）
            setTimeout(() => {

        function acceptIncomingCall(appointmentId, consultantName, targetUserId, incomingCallType) {
            dismissCallNotification();
            callState = 'connected';
            callStartTime = Date.now();

            if (typeof Android.startVideoCallWithType === 'function') {

            } else if (typeof Android.startVideoCall === 'function') {

        }

        function rejectIncomingCall() {
            dismissCallNotification();
            callState = 'rejected';

            if (stompClient && stompClient.connected) {
                const payload = {
                    type: 'reject',
                    fromUserId: currentUserId,
                    toUserId: consultantUserId,
                    appointmentId: serverAppointmentId > 0 ? serverAppointmentId : currentAppointmentId

        function startIncomingCall(signal, fallbackAppointmentId) {

        function loadHistoryMessages() {
            if (!window.Android || !window.appointmentId || typeof Android.getChatHistory !== 'function') {
                return;
            }
            try {
                const historyJson = Android.getChatHistory(window.appointmentId) || '[]';
                const history = JSON.parse(historyJson);
                history.forEach(record => {
                    addMessage(record.fromConsultant, record.type.toLowerCase(), record.content, record.mediaUri, true);
                });
                // 是否显示欢迎语改由服务器控制，这里不再本地生成
                shouldShowWelcome = false;
                if (typeof Android.markAppointmentChatted === 'function') {
                    Android.markAppointmentChatted(window.appointmentId);
                }
                historyLoaded = true;
            } catch (e) {
                console.error('Load history failed', e);
                shouldShowWelcome = false;
            }

        /** 从原生重新拉取聊天记录（清空后重绘，避免重复追加） */
        function refreshChatHistoryFromNative() {
            const container = document.getElementById('messagesContainer');
            if (container) {
                container.innerHTML = '';
            }
            messages = [];
            historyLoaded = false;
            loadHistoryMessages();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;

            // 先在UI上显示（乐观更新）
            addMessage(false, 'text', content);
            input.value = '';
            input.style.height = 'auto';

            // 准备数据
            // 尝试获取最新的服务器端预约ID
            if (serverAppointmentId <= 0 && window.Android && Android.getServerAppointmentId) {
                const latestId = Android.getServerAppointmentId(currentAppointmentId);
                if (latestId > 0) {
                    serverAppointmentId = latestId;
                }
            }

            const targetAppointmentId = serverAppointmentId > 0 ? serverAppointmentId : currentAppointmentId;
            
            // 如果是纯本地ID（非数字或负数），则无法发送到服务器
            if (!serverAppointmentId || serverAppointmentId <= 0) {
                 console.warn("Using local appointment ID, trying to sync...");
                 // 尝试同步或提示
            }

            const messageDTO = {
                appointmentId: parseInt(targetAppointmentId), 
                senderUserId: currentUserId,
                receiverUserId: consultantUserId,
                messageType: 'TEXT',
                content: content,
                isFromConsultant: false
            };
            
            // 使用 HTTP POST 发送消息 (比 WebSocket 更可靠)
            let baseUrl = 'http://127.0.0.1:8080/api';
            if (window.Android && Android.getBaseUrl) {
                baseUrl = Android.getBaseUrl();
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }

            const token = window.Android ? Android.getAuthToken() : '';

            fetch(baseUrl + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(messageDTO)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    console.log('Message sent via HTTP success');
                } else {
                    console.error('Failed to send message via HTTP', data);
                    // 失败尝试 WebSocket 回退
                    sendViaStomp(messageDTO);
                }
            })
            .catch(error => {
                console.error('Error sending message via HTTP', error);
                // 失败尝试 WebSocket 回退
                sendViaStomp(messageDTO);
            });
        }

        function sendViaStomp(messageDTO) {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.send", {}, JSON.stringify(messageDTO));
            } else {
                // WS 不可用，降级为 HTTP 重试
                console.warn("STOMP not connected, retrying via HTTP…");
                retrySendViaHttp(messageDTO, 1);
            }
        }

        /** WS 断连时通过 HTTP 重发消息（最多 2 次） */
        function retrySendViaHttp(messageDTO, attempt) {
            let baseUrl = 'http://127.0.0.1:8080/api';
            if (window.Android && Android.getBaseUrl) {
                baseUrl = Android.getBaseUrl();
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }
            const token = window.Android ? Android.getAuthToken() : '';
            fetch(baseUrl + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(messageDTO)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200 || data.code === 201) {
                    console.log('Message sent via HTTP retry');
                } else if (attempt < 2) {
                    setTimeout(() => retrySendViaHttp(messageDTO, attempt + 1), 1000);
                } else {
                    showToast('发送失败，请检查网络');
                }
            })
            .catch(() => {
                if (attempt < 2) {
                    setTimeout(() => retrySendViaHttp(messageDTO, attempt + 1), 1500);
                } else {
                    showToast('发送失败，请检查网络');
                }
            });
        }

        function addMessage(fromConsultant, type, content, mediaUrl, skipPersist) {
            const message = {
                fromConsultant,
                type,
                content,
                mediaUrl,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            };
            messages.push(message);
            renderMessage(message);
            scrollToBottom();

            if (
                !skipPersist &&
                window.Android &&
                window.appointmentId &&
                typeof Android.saveChatMessage === 'function'
            ) {
                try {
                    Android.saveChatMessage(
                        window.appointmentId,
                        fromConsultant,
                        type.toUpperCase(),
                        content,
                        mediaUrl || ''
                    );
                } catch (e) {
                    console.error('Save chat message failed', e);
                }
            }
        }

        function renderMessage(message) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');

            // 系统消息（通话结束等）
            if (message.type === 'system') {
                messageDiv.className = 'message system-message';

                // 通话结束消息：CALL_ENDED:video/audio:时长秒数:格式化时长
                if (message.content && message.content.startsWith('CALL_ENDED:')) {
                    const parts = message.content.split(':');
                    const callType = parts[1] === 'audio' ? '语音' : '视频';
                    const durationStr = parts[3] || (parts[2] ? parts[2] + '秒' : '0秒');
                    const icon = parts[1] === 'audio'
                        ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`
                        : `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
                    messageDiv.innerHTML = `
                        <div class="call-ended-bubble">
                            <span class="call-ended-icon">${icon}</span>
                            <span>${callType}通话已结束，时长 ${durationStr}</span>
                        </div>
                    `;
                } else {
                    messageDiv.innerHTML = `<div class="system-bubble">${escapeHtml(message.content)}</div>`;
                }
                container.appendChild(messageDiv);
                return;
            }

            messageDiv.className = `message ${message.fromConsultant ? 'consultant' : 'user'}`;

            let contentHtml = '';
            if (message.type === 'text') {
                contentHtml = `<div class="message-bubble">${escapeHtml(message.content)}</div>`;
            } else if (message.type === 'image') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <div class="media-preview">
                            <img src="${message.mediaUrl || ''}" alt="图片">
                        </div>
                    </div>
                `;
            } else if (message.type === 'video') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <button class="media-button" onclick="playMedia('video','${escapeAttr(message.mediaUrl || '')}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            点击播放视频
                        </button>
                    </div>
                `;
            } else if (message.type === 'audio') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <button class="media-button" onclick="playMedia('audio','${escapeAttr(message.mediaUrl || '')}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 3v18l15-9-15-9z"/>
                            </svg>
                            点击播放语音
                        </button>
                    </div>
                `;
            } else {
                // 其他类型当文本处理
                contentHtml = `<div class="message-bubble">${escapeHtml(message.content)}</div>`;
            }

            messageDiv.innerHTML = contentHtml;
            container.appendChild(messageDiv);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(value) {
            if (!value) return '';
            return String(value).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        /* ── 下拉刷新 ── */
        let _ptrStartY = 0;
        let _ptrPulling = false;

        function initPullToRefresh() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            container.addEventListener('touchstart', function(e) {
                if (container.scrollTop > 0) return; // 未在顶部，不触发
                _ptrStartY = e.touches[0].clientY;
                _ptrPulling = false;
            }, { passive: true });

            container.addEventListener('touchmove', function(e) {
                if (container.scrollTop > 0) return;
                const dy = e.touches[0].clientY - _ptrStartY;
                if (dy > 40) {
                    _ptrPulling = true;
                    document.getElementById('pullToRefresh').classList.add('pulling');
                    document.getElementById('pullToRefreshText').textContent = '释放加载更多…';
                    e.preventDefault(); // 阻止页面下拉
                }
            }, { passive: false });

            container.addEventListener('touchend', function() {
                const ptr = document.getElementById('pullToRefresh');
                if (!_ptrPulling) return;
                _ptrPulling = false;
                ptr.classList.remove('pulling');
                ptr.classList.add('refreshing');
                document.getElementById('pullToRefreshText').textContent = '加载中…';
                refreshChatHistoryFromNative();
                // 重置
                setTimeout(() => {
                    ptr.classList.remove('refreshing');
                    document.getElementById('pullToRefreshText').textContent = '下拉加载更多';
                }, 800);
            }, { passive: true });
        }

        function attachImage() {
            chooseMediaSource('image');
        }

            chooseMediaSource('video');

        function chooseMediaSource(type) {
            if (!window.Android) {
                showToast('仅支持在APP内发送媒体');
                return;
            }
            showMediaActionSheet(type);
        }

        let mediaSheetType = '';

        function showMediaActionSheet(type) {
            mediaSheetType = type;
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.dataset.mediaType = type;
            const title = document.getElementById('mediaSheetTitle');
            if (title) {
                title.textContent = type === 'video' ? '发送视频' : '发送图片';
            }
            sheet.classList.add('visible');
        }

        function hideMediaActionSheet() {
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.classList.remove('visible');
            sheet.dataset.mediaType = '';
            mediaSheetType = '';
        }

        function handleMediaAction(action) {
            const sheet = document.getElementById('mediaActionSheet');
            const type = mediaSheetType || (sheet ? sheet.dataset.mediaType : '');
            hideMediaActionSheet();
            if (!type || !window.Android) {
                return;
            }
            const isImage = type === 'image';
            if (action === 'camera') {
                if (isImage && typeof Android.captureImage === 'function') {
                    Android.captureImage();
                    return;
                }
                if (!isImage && typeof Android.captureVideo === 'function') {
                    Android.captureVideo();
                    return;
                }
            } else if (action === 'library') {
                if (isImage && typeof Android.openImagePicker === 'function') {
                    Android.openImagePicker();
                    return;
                }
                if (!isImage && typeof Android.openVideoPicker === 'function') {
                    Android.openVideoPicker();
                    return;
                }
            }
            showToast('当前设备暂不支持该功能');
        }

                if (typeof Android.startVoiceRecord === 'function') {

        function startCall(type) {
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '') || '咨询师';
            const appointmentId = String(serverAppointmentId > 0 ? serverAppointmentId : (currentAppointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || ''));
            const targetUserId = consultantUserId || 0;

            callType = type || 'video';
            callState = 'calling';

            // 显示呼出通知
            const typeLabel = callType === 'audio' ? '语音' : '视频';
            showCallStatusNotification('calling', `正在呼叫 ${consultantName}...`, typeLabel + '通话');

            if (!window.Android) {
                showToast('请在APP内发起通话');
                return;
            }

            if (!appointmentId || !targetUserId) {
                showToast('缺少通话信息，无法发起通话');
                return;
            }

            if (typeof Android.startOutgoingCall === 'function') {
                Android.startOutgoingCall(appointmentId, consultantName, targetUserId, callType);
                return;
            }

            showToast('当前版本暂不支持发起通话');
        }

        function endConsultation() {
            const confirmEnd = confirm('确认结束本次咨询吗？结束后将进入服务评价页面。');
            if (!confirmEnd) return;

            const appointmentId = window.appointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || '';
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '');

            if (window.Android && typeof Android.endConsultation === 'function') {
                Android.endConsultation(appointmentId);
            }

            // 跳转到评价页面
            const ratingUrl = `rating.html?appointmentId=${encodeURIComponent(appointmentId)}&consultantName=${encodeURIComponent(consultantName)}`;
            if (window.Android && typeof Android.navigateToRating === 'function') {
                Android.navigateToRating(ratingUrl);
            } else {
                window.location.href = ratingUrl;
            }
        }

        // 检测咨询是否应该结束（可以通过Android接口或时间判断）
        function checkConsultationStatus() {
            if (window.Android && typeof Android.isConsultationEnded === 'function') {
                try {
                    const isEnded = Android.isConsultationEnded(window.appointmentId || '');
                    if (isEnded) {
                        document.getElementById('endConsultationSection').style.display = 'block';
                    }
                } catch (e) {
                    console.error('Check consultation status failed', e);
                }
            } else {
                // 默认显示结束按钮（可以根据实际需求调整）
                document.getElementById('endConsultationSection').style.display = 'block';
            }
        }

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 输入框自动调整高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Enter键发送（Shift+Enter换行）
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadChatData();
            initPullToRefresh();
            // 欢迎消息由服务器端在预约确认时发送，这里不再在本地生成
            setTimeout(checkConsultationStatus, 1000);
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                hideMediaActionSheet();
            }
        });
    </script>
</body>
</html>
