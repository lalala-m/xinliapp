            `;

            // 不在此用 setTimeout 关闭：通话页在前台时 WebView 定时器暂停，会导致挂断后仍卡在「正在呼叫」。
            // 清除横幅由 Android 在 VideoCallActivity 结束时调用 notifyVideoCallClosed。
        }

        function startIncomingCall(signal, fallbackAppointmentId) {
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '') || '咨询师';
            const appointmentId = signal.appointmentId ? String(signal.appointmentId) : String(fallbackAppointmentId || '');
            const targetUserId = signal.fromUserId || 0;
            const incomingCallType = signal.data && signal.data.callType ? signal.data.callType : 'video';

            if (typeof Android.startVideoCallWithType === 'function') {
                Android.startVideoCallWithType(appointmentId, consultantName, targetUserId, incomingCallType);
            } else if (typeof Android.startVideoCall === 'function') {
                Android.startVideoCall(appointmentId, consultantName, targetUserId);
            }
        }

        function loadHistoryMessages() {
            if (!window.Android || !window.appointmentId) {
                return;
            }
            
            // 优先从服务器获取历史记录
            if (typeof Android.getChatHistoryFromServer === 'function' && serverAppointmentId > 0) {
                try {
                    const historyJson = Android.getChatHistoryFromServer(String(serverAppointmentId)) || '[]';
                    const history = JSON.parse(historyJson);
                    if (history && history.length > 0) {
                        history.forEach(record => {
                            addMessage(record.fromConsultant, record.type ? record.type.toLowerCase() : 'text', record.content || '', record.mediaUri || '', true);
                        });
                    }
                    shouldShowWelcome = history.length === 0;
                    if (typeof Android.markAppointmentChatted === 'function') {
                        Android.markAppointmentChatted(window.appointmentId);
                    }
                    historyLoaded = true;
                    return;
                } catch (e) {
                    console.error('Load history from server failed, fallback to local', e);
                }
            }
            
            // 服务器获取失败，从本地存储获取
            if (typeof Android.getChatHistory === 'function') {
                try {
                    const historyJson = Android.getChatHistory(window.appointmentId) || '[]';
                    const history = JSON.parse(historyJson);
                    history.forEach(record => {
                        addMessage(record.fromConsultant, record.type ? record.type.toLowerCase() : 'text', record.content || '', record.mediaUri || '', true);
                    });
                    shouldShowWelcome = false;
                    if (typeof Android.markAppointmentChatted === 'function') {
                        Android.markAppointmentChatted(window.appointmentId);
                    }
                    historyLoaded = true;
                } catch (e) {
                    console.error('Load local history failed', e);
                    shouldShowWelcome = false;
                }
            }
        }

        /** 从原生重新拉取聊天记录（清空后重绘，避免重复追加） */
        function refreshChatHistoryFromNative() {
            const container = document.getElementById('messagesContainer');
            if (container) {
                container.innerHTML = '';
            }
            messages = [];
            historyLoaded = false;
            loadHistoryMessages();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;

            // 先在UI上显示（乐观更新）
            addMessage(false, 'text', content);
            input.value = '';
            input.style.height = 'auto';

            // 准备数据
            // 尝试获取最新的服务器端预约ID
            if (serverAppointmentId <= 0 && window.Android && Android.getServerAppointmentId) {
                const latestId = Android.getServerAppointmentId(currentAppointmentId);
                if (latestId > 0) {
                    serverAppointmentId = latestId;
                }
            }

            const targetAppointmentId = serverAppointmentId > 0 ? serverAppointmentId : currentAppointmentId;
            
            // 如果是纯本地ID（非数字或负数），则无法发送到服务器
            if (!serverAppointmentId || serverAppointmentId <= 0) {
                 console.warn("Using local appointment ID, trying to sync...");
                 // 尝试同步或提示
            }

            const messageDTO = {
                appointmentId: parseInt(targetAppointmentId), 
                senderUserId: currentUserId,
                receiverUserId: consultantUserId,
                messageType: 'TEXT',
                content: content,
                isFromConsultant: false
            };
            
            // 使用 HTTP POST 发送消息 (比 WebSocket 更可靠)
            let baseUrl = 'http://127.0.0.1:8080/api';
            if (window.Android && Android.getBaseUrl) {
                baseUrl = Android.getBaseUrl();
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }

            const token = window.Android ? Android.getAuthToken() : '';

            fetch(baseUrl + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(messageDTO)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    console.log('Message sent via HTTP success');
                } else {
                    console.error('Failed to send message via HTTP', data);
                    // 失败尝试 WebSocket 回退
                    sendViaStomp(messageDTO);
                }
            })
            .catch(error => {
                console.error('Error sending message via HTTP', error);
                // 失败尝试 WebSocket 回退
                sendViaStomp(messageDTO);
            });
        }

        function sendViaStomp(messageDTO) {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.send", {}, JSON.stringify(messageDTO));
            } else {
                // WS 不可用，降级为 HTTP 重试
                console.warn("STOMP not connected, retrying via HTTP…");
                retrySendViaHttp(messageDTO, 1);
            }
        }

        /** WS 断连时通过 HTTP 重发消息（最多 2 次） */
        function retrySendViaHttp(messageDTO, attempt) {
            let baseUrl = 'http://127.0.0.1:8080/api';
            if (window.Android && Android.getBaseUrl) {
                baseUrl = Android.getBaseUrl();
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }
            const token = window.Android ? Android.getAuthToken() : '';
            fetch(baseUrl + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(messageDTO)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200 || data.code === 201) {
                    console.log('Message sent via HTTP retry');
                } else if (attempt < 2) {
                    setTimeout(() => retrySendViaHttp(messageDTO, attempt + 1), 1000);
                } else {
                    showToast('发送失败，请检查网络');
                }
            })
            .catch(() => {
                if (attempt < 2) {
                    setTimeout(() => retrySendViaHttp(messageDTO, attempt + 1), 1500);
                } else {
                    showToast('发送失败，请检查网络');
                }
            });
        }

        function addMessage(fromConsultant, type, content, mediaUrl, skipPersist) {
            const message = {
                fromConsultant,
                type,
                content,
                mediaUrl,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            };
            messages.push(message);
            renderMessage(message);
            scrollToBottom();

            if (
                !skipPersist &&
                window.Android &&
                window.appointmentId &&
                typeof Android.saveChatMessage === 'function'
            ) {
                try {
                    Android.saveChatMessage(
                        window.appointmentId,
                        fromConsultant,
                        type.toUpperCase(),
                        content,
                        mediaUrl || ''
                    );
                } catch (e) {
                    console.error('Save chat message failed', e);
                }
            }
        }

        function renderMessage(message) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');

            // 系统消息（通话结束等）
            if (message.type === 'system') {
                messageDiv.className = 'message system-message';

                // 通话结束消息：CALL_ENDED:video/audio:时长秒数:格式化时长
                if (message.content && message.content.startsWith('CALL_ENDED:')) {
                    const parts = message.content.split(':');
                    const callType = parts[1] === 'audio' ? '语音' : '视频';
                    const durationStr = parts[3] || (parts[2] ? parts[2] + '秒' : '0秒');
                    const icon = parts[1] === 'audio'
                        ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`
                        : `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
                    messageDiv.innerHTML = `
                        <div class="call-ended-bubble">
                            <span class="call-ended-icon">${icon}</span>
                            <span>${callType}通话已结束，时长 ${durationStr}</span>
                        </div>
                    `;
                } else {
                    messageDiv.innerHTML = `<div class="system-bubble">${escapeHtml(message.content)}</div>`;
                }
                container.appendChild(messageDiv);
                return;
            }

            messageDiv.className = `message ${message.fromConsultant ? 'consultant' : 'user'}`;

            let contentHtml = '';
            if (message.type === 'text') {
                contentHtml = `<div class="message-bubble">${escapeHtml(message.content)}</div><div class="message-time">${message.time || ''}</div>`;
            } else if (message.type === 'image') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <div class="media-preview">
                            <img src="${message.mediaUrl || ''}" alt="图片">
                        </div>
                    </div>
                    <div class="message-time">${message.time || ''}</div>
                `;
            } else if (message.type === 'video') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <button class="media-button" onclick="playMedia('video','${escapeAttr(message.mediaUrl || '')}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            点击播放视频
                        </button>
                    </div>
                    <div class="message-time">${message.time || ''}</div>
                `;
            } else if (message.type === 'audio') {
                // 语音消息：提取时长，格式为"点击播放语音 00:15"或纯时长
                const content = message.content || '';
                const mediaUrl = message.mediaUrl || '';
                // 尝试从content中提取时长（格式：数字或 mm:ss）
                const durationMatch = content.match(/(\d{1,2}:\d{2}|\d+)/);
                const duration = durationMatch ? durationMatch[1] : '';
                const durationHtml = duration ? `<span class="audio-duration">${duration}</span>` : '';
                contentHtml = `
                    <div class="message-bubble audio-bubble" onclick="playMedia('audio','${escapeAttr(mediaUrl)}')">
                        <svg class="audio-icon audio-mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10a7 7 0 0 1-14 0"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                        <svg class="audio-icon audio-playing-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        </svg>
                        ${durationHtml}
                        <span class="audio-hint audio-hint-idle">点击播放</span>
                        <span class="audio-hint audio-hint-playing" style="display: none;">正在播放</span>
                    </div>
                    <div class="message-time">${message.time || ''}</div>
                `;
            } else {
                // 其他类型当文本处理
                contentHtml = `<div class="message-bubble">${escapeHtml(message.content)}</div><div class="message-time">${message.time || ''}</div>`;
            }

            messageDiv.innerHTML = contentHtml;
            container.appendChild(messageDiv);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(value) {
            if (!value) return '';
            return String(value).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        /* ── 下拉刷新 ── */
        let _ptrStartY = 0;
        let _ptrPulling = false;

        function initPullToRefresh() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            container.addEventListener('touchstart', function(e) {
                if (container.scrollTop > 0) return; // 未在顶部，不触发
                _ptrStartY = e.touches[0].clientY;
                _ptrPulling = false;
            }, { passive: true });

            container.addEventListener('touchmove', function(e) {
                if (container.scrollTop > 0) return;
                const dy = e.touches[0].clientY - _ptrStartY;
                if (dy > 40) {
                    _ptrPulling = true;
                    document.getElementById('pullToRefresh').classList.add('pulling');
                    document.getElementById('pullToRefreshText').textContent = '释放加载更多…';
                    e.preventDefault(); // 阻止页面下拉
                }
            }, { passive: false });

            container.addEventListener('touchend', function() {
                const ptr = document.getElementById('pullToRefresh');
                if (!_ptrPulling) return;
                _ptrPulling = false;
                ptr.classList.remove('pulling');
                ptr.classList.add('refreshing');
                document.getElementById('pullToRefreshText').textContent = '加载中…';
                refreshChatHistoryFromNative();
                // 重置
                setTimeout(() => {
                    ptr.classList.remove('refreshing');
                    document.getElementById('pullToRefreshText').textContent = '下拉加载更多';
                }, 800);
            }, { passive: true });
        }

        function attachImage() {
            chooseMediaSource('image');
        }

        function attachVideo() {
            chooseMediaSource('video');
        }

        function chooseMediaSource(type) {
            if (!window.Android) {
                showToast('仅支持在APP内发送媒体');
                return;
            }
            showMediaActionSheet(type);
        }

        let mediaSheetType = '';

        function showMediaActionSheet(type) {
            mediaSheetType = type;
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.dataset.mediaType = type;
            const title = document.getElementById('mediaSheetTitle');
            if (title) {
                title.textContent = type === 'video' ? '发送视频' : '发送图片';
            }
            sheet.classList.add('visible');
        }

        function hideMediaActionSheet() {
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.classList.remove('visible');
            sheet.dataset.mediaType = '';
            mediaSheetType = '';
        }

        function handleMediaAction(action) {
            const sheet = document.getElementById('mediaActionSheet');
            const type = mediaSheetType || (sheet ? sheet.dataset.mediaType : '');
            hideMediaActionSheet();
            if (!type || !window.Android) {
                return;
            }
            const isImage = type === 'image';
            if (action === 'camera') {
                if (isImage && typeof Android.captureImage === 'function') {
                    Android.captureImage();
                    return;
                }
                if (!isImage && typeof Android.captureVideo === 'function') {
                    Android.captureVideo();
                    return;
                }
            } else if (action === 'library') {
                if (isImage && typeof Android.openImagePicker === 'function') {
                    Android.openImagePicker();
                    return;
                }
                if (!isImage && typeof Android.openVideoPicker === 'function') {
                    Android.openVideoPicker();
                    return;
                }
            }
            showToast('当前设备暂不支持该功能');
        }

        let isRecordingVoice = false;
        let isMobileDevice = false;
        let recordingStartY = 0;
        let isSlidingToCancel = false;

        // 检测是否为移动设备
        function checkMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                   || ('ontouchstart' in window);
        }

        // 切换文字输入模式
        function toggleInputMode() {
            const textArea = document.getElementById('textInputArea');
            const voiceBtn = document.getElementById('voiceMainBtn');
            const messageInput = document.getElementById('messageInput');
            
            if (textArea.style.display === 'none') {
                // 切换到文字输入模式
                textArea.style.display = 'flex';
                voiceBtn.style.display = 'none';
                if (messageInput) {
                    messageInput.focus();
                }
            } else {
                // 切换到语音输入模式
                textArea.style.display = 'none';
                voiceBtn.style.display = 'flex';
            }
        }

        // 初始化录音功能
        function initVoiceRecording() {
            isMobileDevice = checkMobileDevice();
            const voiceBtn = document.getElementById('voiceMainBtn');
            if (!voiceBtn) {
                // 备用：尝试旧的voiceBtn
                const oldVoiceBtn = document.getElementById('voiceBtn');
                if (oldVoiceBtn) {
                    bindVoiceButtonEvents(oldVoiceBtn);
                }
                return;
            }

            bindVoiceButtonEvents(voiceBtn);
        }

        function bindVoiceButtonEvents(voiceBtn) {
            if (isMobileDevice) {
                // 手机端：长按开始录音，松开发送
                voiceBtn.addEventListener('touchstart', onVoiceTouchStart, { passive: false });
                voiceBtn.addEventListener('touchmove', onVoiceTouchMove, { passive: false });
                voiceBtn.addEventListener('touchend', onVoiceTouchEnd, { passive: false });
                voiceBtn.addEventListener('touchcancel', onVoiceTouchEnd, { passive: false });
                
                // 阻止默认行为防止触发点击
                voiceBtn.addEventListener('mousedown', (e) => e.preventDefault());
            } else {
                // 电脑端：点击开始录音，再次点击发送
                voiceBtn.onclick = function() {
                    if (isRecordingVoice) {
                        stopRecordingAndSend();
                    } else {
                        startRecording();
                    }
                };
            }
        }

        function onVoiceTouchStart(e) {
            if (!window.Android) {
                showToast('仅支持在APP内录音');
                return;
            }
            e.preventDefault();
            
            recordingStartY = e.touches[0].clientY;
            isSlidingToCancel = false;
            isRecordingVoice = true;
            
            // 开始录音
            if (typeof Android.startVoiceRecord === 'function') {
                Android.startVoiceRecord();
            }
            
            // 显示录音提示
            showVoiceRecordingHint();
            updateVoiceButton();
        }

        function onVoiceTouchMove(e) {
            if (!isRecordingVoice) return;
            e.preventDefault();
            
            const currentY = e.touches[0].clientY;
            const deltaY = recordingStartY - currentY;
            
            // 向上滑动超过阈值，取消录音
            if (deltaY > 80 && !isSlidingToCancel) {
                isSlidingToCancel = true;
                updateVoiceHintState('cancel');
            } else if (deltaY <= 80 && isSlidingToCancel) {
                isSlidingToCancel = false;
                updateVoiceHintState('recording');
            }
        }

        function onVoiceTouchEnd(e) {
            if (!isRecordingVoice) return;
            e.preventDefault();
            e.stopPropagation();
            
            // 检查是否上滑取消
            if (isSlidingToCancel) {
                // 用户上滑取消录音 - 调用 cancelVoiceRecord 不发送消息
                console.log('[Voice] Cancel recording, sliding up');
                hideVoiceRecordingHint();
                isRecordingVoice = false;
                isSlidingToCancel = false;
                updateVoiceButton();
                // 调用 Android.cancelVoiceRecord() 停止录音但不发送
                if (typeof Android.cancelVoiceRecord === 'function') {
                    Android.cancelVoiceRecord();
                }
                showToast('已取消录音');
            } else {
                // 用户正常松开发送录音
                console.log('[Voice] Send recording, released');
                if (typeof Android.stopVoiceRecord === 'function') {
                    Android.stopVoiceRecord();
                }
                hideVoiceRecordingHint();
                isRecordingVoice = false;
                updateVoiceButton();
            }
        }

        function toggleVoiceRecord() {
            // 电脑端点击录音按钮的备用逻辑
            if (!isMobileDevice) {
                if (isRecordingVoice) {
                    stopRecordingAndSend();
                } else {
                    startRecording();
                }
            }
        }

        function startRecording() {
            if (!window.Android) {
                showToast('仅支持在APP内录音');
                return;
            }
            isRecordingVoice = true;
            if (typeof Android.startVoiceRecord === 'function') {
                Android.startVoiceRecord();
            }
            showVoiceRecordingHint();
            updateVoiceButton();
        }

        function stopRecordingAndSend() {
            if (typeof Android.stopVoiceRecord === 'function') {
                Android.stopVoiceRecord();
            }
            hideVoiceRecordingHint();
            isRecordingVoice = false;
            updateVoiceButton();
        }

        function showVoiceRecordingHint() {
            const hint = document.getElementById('voiceRecordingHint');
            if (hint) {
                hint.classList.add('visible');
                updateVoiceHintState('recording');
            }
        }

        function hideVoiceRecordingHint() {
            const hint = document.getElementById('voiceRecordingHint');
            if (hint) {
                hint.classList.remove('visible');
            }
        }

        function updateVoiceHintState(state) {
            const hintText = document.getElementById('voiceHintText');
            const hintSub = document.getElementById('voiceHintSub');
            const slideArea = document.getElementById('voiceSlideArea');
            
            if (!hintText || !hintSub) return;
            
            if (state === 'cancel') {
                hintText.textContent = '松开手指，取消发送';
                hintText.style.color = '#F44336';
                hintSub.textContent = '手指向下滑动';
                if (slideArea) {
                    slideArea.style.opacity = '1';
                }
            } else {
                hintText.textContent = '正在录音...';
                hintText.style.color = 'white';
                hintSub.textContent = isMobileDevice ? '上滑取消发送' : '点击发送';
                if (slideArea) {
                    slideArea.style.opacity = '0.3';
                }
            }
        }

        function updateVoiceButton() {
            // 更新主语音按钮
            const voiceMainBtn = document.getElementById('voiceMainBtn');
            if (voiceMainBtn) {
                voiceMainBtn.classList.toggle('recording', isRecordingVoice);
                if (isRecordingVoice) {
                    voiceMainBtn.innerHTML = `
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                        <span class="voice-btn-text">松开 结束</span>
                    `;
                } else {
                    voiceMainBtn.innerHTML = `
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10a7 7 0 0 1-14 0"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                        <span class="voice-btn-text">按住 说话</span>
                    `;
                }
            }
            
            // 更新旧的小语音按钮（备用）
            const voiceBtn = document.getElementById('voiceBtn');
            if (voiceBtn && voiceBtn !== voiceMainBtn) {
                voiceBtn.classList.toggle('recording', isRecordingVoice);
                if (isRecordingVoice) {
                    voiceBtn.innerHTML = `
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    `;
                } else {
                    voiceBtn.innerHTML = `
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10a7 7 0 0 1-14 0"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    `;
                }
            }
        }

        window.onVoiceRecordState = function (recording) {
            isRecordingVoice = !!recording;
            updateVoiceButton();
            if (!recording) {
                if (document.visibilityState === 'visible') {
                    // 录音结束并已发送
                }
            }
        };

        // 录音被取消
        window.onVoiceRecordCancelled = function() {
            hideVoiceRecordingHint();
            isRecordingVoice = false;
            updateVoiceButton();
            showToast('已取消录音');
        };

        window.onMediaSelected = function (type, content, mediaUri) {
            try {
                console.log('[onMediaSelected] type=' + type + ', content=' + content + ', mediaUri=' + mediaUri);
                
                // 先在UI上显示消息
                addMessage(false, (type || 'text').toLowerCase(), content, mediaUri);
                
                // 尝试获取有效的 appointmentId
                let finalAppointmentId = serverAppointmentId;
                if (finalAppointmentId <= 0 && window.Android && Android.getServerAppointmentId) {
                    try {
                        const latestId = Android.getServerAppointmentId(currentAppointmentId);
                        if (latestId > 0) {
                            finalAppointmentId = latestId;
                            serverAppointmentId = latestId;
                        }
                    } catch (e) {
                        console.error('[onMediaSelected] getServerAppointmentId failed:', e);
                    }
                }
                
                // 如果还是没有有效的 appointmentId，尝试使用 currentAppointmentId（如果它看起来是数字）
                if (finalAppointmentId <= 0 && currentAppointmentId) {
                    const parsed = parseInt(currentAppointmentId);
                    if (!isNaN(parsed) && parsed > 0) {
                        finalAppointmentId = parsed;
                    }
                }
                
                // 如果仍然没有有效的 appointmentId，跳过发送但提示用户
                if (!finalAppointmentId || finalAppointmentId <= 0) {
                    console.error('[onMediaSelected] No valid appointmentId found. serverAppointmentId=' + serverAppointmentId + ', currentAppointmentId=' + currentAppointmentId);
                    showToast('消息发送失败：预约ID无效');
                    return;
                }
                
                // 根据类型设置 messageType
                let messageType = 'TEXT';
                if (type === 'image') {
                    messageType = 'IMAGE';
                } else if (type === 'audio') {
                    messageType = 'AUDIO';
                } else if (type === 'video') {
                    messageType = 'VIDEO';
                }
                
                const messageDTO = {
                    appointmentId: finalAppointmentId,
                    senderUserId: currentUserId,
                    receiverUserId: consultantUserId,
                    messageType: messageType,
                    content: content || '',
                    mediaUrl: mediaUri || '',
                    isFromConsultant: false
                };
                
                console.log('[onMediaSelected] Sending message DTO:', JSON.stringify(messageDTO));
                
                // 获取服务器URL和token
                let baseUrl = 'http://127.0.0.1:8080/api';
                if (window.Android && Android.getBaseUrl) {
                    baseUrl = Android.getBaseUrl();
                    if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
                }
                const token = window.Android && Android.getAuthToken ? Android.getAuthToken() : '';
                
                // 发送消息到服务器
                fetch(baseUrl + '/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(messageDTO)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('发送消息失败, status=' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('[onMediaSelected] 媒体消息发送成功:', data);
                })
                .catch(error => {
                    console.error('[onMediaSelected] 发送媒体消息失败:', error);
                    showToast('消息发送失败，请重试');
                });
            } catch (e) {
                console.error('[onMediaSelected] Unexpected error:', e);
                showToast('发送消息时发生错误');
            }
        };

        // 音频播放状态回调 - 当原生播放器开始/结束播放时调用
        window.onAudioPlayingState = function(mediaUrl, isPlaying) {
            const audioBubbles = document.querySelectorAll('.audio-bubble');
            audioBubbles.forEach(function(bubble) {
                const onclick = bubble.getAttribute('onclick') || '';
                const mediaUrlAttr = bubble.getAttribute('data-media-url') || '';
                // 匹配当前播放的音频
                if (onclick.indexOf(mediaUrl) !== -1 || mediaUrlAttr.indexOf(mediaUrl) !== -1) {
                    if (isPlaying) {
                        // 显示播放状态
                        bubble.classList.add('playing');
                        const micIcon = bubble.querySelector('.audio-mic-icon');
                        const playingIcon = bubble.querySelector('.audio-playing-icon');
                        const idleHint = bubble.querySelector('.audio-hint-idle');
                        const playingHint = bubble.querySelector('.audio-hint-playing');
                        if (micIcon) micIcon.style.display = 'none';
                        if (playingIcon) playingIcon.style.display = 'block';
                        if (idleHint) idleHint.style.display = 'none';
                        if (playingHint) playingHint.style.display = 'inline';
                    } else {
                        // 恢复空闲状态
                        bubble.classList.remove('playing');
                        const micIcon = bubble.querySelector('.audio-mic-icon');
                        const playingIcon = bubble.querySelector('.audio-playing-icon');
                        const idleHint = bubble.querySelector('.audio-hint-idle');
                        const playingHint = bubble.querySelector('.audio-hint-playing');
                        if (micIcon) micIcon.style.display = 'block';
                        if (playingIcon) playingIcon.style.display = 'none';
                        if (idleHint) idleHint.style.display = 'inline';
                        if (playingHint) playingHint.style.display = 'none';
                    }
                }
            });
            if (!isPlaying) {
                audioBubbles.forEach(function(bubble) {
                    bubble.classList.remove('playing');
                });
            }
        };

        function playMedia(type, uri) {
            if (!uri) {
                showToast('媒体资源不存在');
                return;
            }
            if (window.Android && typeof Android.playMedia === 'function') {
                Android.playMedia(type, uri);
                if (type === 'audio' && typeof Android.notifyAudioPlaying === 'function') {
                    Android.notifyAudioPlaying(uri, true);
                }
            } else {
                showToast('请在APP内播放');
            }
        }

        function startCall(type) {
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '') || '咨询师';
            const appointmentId = String(serverAppointmentId > 0 ? serverAppointmentId : (currentAppointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || ''));
            const targetUserId = consultantUserId || 0;

            callType = type || 'video';
            callState = 'calling';

            // 显示呼出通知
            const typeLabel = callType === 'audio' ? '语音' : '视频';
            showCallStatusNotification('calling', `正在呼叫 ${consultantName}...`, typeLabel + '通话');

            if (!window.Android) {
                showToast('请在APP内发起通话');
                return;
            }

            if (!appointmentId || !targetUserId) {
                showToast('缺少通话信息，无法发起通话');
                return;
            }

            if (typeof Android.startOutgoingCall === 'function') {
                Android.startOutgoingCall(appointmentId, consultantName, targetUserId, callType);
                return;
            }

            showToast('当前版本暂不支持发起通话');
        }

        function endConsultation() {
            const confirmEnd = confirm('确认结束本次咨询吗？结束后将进入服务评价页面。');
            if (!confirmEnd) return;

            const appointmentId = window.appointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || '';
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '');

            if (window.Android && typeof Android.endConsultation === 'function') {
                Android.endConsultation(appointmentId);
            }

            // 跳转到评价页面
            const ratingUrl = `rating.html?appointmentId=${encodeURIComponent(appointmentId)}&consultantName=${encodeURIComponent(consultantName)}`;
            if (window.Android && typeof Android.navigateToRating === 'function') {
                Android.navigateToRating(ratingUrl);
            } else {
                window.location.href = ratingUrl;
            }
        }

        // 检测咨询是否应该结束（可以通过Android接口或时间判断）
        function checkConsultationStatus() {
            // 默认显示结束咨询按钮，让用户可以主动结束咨询
            const endSection = document.getElementById('endConsultationSection');
            if (endSection) {
                endSection.style.display = 'block';
            }
        }

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 输入框自动调整高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Enter键发送（Shift+Enter换行）
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面加载时初始化（Java onPageFinished 后调用 onNativeReady）
        window.onNativeReady = function() {
            console.log('[init] onNativeReady fired');
            hideLoading();
            loadChatData();
            initVoiceRecording();
        };

        // JavaScript 端 fallback：DOMContentLoaded 时也初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[init] DOMContentLoaded fired, Android available:', typeof Android !== 'undefined');
            hideLoading();
            loadChatData();
            initVoiceRecording();
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                hideMediaActionSheet();
            }
        });
    </script>
</body>
</html>
