<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>咨询聊天</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 24px;
            background: var(--surface);
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .consultant-info {
            text-align: center;
        }

        .consultant-name {
            font-size: 18px;
            font-weight: 600;
            color: #6FA6F8;
            margin-bottom: 4px;
        }

        .child-info {
            font-size: 14px;
            color: #6FA6F8;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .appointment-info {
            font-size: 14px;
            color: #999999;
        }

        .call-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
        }

        .call-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #E0E0E0;
            background: white;
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .call-btn svg {
            width: 20px;
            height: 20px;
        }

        .call-btn:active {
            background: #F5F5F5;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #F5F5F5;
            padding-bottom: 200px;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.consultant {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.consultant .message-bubble {
            background: white;
            color: #333333;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: #6FA6F8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
            text-align: center;
        }

        .input-container {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 0px);
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 150;
        }

        .input-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:active {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(0.95);
        }

        .action-btn.recording {
            background: rgba(111, 166, 248, 0.15);
            color: #6FA6F8;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 24px;
            font-size: 16px;
            background: white;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #6FA6F8;
        }

        .send-btn {
            padding: 12px 24px;
            border-radius: 24px;
            background: #6FA6F8;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:active {
            background: #4A8AE8;
            transform: scale(0.98);
        }

        .media-preview {
            margin-top: 8px;
            border-radius: 8px;
            overflow: hidden;
            max-width: 200px;
        }

        .media-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .media-button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 16px;
            background: rgba(111, 166, 248, 0.15);
            color: #1d4ed8;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .media-button svg {
            flex-shrink: 0;
        }

        .media-sheet {
            position: fixed;
            inset: 0;
            z-index: 400;
            pointer-events: none;
        }

        .media-sheet .sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .media-sheet .sheet-panel {
            position: absolute;
            left: 50%;
            bottom: -320px;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px 20px 32px;
            box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.08);
            transition: bottom 0.25s ease;
        }

        .media-sheet.visible {
            pointer-events: auto;
        }

        .media-sheet.visible .sheet-backdrop {
            opacity: 1;
        }

        .media-sheet.visible .sheet-panel {
            bottom: 0;
        }

        .sheet-handle {
            width: 50px;
            height: 5px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 auto 16px;
        }

        .sheet-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3345;
        }

        .sheet-option {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            text-align: left;
            background: rgba(111, 166, 248, 0.12);
            color: #2c3345;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sheet-option span {
            font-weight: 600;
        }

        .sheet-option small {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 400;
            color: #627089;
        }

        .sheet-option:active {
            transform: scale(0.97);
            background: rgba(111, 166, 248, 0.2);
        }

        .sheet-option.cancel {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #627089;
            font-weight: 500;
        }
    </style>
</head>
<body class="chat-page">
    <div class="chat-container">
    <div class="top-app-bar glass">
        <div class="title" id="toolbarTitle">咨询聊天</div>
    </div>

        <div class="chat-header">
            <div class="consultant-info">
                <div class="consultant-name" id="consultantName">咨询师</div>
                <div class="child-info" id="childInfo" style="display: none;"></div>
                <div class="appointment-info" id="appointmentInfo" style="display: none;"></div>
            </div>
        </div>

        <div class="call-actions">
            <div class="call-btn" onclick="startCall('audio')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91" />
                </svg>
                语音通话
            </div>
            <div class="call-btn" onclick="startCall('video')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                视频通话
            </div>
        </div>

        <div class="end-consultation-section" id="endConsultationSection" style="display: none;">
            <button class="btn btn-secondary" onclick="endConsultation()" style="width: calc(100% - 32px); margin: 16px;">
                结束咨询并评价
            </button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- 消息将动态添加到这里 -->
        </div>

        <div class="input-container">
            <div class="input-actions">
                <button class="action-btn" onclick="attachImage()" title="发送图片">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>
                <button class="action-btn" id="voiceBtn" onclick="toggleVoiceRecord()" title="语音消息">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10a7 7 0 0 1-14 0"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
            </div>
            <textarea class="message-input" id="messageInput" placeholder="和咨询师说点什么…" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="media-sheet" id="mediaActionSheet" data-media-type="">
        <div class="sheet-backdrop" onclick="hideMediaActionSheet()"></div>
        <div class="sheet-panel">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="mediaSheetTitle">发送图片</div>
            <button type="button" class="sheet-option" onclick="handleMediaAction('camera')">
                <span>使用相机</span>
                <small>即时拍摄并发送</small>
            </button>
            <button type="button" class="sheet-option" onclick="handleMediaAction('library')">
                <span>从相册选择</span>
                <small>选取已保存的照片或视频</small>
            </button>
            <button type="button" class="sheet-option cancel" onclick="hideMediaActionSheet()">取消</button>
        </div>
    </div>

    <script src="js/sockjs.min.js"></script>
    <script src="js/stomp.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let messages = [];
        let historyLoaded = false;
        let shouldShowWelcome = true;
        let stompClient = null;
        let currentAppointmentId = '';
        let serverAppointmentId = -1;
        let currentUserId = -1;
        let consultantUserId = 2;

        function loadChatData() {
            // 从URL参数或Android接口获取数据
            const consultantName = getUrlParam('consultant_name') || getUrlParam('consultant') || '咨询师';
            const date = getUrlParam('date') || '';
            const slot = getUrlParam('slot') || '';
            const appointmentId = getUrlParam('appointment_id') || getUrlParam('appointmentId') || '';
            const childId = getUrlParam('childId') || '';
            const childName = getUrlParam('childName') || '';
            
            serverAppointmentId = parseInt(getUrlParam('serverAppointmentId') || '-1');
            const cId = getUrlParam('consultantUserId');
            if (cId) {
                consultantUserId = parseInt(cId);
            }

            document.getElementById('consultantName').textContent = consultantName + ' 咨询师';
            const toolbarTitle = document.getElementById('toolbarTitle');
            if (toolbarTitle) {
                toolbarTitle.textContent = consultantName + ' 咨询师';
            }

            // 显示孩子信息
            if (childName) {
                const childInfoEl = document.getElementById('childInfo');
                childInfoEl.textContent = `咨询对象：${childName}`;
                childInfoEl.style.display = 'block';
            } else if (childId && window.Android && typeof Android.getChildProfileById === 'function') {
                // 如果只有childId，从数据库获取孩子信息
                try {
                    const childJson = Android.getChildProfileById(childId);
                    const childProfile = JSON.parse(childJson);
                    if (childProfile && childProfile.name) {
                        const childInfoEl = document.getElementById('childInfo');
                        childInfoEl.textContent = `咨询对象：${childProfile.name}`;
                        childInfoEl.style.display = 'block';
                    }
                } catch (e) {
                    console.error('Failed to load child profile', e);
                }
            }

            if (date && slot) {
                const infoEl = document.getElementById('appointmentInfo');
                infoEl.textContent = `预约时间：${date} ${slot}`;
                infoEl.style.display = 'block';
            }

            // 保存appointmentId供后续使用
            window.appointmentId = appointmentId;
            currentAppointmentId = appointmentId;

            // 加载历史消息
            loadHistoryMessages();
            
            // 初始化WebSocket连接
            connectWebSocket();
        }

        function connectWebSocket() {
            if (!window.Android || !Android.getAuthToken) {
                console.warn("Android interface not available");
                return;
            }

            const token = Android.getAuthToken();
            currentUserId = Android.getUserId();

            if (!token) {
                console.warn("No auth token available");
                return;
            }

            // 动态获取服务器地址（不再 fallback 硬编码 127.0.0.1）
            if (!Android.getBaseUrl) {
                console.warn("Android.getBaseUrl not available");
                return;
            }
            let baseUrl = Android.getBaseUrl();
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            const wsUrl = baseUrl + '/ws';

            const socket = new SockJS(wsUrl);
            stompClient = Stomp.over(socket);

            // 禁用 STOMP debug 日志
            stompClient.debug = null;

            // Token 放入 STOMP CONNECT 帧的 Authorization 头，供 WebSocketChannelInterceptor 验证
            stompClient.connect(
                { 'Authorization': 'Bearer ' + token },
                function (frame) {
                    console.log('STOMP Connected: ' + frame);

                    // 订阅个人消息队列
                    stompClient.subscribe('/user/queue/messages', function (messageOutput) {
                        const message = JSON.parse(messageOutput.body);
                        handleIncomingMessage(message);
                    });

                    stompClient.subscribe('/user/queue/webrtc', function (messageOutput) {
                        const signal = JSON.parse(messageOutput.body);
                        handleWebRTCSignal(signal);
                    });

                    // 上线通知
                    stompClient.send("/app/chat.online", {}, JSON.stringify(currentUserId));

                }, function (error) {
                    console.error('STOMP error: ' + error);
                    setTimeout(connectWebSocket, 5000);
                }
            );
        }
        
        function handleIncomingMessage(messageDTO) {
            if (messageDTO.senderUserId == currentUserId) {
                return;
            }

            const isFromConsultant = messageDTO.isFromConsultant;
            const type = messageDTO.messageType.toLowerCase();
            const content = messageDTO.content;
            const mediaUrl = messageDTO.mediaUrl;
            
            addMessage(isFromConsultant, type, content, mediaUrl, false); 
        }

        function handleWebRTCSignal(signal) {
            if (!signal || !signal.type) return;
            const targetAppointmentId = serverAppointmentId > 0 ? String(serverAppointmentId) : String(currentAppointmentId);
            if (signal.appointmentId && targetAppointmentId && String(signal.appointmentId) !== targetAppointmentId) {
                return;
            }
            if (signal.type === 'call') {
                startIncomingCall(signal, targetAppointmentId);
            }
        }

        function startIncomingCall(signal, fallbackAppointmentId) {
            if (!window.Android) return;
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '') || '咨询师';
            const appointmentId = signal.appointmentId ? String(signal.appointmentId) : String(fallbackAppointmentId || '');
            const targetUserId = signal.fromUserId || 0;
            const callType = signal.data && signal.data.callType ? signal.data.callType : 'video';

            if (typeof Android.startVideoCallWithType === 'function') {
                Android.startVideoCallWithType(appointmentId, consultantName, targetUserId, callType);
            } else if (typeof Android.startVideoCall === 'function') {
                Android.startVideoCall(appointmentId, consultantName, targetUserId);
            }
        }

        function loadHistoryMessages() {
            if (!window.Android || !window.appointmentId || typeof Android.getChatHistory !== 'function') {
                return;
            }
            try {
                const historyJson = Android.getChatHistory(window.appointmentId) || '[]';
                const history = JSON.parse(historyJson);
                history.forEach(record => {
                    addMessage(record.fromConsultant, record.type.toLowerCase(), record.content, record.mediaUri, true);
                });
                // 是否显示欢迎语改由服务器控制，这里不再本地生成
                shouldShowWelcome = false;
                if (typeof Android.markAppointmentChatted === 'function') {
                    Android.markAppointmentChatted(window.appointmentId);
                }
                historyLoaded = true;
            } catch (e) {
                console.error('Load history failed', e);
                shouldShowWelcome = false;
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;

            // 先在UI上显示（乐观更新）
            addMessage(false, 'text', content);
            input.value = '';
            input.style.height = 'auto';

            // 准备数据
            // 尝试获取最新的服务器端预约ID
            if (serverAppointmentId <= 0 && window.Android && Android.getServerAppointmentId) {
                const latestId = Android.getServerAppointmentId(currentAppointmentId);
                if (latestId > 0) {
                    serverAppointmentId = latestId;
                }
            }

            const targetAppointmentId = serverAppointmentId > 0 ? serverAppointmentId : currentAppointmentId;
            
            // 如果是纯本地ID（非数字或负数），则无法发送到服务器
            if (!serverAppointmentId || serverAppointmentId <= 0) {
                 console.warn("Using local appointment ID, trying to sync...");
                 // 尝试同步或提示
            }

            const messageDTO = {
                appointmentId: parseInt(targetAppointmentId), 
                senderUserId: currentUserId,
                receiverUserId: consultantUserId,
                messageType: 'TEXT',
                content: content,
                isFromConsultant: false
            };
            
            // 使用 HTTP POST 发送消息 (比 WebSocket 更可靠)
            let baseUrl = 'http://127.0.0.1:8080/api';
            if (window.Android && Android.getBaseUrl) {
                baseUrl = Android.getBaseUrl();
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            }

            const token = window.Android ? Android.getAuthToken() : '';

            fetch(baseUrl + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(messageDTO)
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    console.log('Message sent via HTTP success');
                } else {
                    console.error('Failed to send message via HTTP', data);
                    // 失败尝试 WebSocket 回退
                    sendViaStomp(messageDTO);
                }
            })
            .catch(error => {
                console.error('Error sending message via HTTP', error);
                // 失败尝试 WebSocket 回退
                sendViaStomp(messageDTO);
            });
        }

        function sendViaStomp(messageDTO) {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.send", {}, JSON.stringify(messageDTO));
            } else {
                console.warn("STOMP not connected, message send failed");
            }
        }

        function addMessage(fromConsultant, type, content, mediaUrl, skipPersist) {
            const message = {
                fromConsultant,
                type,
                content,
                mediaUrl,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            };
            messages.push(message);
            renderMessage(message);
            scrollToBottom();

            if (
                !skipPersist &&
                window.Android &&
                window.appointmentId &&
                typeof Android.saveChatMessage === 'function'
            ) {
                try {
                    Android.saveChatMessage(
                        window.appointmentId,
                        fromConsultant,
                        type.toUpperCase(),
                        content,
                        mediaUrl || ''
                    );
                } catch (e) {
                    console.error('Save chat message failed', e);
                }
            }
        }

        function renderMessage(message) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.fromConsultant ? 'consultant' : 'user'}`;

            let contentHtml = '';
            if (message.type === 'text') {
                contentHtml = `<div class="message-bubble">${escapeHtml(message.content)}</div>`;
            } else if (message.type === 'image') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <div class="media-preview">
                            <img src="${message.mediaUrl || ''}" alt="图片">
                        </div>
                    </div>
                `;
            } else if (message.type === 'video') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <button class="media-button" onclick="playMedia('video','${escapeAttr(message.mediaUrl || '')}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            点击播放视频
                        </button>
                    </div>
                `;
            } else if (message.type === 'audio') {
                contentHtml = `
                    <div class="message-bubble">
                        <div>${escapeHtml(message.content)}</div>
                        <button class="media-button" onclick="playMedia('audio','${escapeAttr(message.mediaUrl || '')}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 3v18l15-9-15-9z"/>
                            </svg>
                            点击播放语音
                        </button>
                    </div>
                `;
            }

            messageDiv.innerHTML = contentHtml;
            container.appendChild(messageDiv);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(value) {
            if (!value) return '';
            return String(value).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        function attachImage() {
            chooseMediaSource('image');
        }

        function attachVideo() {
            chooseMediaSource('video');
        }

        function chooseMediaSource(type) {
            if (!window.Android) {
                showToast('仅支持在APP内发送媒体');
                return;
            }
            showMediaActionSheet(type);
        }

        let mediaSheetType = '';

        function showMediaActionSheet(type) {
            mediaSheetType = type;
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.dataset.mediaType = type;
            const title = document.getElementById('mediaSheetTitle');
            if (title) {
                title.textContent = type === 'video' ? '发送视频' : '发送图片';
            }
            sheet.classList.add('visible');
        }

        function hideMediaActionSheet() {
            const sheet = document.getElementById('mediaActionSheet');
            if (!sheet) return;
            sheet.classList.remove('visible');
            sheet.dataset.mediaType = '';
            mediaSheetType = '';
        }

        function handleMediaAction(action) {
            const sheet = document.getElementById('mediaActionSheet');
            const type = mediaSheetType || (sheet ? sheet.dataset.mediaType : '');
            hideMediaActionSheet();
            if (!type || !window.Android) {
                return;
            }
            const isImage = type === 'image';
            if (action === 'camera') {
                if (isImage && typeof Android.captureImage === 'function') {
                    Android.captureImage();
                    return;
                }
                if (!isImage && typeof Android.captureVideo === 'function') {
                    Android.captureVideo();
                    return;
                }
            } else if (action === 'library') {
                if (isImage && typeof Android.openImagePicker === 'function') {
                    Android.openImagePicker();
                    return;
                }
                if (!isImage && typeof Android.openVideoPicker === 'function') {
                    Android.openVideoPicker();
                    return;
                }
            }
            showToast('当前设备暂不支持该功能');
        }

        let isRecordingVoice = false;

        function toggleVoiceRecord() {
            if (!window.Android) {
                showToast('仅支持在APP内录音');
                return;
            }
            if (!isRecordingVoice) {
                if (typeof Android.startVoiceRecord === 'function') {
                    Android.startVoiceRecord();
                }
            } else if (typeof Android.stopVoiceRecord === 'function') {
                Android.stopVoiceRecord();
            }
        }

        function updateVoiceButton() {
            const btn = document.getElementById('voiceBtn');
            if (!btn) return;
            btn.classList.toggle('recording', isRecordingVoice);
        }

        window.onVoiceRecordState = function (recording) {
            isRecordingVoice = !!recording;
            updateVoiceButton();
            if (!recording) {
                // Check if page is unloading
                if (document.visibilityState === 'visible') {
                    showToast('录音结束，语音将发送');
                }
            }
        };

        window.onMediaSelected = function (type, content, mediaUri) {
            addMessage(false, (type || 'text').toLowerCase(), content, mediaUri);
        };

        function playMedia(type, uri) {
            if (!uri) {
                showToast('媒体资源不存在');
                return;
            }
            if (window.Android && typeof Android.playMedia === 'function') {
                Android.playMedia(type, uri);
            } else {
                showToast('请在APP内播放');
            }
        }

        function startCall(type) {
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '') || '咨询师';
            const appointmentId = String(serverAppointmentId > 0 ? serverAppointmentId : (currentAppointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || ''));
            const targetUserId = consultantUserId || 0;

            if (!window.Android) {
                showToast('请在APP内发起通话');
                return;
            }

            if (!appointmentId || !targetUserId) {
                showToast('缺少通话信息，无法发起通话');
                return;
            }

            if (typeof Android.startOutgoingCall === 'function') {
                Android.startOutgoingCall(appointmentId, consultantName, targetUserId, type);
                return;
            }

            showToast('当前版本暂不支持发起通话');
        }

        function endConsultation() {
            const confirmEnd = confirm('确认结束本次咨询吗？结束后将进入服务评价页面。');
            if (!confirmEnd) return;

            const appointmentId = window.appointmentId || getUrlParam('appointmentId') || getUrlParam('appointment_id') || '';
            const consultantName = document.getElementById('consultantName').textContent.replace(' 咨询师', '');

            if (window.Android && typeof Android.endConsultation === 'function') {
                Android.endConsultation(appointmentId);
            }

            // 跳转到评价页面
            const ratingUrl = `rating.html?appointmentId=${encodeURIComponent(appointmentId)}&consultantName=${encodeURIComponent(consultantName)}`;
            if (window.Android && typeof Android.navigateToRating === 'function') {
                Android.navigateToRating(ratingUrl);
            } else {
                window.location.href = ratingUrl;
            }
        }

        // 检测咨询是否应该结束（可以通过Android接口或时间判断）
        function checkConsultationStatus() {
            if (window.Android && typeof Android.isConsultationEnded === 'function') {
                try {
                    const isEnded = Android.isConsultationEnded(window.appointmentId || '');
                    if (isEnded) {
                        document.getElementById('endConsultationSection').style.display = 'block';
                    }
                } catch (e) {
                    console.error('Check consultation status failed', e);
                }
            } else {
                // 默认显示结束按钮（可以根据实际需求调整）
                document.getElementById('endConsultationSection').style.display = 'block';
            }
        }

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 输入框自动调整高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Enter键发送（Shift+Enter换行）
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadChatData();
            // 欢迎消息由服务器端在预约确认时发送，这里不再在本地生成
            setTimeout(checkConsultationStatus, 1000);
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                hideMediaActionSheet();
            }
        });
    </script>
</body>
</html>
