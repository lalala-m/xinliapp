    <style>
/* Material Design 3 + BlaBlaCar风格样式 */
:root {
    --primary-color: #6FA6F8;
    --primary-dark: #4A8AE8;
    --secondary-color: #B7BCC3;
    --background: #FFFFFF;
    --surface: #F9FAFB;
    --text-primary: #2C3345;
    --text-secondary: #627089;
    --text-hint: #9BA5BF;
    --border-radius: 20px;
    --spacing: 16px;
    --shadow: 0 10px 30px rgba(69, 110, 255, 0.08);
    --shadow-hover: 0 16px 36px rgba(69, 110, 255, 0.16);
    --bottom-nav-height: 78px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* 移除所有元素的蓝色高亮 */
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 允许输入框和文本区域选择文本 */
input, textarea, [contenteditable] {
    -webkit-user-select: text;
    user-select: text;
}

/* iPhone底部安全区域适配 - 确保不会被系统导航栏遮挡 */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
    body {
        padding-bottom: calc(90px + env(safe-area-inset-bottom));
    }
}

@supports not (padding-bottom: env(safe-area-inset-bottom)) {
    body {
        padding-bottom: 90px;
    }
}

/* 默认值作为后备 */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(180deg, #F4F7FF 0%, #FFFFFF 60%);
    color: var(--text-primary);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    max-width: 520px;
    margin: 0 auto;
    overflow-x: hidden;
}

/* 毛玻璃效果 */
.glass {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

/* 顶部导航栏 */
.top-app-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 18px;
    padding-top: calc(18px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.top-app-bar .back-btn {
    position: absolute;
    left: 8px;
    top: calc(env(safe-area-inset-top));
    width: 56px;
    height: 56px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.2s, transform 0.2s;
    padding: 0;
    /* 增加点击区域灵敏度 */
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

.top-app-bar .back-btn:active {
    transform: scale(0.94);
}

.top-app-bar .back-btn .nav-icon {
    width: 28px;
    height: 28px;
    /* 确保图标不拦截点击事件 */
    pointer-events: none;
}

.top-app-bar .title {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    pointer-events: none;
}

/* 卡片样式 */
.card {
    position: relative;
    background: var(--background);
    border-radius: var(--border-radius);
    padding: var(--spacing);
    margin: var(--spacing);
    box-shadow: var(--shadow);
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    outline: none;
    cursor: pointer;
}

.card.static-card {
    cursor: default;
}

.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(111, 166, 248, 0.15), transparent);
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
}

.card:not(.static-card):active {
    transform: scale(0.97);
    box-shadow: var(--shadow-hover);
}

.card:not(.static-card):active::before {
    opacity: 1;
    transform: scale(1);
}

.card:focus-visible {
    outline: none;
    box-shadow: var(--shadow-hover);
}

/* 按钮样式 */
.btn {
    position: relative;
    padding: 14px 24px;
    border-radius: var(--border-radius);
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 56px;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
}

.btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.2);
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: inherit;
}

.btn:active::before {
    opacity: 1;
    transform: scale(1);
}

.btn-primary {
    background: var(--primary-color);
    color: white;
    box-shadow: 0 4px 12px rgba(111, 166, 248, 0.3);
}

.btn-primary:active {
    transform: scale(0.96);
    box-shadow: 0 2px 8px rgba(111, 166, 248, 0.4);
}

.btn-secondary {
    background: transparent;
    color: var(--primary-color);
    border: 2px solid var(--primary-color);
}

.btn-secondary::before {
    background: rgba(111, 166, 248, 0.1);
}

.btn-secondary:active {
    transform: scale(0.96);
    background: rgba(111, 166, 248, 0.05);
}

/* 输入框样式 */
.input-group {
    margin-bottom: var(--spacing);
}

.input-label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
}

.input-field {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #E0E0E0;
    border-radius: var(--border-radius);
    font-size: 16px;
    background: var(--background);
    transition: all 0.2s;
}

.input-field:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(111, 166, 248, 0.1);
}

/* 底部导航栏 */
.bottom-nav {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 0px);
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0, 0, 0, 0.05);
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    z-index: 100;
    min-height: var(--bottom-nav-height);
}

.nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
}

.nav-item.active {
    color: var(--primary-color);
}

.nav-item:active {
    transform: scale(0.95);
}

.nav-icon {
    width: 24px;
    height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
}

.nav-label {
    font-size: 12px;
}

/* 内容区域 */
.content {
    padding: var(--spacing);
    padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)); /* 为底部导航留空间 */
}

/* 列表项 */
.list-item {
    background: var(--background);
    border-radius: var(--border-radius);
    padding: var(--spacing);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
}

.list-item:active {
    transform: scale(0.98);
    box-shadow: var(--shadow-hover);
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 48px var(--spacing);
    color: var(--text-hint);
}

.empty-state-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    opacity: 0.3;
}

/* 工具类 */
.text-center {
    text-align: center;
}

.mt-16 {
    margin-top: 16px;
}

.mb-16 {
    margin-bottom: 16px;
}

.p-16 {
    padding: 16px;
}

.flex {
    display: flex;
}

.flex-center {
    display: flex;
    align-items: center;
    justify-content: center;
}

.gap-8 {
    gap: 8px;
}

.gap-16 {
    gap: 16px;
}

/* Profile enhancements */
.profile-hero {
    margin-top: 16px;
    padding: 24px;
    background: linear-gradient(135deg, #BDEBC8 0%, #A9C9FF 100%);
    color: #1E2A3B;
    box-shadow: none;
}

.profile-hero .hero-action {
    margin-top: 20px;
    width: 100%;
    background: rgba(30, 42, 59, 0.85);
    color: #FFFFFF;
}

.profile-hero .hero-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 16px;
}

.profile-hero .hero-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
}

.profile-hero .hero-subtitle {
    font-size: 14px;
    opacity: 0.8;
}

.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.2);
    color: #1E2A3B;
    font-size: 13px;
    margin-top: 16px;
}

.section-title {
    font-size: 15px;
    color: var(--text-secondary);
    margin: 8px 16px;
    font-weight: 600;
}

.quick-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 12px 0;
}

.quick-stat-card {
    background: var(--background);
    border-radius: var(--border-radius);
    padding: 16px;
    box-shadow: var(--shadow);
    min-height: 94px;
}

.quick-stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
}

.quick-stat-value {
    font-size: 20px;
    font-weight: 700;
}

.quick-stat-sub {
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.85;
    margin-top: 6px;
}

.consultant-item {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}

.consultant-item:active {
    transform: scale(0.98);
    opacity: 0.8;
}

        window.hideLoading = function() {

            var el = document.getElementById('initialLoading');
            if (el) el.style.display = 'none';
        };

            50% { transform: translateY(-2px); }
        }

        /* 正在播放状态的文字样式 */
        .audio-hint-playing {
            color: #4CAF50 !important;
            font-weight: 600;
            opacity: 1 !important;
            animation: playing-text-pulse 1s ease-in-out infinite;
        }

        .message.user .audio-hint-playing {
            color: rgba(255, 255, 255, 0.95) !important;
        }

        @keyframes playing-text-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 播放图标的动画效果 */
        .audio-playing-icon {
            animation: playing-icon-bounce 0.6s ease-in-out infinite;
        }

        @keyframes playing-icon-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .media-sheet {
            position: fixed;
            inset: 0;
            z-index: 400;
            pointer-events: none;
        }

        .media-sheet .sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .media-sheet .sheet-panel {
            position: absolute;
            left: 50%;
            bottom: -320px;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px 20px 32px;
            box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.08);
            transition: bottom 0.25s ease;
        }

        .media-sheet.visible {
            pointer-events: auto;
        }

        .media-sheet.visible .sheet-backdrop {
            opacity: 1;
        }

        .media-sheet.visible .sheet-panel {
            bottom: 0;
        }

        .sheet-handle {
            width: 50px;
            height: 5px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 auto 16px;
        }

        .sheet-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3345;
        }

        .sheet-option {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            text-align: left;
            background: rgba(111, 166, 248, 0.12);
            color: #2c3345;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sheet-option span {
            font-weight: 600;
        }

        .sheet-option small {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 400;
            color: #627089;
        }

        .sheet-option:active {
            transform: scale(0.97);
            background: rgba(111, 166, 248, 0.2);
        }

        .sheet-option.cancel {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #627089;
            font-weight: 500;
        }

        /* ============================================
           通话状态通知样式（像微信那样）
           ============================================ */

        .call-notification-container {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            width: calc(100% - 32px);
            max-width: 400px;
        }

        .call-notification {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: callNotifSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        @keyframes callNotifSlideIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.85); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .call-notification.fade-out {
            animation: callNotifFadeOut 0.3s ease forwards;
        }

        @keyframes callNotifFadeOut {
            to { opacity: 0; transform: translateY(-15px) scale(0.9); }
        }

        .call-notif-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .call-notif-icon svg {
            width: 26px;
            height: 26px;
        }

        .call-notif-icon.calling {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            animation: callNotifPulse 1.5s ease-in-out infinite;
        }

        .call-notif-icon.connected {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
        }

        .call-notif-icon.ended, .call-notif-icon.rejected {
            background: linear-gradient(135deg, #9E9E9E, #BDBDBD);
        }

        .call-notif-icon.error {
            background: linear-gradient(135deg, #F44336, #EF5350);
        }

        @keyframes callNotifPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .call-notif-content {
            flex: 1;
            min-width: 0;
        }

        .call-notif-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }

        .call-notif-subtitle {
            font-size: 13px;
            color: #666;
        }

        .call-ringing-dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 8px;
        }

        .call-ringing-dots span {
            width: 5px;
            height: 5px;
            background: #4CAF50;
            border-radius: 50%;
            animation: ringDot 1.2s ease-in-out infinite;
        }

        .call-ringing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .call-ringing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes ringDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .call-notif-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .call-notif-btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .call-notif-btn.accept {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
        }

        .call-notif-btn.reject {
            background: #F44336;
            color: white;
        }

        .call-notif-btn:active {
            transform: scale(0.95);
        }

        .call-notif-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .call-notif-close svg {
            width: 16px;
            height: 16px;
            stroke: #999;
        }

        /* ============================================
           微信风格录音提示
           ============================================ */

        .voice-recording-hint {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .voice-recording-hint.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .voice-hint-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: white;
        }

        .voice-hint-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: voiceHintPulse 1s ease-in-out infinite;
        }

        @keyframes voiceHintPulse {
            0%, 100% { transform: scale(1); background: rgba(255, 255, 255, 0.15); }
            50% { transform: scale(1.1); background: rgba(255, 255, 255, 0.25); }
        }

        .voice-hint-icon svg {
            width: 40px;
            height: 40px;
        }

        .voice-hint-text {
            font-size: 18px;
            font-weight: 600;
        }

        .voice-hint-sub {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 录音波形动画 */
        .voice-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 40px;
        }

        .voice-wave span {
            width: 4px;
            background: white;
            border-radius: 2px;
            animation: voiceWave 0.6s ease-in-out infinite;
        }

        .voice-wave span:nth-child(1) { animation-delay: 0s; height: 20px; }
        .voice-wave span:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .voice-wave span:nth-child(3) { animation-delay: 0.2s; height: 25px; }
        .voice-wave span:nth-child(4) { animation-delay: 0.3s; height: 35px; }
        .voice-wave span:nth-child(5) { animation-delay: 0.4s; height: 28px; }

        @keyframes voiceWave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        /* 取消录音提示 */
        .voice-hint-cancel {
            position: absolute;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .voice-cancel-icon {
            width: 60px;
            height: 60px;
            background: rgba(244, 67, 54, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-cancel-text {
            font-size: 12px;
            color: #F44336;
            background: white;
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* 发送提示 */
        .voice-hint-send {
            position: absolute;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .voice-send-icon {
            width: 60px;
            height: 60px;
            background: rgba(76, 175, 80, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-send-text {
            font-size: 12px;
            color: #4CAF50;
            background: white;
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* 手指滑动取消区域 */
        .voice-slide-area {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }

        .voice-slide-area svg {
            width: 30px;
            height: 30px;
            opacity: 0.7;
        }

        .voice-slide-area span {
            font-size: 11px;
            opacity: 0.7;
        }
    </style>
</head>
<body class="chat-page">
    <div id="initialLoading">
        <div class="spinner"></div>
        <div class="text">正在加载聊天...</div>
    </div>
    <div class="chat-container">
    <div class="top-app-bar glass">
        <div class="title" id="toolbarTitle">咨询聊天</div>
    </div>

        <div class="chat-header">
            <div class="consultant-info">
                <div class="consultant-name" id="consultantName">咨询师</div>
                <div class="child-info" id="childInfo" style="display: none;"></div>
                <div class="appointment-info" id="appointmentInfo" style="display: none;"></div>
            </div>
        </div>

        <div class="call-actions">
            <div class="call-btn" onclick="startCall('audio')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91" />
                </svg>
                语音通话
            </div>
            <div class="call-btn" onclick="startCall('video')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                视频通话
            </div>
        </div>

        <div class="end-consultation-section" id="endConsultationSection">
            <button class="btn btn-secondary" onclick="endConsultation()" style="width: calc(100% - 32px); margin: 16px;">
                结束咨询并评价
            </button>
        </div>

        <div class="pull-to-refresh" id="pullToRefresh">
            <div class="spinner"></div>
            <span id="pullToRefreshText">下拉加载更多</span>
        </div>
        <div class="messages-container" id="messagesContainer">
            <!-- 消息将动态添加到这里 -->
        </div>

        <div class="input-container">
            <!-- 小按钮：图片上传 -->
            <button class="action-btn" onclick="attachImage()" title="发送图片">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            </button>
            
            <!-- 主要的语音输入大按钮 - 按住说话 -->
            <button class="voice-main-btn" id="voiceMainBtn" title="按住说话">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10a7 7 0 0 1-14 0"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <span class="voice-btn-text">按住 说话</span>
            </button>
            
            <!-- 切换到文字输入的按钮 -->
            <button class="action-btn text-toggle-btn" onclick="toggleInputMode()" title="切换到文字输入">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
            </button>
            
            <!-- 文字输入区域 - 默认隐藏 -->
            <div class="text-input-area" id="textInputArea" style="display: none;">
                <textarea class="message-input" id="messageInput" placeholder="和咨询师说点什么…" rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <div class="media-sheet" id="mediaActionSheet" data-media-type="">
        <div class="sheet-backdrop" onclick="hideMediaActionSheet()"></div>
        <div class="sheet-panel">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="mediaSheetTitle">发送图片</div>
            <button type="button" class="sheet-option" onclick="handleMediaAction('camera')">
                <span>使用相机</span>
                <small>即时拍摄并发送</small>
            </button>
            <button type="button" class="sheet-option" onclick="handleMediaAction('library')">
                <span>从相册选择</span>
                <small>选取已保存的照片或视频</small>
            </button>
            <button type="button" class="sheet-option cancel" onclick="hideMediaActionSheet()">取消</button>
        </div>
    </div>

    <!-- 通话状态通知（像微信那样浮动显示） -->
    <div class="call-notification-container" id="callNotificationContainer"></div>

    <!-- 微信风格录音提示 -->
    <div class="voice-recording-hint" id="voiceRecordingHint">
        <div class="voice-hint-content">
            <div class="voice-hint-icon" id="voiceHintIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10a7 7 0 0 1-14 0"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </div>
            <div class="voice-hint-text" id="voiceHintText">正在录音...</div>
            <div class="voice-wave" id="voiceWave">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="voice-hint-sub" id="voiceHintSub">上滑取消发送</div>
        </div>
        
        <!-- 取消区域（左侧） -->
        <div class="voice-slide-area" id="voiceSlideArea">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
            </svg>
            <span>取消</span>
        </div>
    </div>

    <script>// 全局应用JavaScript
(function() {
    'use strict';

    const TAG_PRIORITY_PATTERNS = [
        /内部人员/,
        /蓝V认证/,
        /黄V认证/
    ];

    function pickTopIdentityTagFromList(tags = []) {
        if (!Array.isArray(tags) || tags.length === 0) {
            return '';
        }
        for (const pattern of TAG_PRIORITY_PATTERNS) {
            const matched = tags.find(tag => typeof tag === 'string' && pattern.test(tag));
            if (matched) {
                return matched;
            }
        }
        return tags.find(tag => typeof tag === 'string' && tag.trim().length) || '';
    }

    window.resolveIdentityTag = function(target) {
        if (!target) {
            return '';
        }
        if (typeof target === 'object' && target.displayIdentityTag) {
            return target.displayIdentityTag;
        }
        if (Array.isArray(target)) {
            return pickTopIdentityTagFromList(target);
        }
        if (Array.isArray(target.identityTags)) {
            return pickTopIdentityTagFromList(target.identityTags);
        }
        return '';
    };

    window.isPaidUser = function() {
        if (window.Android && Android.isPaidUser) {
            try {
                return !!Android.isPaidUser();
            } catch (e) {
                console.warn('读取付费状态失败', e);
            }
        }
        return false;
    };

    window.openRechargePage = function() {
        if (window.Android && Android.navigateToRecharge) {
            Android.navigateToRecharge();
        } else {
            window.location.href = 'upgrade_service.html';
        }
    };

    window.getUserProfile = function() {
        if (window.Android && Android.getUserProfile) {
            try {
                const payload = Android.getUserProfile();
                const parsed = typeof payload === 'string' ? JSON.parse(payload) : payload;
                return parsed || {};
            } catch (e) {
                console.warn('读取用户信息失败', e);
            }
        }
        return {
            phone: '',
            isPaid: false,
            hasChildProfile: false,
            isLoggedIn: false
        };
    };

    const PAGE_TAB_MAP = {
        'index.html': 'home',
        'consult.html': 'home',
        'consultant_list.html': 'home',
        'consultant_detail.html': 'home',
        'appointment.html': 'home',
        'message.html': 'message',
        'chat.html': 'message',
        'rating.html': 'message',
        'consultant_training.html': 'profile',
        'consultant_exam.html': 'profile',
        'upgrade_service.html': 'profile',
        'profile.html': 'profile',
        'child_info.html': 'profile',
        'auth.html': 'profile',
        'recharge.html': 'profile',
        'account_manage.html': 'profile'
    };
    const PRIMARY_PAGES = ['index.html', 'message.html', 'profile.html'];

    function getCurrentPageName() {
        const page = window.location.pathname.split('/').pop();
        return page && page.length ? page : 'index.html';
    }

    // 获取Token
    window.getToken = function() {
        if (window.Android && Android.getToken) {
            return Android.getToken();
        }
        return localStorage.getItem('token') || '';
    };

    // API Base URL - 优先从 Android 接口获取（运行时返回正确的主机地址）
    window.API_BASE_URL = (function() {
        try {
            if (window.Android && typeof Android.getBaseUrl === 'function') {
                var url = Android.getBaseUrl();
                // 去掉末尾的 /api（若有），保留 http://host:port 格式
                if (url && typeof url === 'string') {
                    return url.replace(/\/api\/?$/, '');
                }
            }
        } catch (e) { /* ignore */ }
        // 模拟器 fallback：adb reverse tcp:8080 tcp:8080
        return 'http://127.0.0.1:8080';
    })();

    // 带认证的Fetch
    window.fetchWithAuth = async function(url, options = {}) {
        const token = window.getToken();
        const headers = options.headers || {};

        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        // 如果是相对路径，拼接 Base URL（已去掉末尾的 /api）
        let fullUrl = url;
        if (url.startsWith('/')) {
            fullUrl = window.API_BASE_URL + '/api' + url;
        }

        const newOptions = {
            ...options,
            headers: headers
        };

        return fetch(fullUrl, newOptions);
    };

    function resolveActiveTab() {
        const currentPage = getCurrentPageName();
        if (PAGE_TAB_MAP[currentPage]) {
            return PAGE_TAB_MAP[currentPage];
        }
        return PAGE_TAB_MAP['index.html'];
    }

    // 页面导航
    window.navigateTo = function(page) {
        if (window.Android) {
            switch(page) {
                case 'consult':
                    // 直接跳转到咨询师列表，跳过问题选择页面
                    Android.navigateToConsultantList();
                    break;
                case 'chat':
                    // 需要传递appointmentId
                    break;
                default:
                    console.log('Navigate to:', page);
            }
        }
    };

    window.navigateToConsultantDetail = function(name) {
        if (window.Android && Android.navigateToConsultantDetail) {
            Android.navigateToConsultantDetail(name);
        } else {
            window.location.href = 'consultant_detail.html?name=' + encodeURIComponent(name);
        }
    };

    // 显示Toast
    window.showToast = function(message) {
        if (window.Android) {
            Android.showToast(message);
        } else {
            console.log('Toast:', message);
        }
    };

    // 获取预约列表
    window.getAppointments = function() {
        if (window.Android) {
            try {
                const json = Android.getAppointments();
                return JSON.parse(json);
            } catch (e) {
                console.error('Error getting appointments:', e);
                return [];
            }
        }
        return [];
    };

    // 点击反馈动画
    document.addEventListener('DOMContentLoaded', function() {
        // 为所有可点击元素添加点击反馈
        const clickableElements = document.querySelectorAll('.card:not(.static-card), .btn, .list-item, .nav-item, .consultant-item');
        clickableElements.forEach(el => {
            el.addEventListener('touchstart', function() {
                this.style.transition = 'transform 0.1s';
                this.style.transform = 'scale(0.98)';
            });
            el.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    });
    window.addEventListener('pageshow', setupBackButton);

    // 返回按钮
    window.goBack = function() {
        let handled = false;
        try {
            if (window.Android && typeof Android.goBack === 'function') {
                Android.goBack();
                handled = true;
            }
        } catch (err) {
            console.warn('Android goBack failed', err);
            handled = false;
        }
        if (!handled) {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
    };

    function isPrimaryPage() {
        const page = getCurrentPageName();
        return PRIMARY_PAGES.includes(page);
    }

    function setupBackButton() {
        const toolbar = document.querySelector('.top-app-bar');
        if (!toolbar) {
            return;
        }
        const existingStatic = toolbar.querySelectorAll('.back-btn');
        existingStatic.forEach(btn => {
            if (!btn.classList.contains('dynamic-back-btn')) {
                btn.remove();
            }
        });
        const existingDynamic = toolbar.querySelector('.dynamic-back-btn');
        if (existingDynamic) {
            existingDynamic.remove();
        }
        if (isPrimaryPage()) {
            return;
        }
        const button = document.createElement('button');
        button.className = 'back-btn dynamic-back-btn';
        button.innerHTML = `
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
        `;
        button.addEventListener('click', goBack);
        toolbar.insertBefore(button, toolbar.firstChild);
    }

    const NAV_TABS = [
        {
            id: 'home',
            label: '首页',
            href: 'index.html',
            icon: '<path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-6v-6H10v6H4a1 1 0 0 1-1-1z"/>'
        },
        {
            id: 'message',
            label: '消息',
            href: 'message.html',
            icon: '<path d="M21 6H3a1 1 0 0 0-1 1v12l4-4h15a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1z"/>'
        },
        {
            id: 'profile',
            label: '我的',
            href: 'profile.html',
            icon: '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>'
        }
    ];

    window.renderBottomNav = function(activeTab) {
        // 原底部导航栏代码已移除，使用 Android 原生底部导航栏
    };
})();</script>
    <script>
        let messages = [];
        let historyLoaded = false;
        let shouldShowWelcome = true;
        let stompClient = null;
        let currentAppointmentId = '';
        let serverAppointmentId = -1;
        let currentUserId = -1;
        let consultantUserId = 2;
        /** 自己的 userId（从 Android 接口获取后缓存，避免重复调用） */
        let _cachedUserId = null;
        // 通话状态
        let callType = 'video';
        let callState = null; // 'calling' | 'connected' | 'ended' | 'rejected'
        let callStartTime = null;

        function loadChatData() {
            // Guard: if appointmentId is already set, initialization already happened (e.g. DOMContentLoaded)
            if (currentAppointmentId !== '') {
                return;
            }
            hideLoading(); // 确保 spinner 消失

            // 优先从 Android 接口获取会话数据（由 ChatActivity.setChatSessionForWebView 设置）
            if (window.Android) {
                const androidLocalId = Android.getChatLocalAppointmentId();
                const androidServerId = Android.getChatServerAppointmentIdNative();
                const androidConsultantName = Android.getChatConsultantDisplayName();
                const androidConsultantUserId = Android.getChatConsultantUserIdNative();
                
                // 如果 Android 接口有数据，优先使用
                if (androidLocalId && androidLocalId.length > 0) {
                    currentAppointmentId = androidLocalId;
                    window.appointmentId = androidLocalId;
                }
                if (androidServerId > 0) {
                    serverAppointmentId = androidServerId;
                }
                if (androidConsultantName && androidConsultantName.length > 0) {
                    document.getElementById('consultantName').textContent = androidConsultantName;
                    const toolbarTitle = document.getElementById('toolbarTitle');
                    if (toolbarTitle) {
                        toolbarTitle.textContent = androidConsultantName;
                    }
                }
                if (androidConsultantUserId > 0) {
                    consultantUserId = androidConsultantUserId;
                }
            }

            // 如果 Android 接口没有数据，从 URL 参数获取（作为备用）
            const urlConsultantName = getUrlParam('consultant_name') || getUrlParam('consultant') || '';
            const date = getUrlParam('date') || '';
            const slot = getUrlParam('slot') || '';
            const urlAppointmentId = getUrlParam('appointment_id') || getUrlParam('appointmentId') || '';
            const childId = getUrlParam('childId') || '';
            const childName = getUrlParam('childName') || '';
            
            // 如果还没有 appointmentId，从 URL 获取
            if (!currentAppointmentId && urlAppointmentId) {
                currentAppointmentId = urlAppointmentId;
                window.appointmentId = urlAppointmentId;
            }
            
            // 如果还没有 serverAppointmentId，从 URL 获取
            if (serverAppointmentId <= 0) {
                const urlServerId = parseInt(getUrlParam('serverAppointmentId') || '-1');
                if (urlServerId > 0) {
                    serverAppointmentId = urlServerId;
                }
            }
            
            // 如果还没有 consultantUserId，从 URL 获取
            if (!consultantUserId) {
                const cId = getUrlParam('consultantUserId');
                if (cId) {
                    consultantUserId = parseInt(cId);
                }
            }
            
            // 如果还没有咨询师名称，从 URL 获取
            const currentConsultantName = document.getElementById('consultantName').textContent;
            if (!currentConsultantName || currentConsultantName === '咨询师') {
                if (urlConsultantName) {
                    document.getElementById('consultantName').textContent = urlConsultantName;
                    const toolbarTitle = document.getElementById('toolbarTitle');
                    if (toolbarTitle) {
                        toolbarTitle.textContent = urlConsultantName;
                    }
                }
            }

            // 显示孩子信息
            if (childName) {
                const childInfoEl = document.getElementById('childInfo');
                childInfoEl.textContent = `咨询对象：${childName}`;
                childInfoEl.style.display = 'block';
            } else if (childId && window.Android && typeof Android.getChildProfileById === 'function') {
                // 如果只有childId，从数据库获取孩子信息
                try {
                    const childJson = Android.getChildProfileById(childId);
                    const childProfile = JSON.parse(childJson);
                    if (childProfile && childProfile.name) {
                        const childInfoEl = document.getElementById('childInfo');
                        childInfoEl.textContent = `咨询对象：${childProfile.name}`;
                        childInfoEl.style.display = 'block';
                    }
                } catch (e) {
                    console.error('Failed to load child profile', e);
                }
            }

            if (date && slot) {
                const infoEl = document.getElementById('appointmentInfo');
                infoEl.textContent = `预约时间：${date} ${slot}`;
                infoEl.style.display = 'block';
            }

            // 保存appointmentId供后续使用
            window.appointmentId = appointmentId;
            currentAppointmentId = appointmentId;

            // 加载历史消息
            loadHistoryMessages();
            
            // 初始化WebSocket连接
            connectWebSocket();
        }

        function getCurrentUserId() {
            if (_cachedUserId !== null) return _cachedUserId;
            try {
                if (window.Android && Android.getUserId) {
                    _cachedUserId = Android.getUserId();
                    return _cachedUserId;
                }
            } catch (e) { /* ignore */ }
            return -1;
        }

        function showConnectionStatus(status) {
            const existing = document.getElementById('wsStatusBar');
            if (existing) existing.remove();
            if (status === 'ok') return; // 连接成功，隐藏状态条
            const colors = { connecting: '#f39c12', error: '#e74c3c', disconnected: '#95a5a6' };
            const labels = { connecting: '正在连接聊天服务器…', error: '聊天连接失败（消息仍可发送）', disconnected: '聊天已断开' };
            const color = colors[status] || '#95a5a6';
            const label = labels[status] || status;
            const bar = document.createElement('div');
            bar.id = 'wsStatusBar';
            bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:' + color + ';color:white;text-align:center;font-size:12px;padding:4px 8px;z-index:9999;transition:opacity 0.3s;';
            bar.textContent = label;
            document.body.appendChild(bar);
        }

        function connectWebSocket() {
            if (!window.Android || !Android.getAuthToken) {
                console.warn("Android interface not available");
                showConnectionStatus('error');
                return;
            }

            const token = Android.getAuthToken();
            currentUserId = getCurrentUserId();
            console.log('WS connecting with userId=' + currentUserId + ', token present=' + !!token);

            if (!token) {
                console.warn("No auth token available");
                showConnectionStatus('error');
                return;
            }

            if (!Android.getBaseUrl) {
                console.warn("Android.getBaseUrl not available");
                showConnectionStatus('error');
                return;
            }

            let baseUrl = Android.getBaseUrl();
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            // 使用原生 WebSocket /stomp（服务端单独注册），避免 SockJS 依赖 /info + JSESSIONID，在 file:// WebView 下无法建会话导致一直卡住
            var wsNative = baseUrl;
            if (wsNative.indexOf('https://') === 0) {
                wsNative = 'wss://' + wsNative.substring(8);
            } else if (wsNative.indexOf('http://') === 0) {
                wsNative = 'ws://' + wsNative.substring(7);
            }
            const wsUrl = wsNative + '/stomp';
            console.log('WS native target: ' + wsUrl);

            showConnectionStatus('connecting');

            const socket = new WebSocket(wsUrl);
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            socket.addEventListener('open',   function() { console.log('[WS] open'); });
            socket.addEventListener('close',  function(e) { console.log('[WS] close', e && e.code, e && e.reason); });
            socket.addEventListener('error',  function(e) { console.error('[WS] error', e); });

            // 超过 10 秒未连接成功，强制切换到 error 状态
            const connectTimeout = setTimeout(function() {
                console.error('WS connect timeout after 10s');
                try { socket.close(); } catch(err) {}
                showConnectionStatus('error');
            }, 10000);

            stompClient.connect(
                { 'Authorization': 'Bearer ' + token },
                function (frame) {
                    clearTimeout(connectTimeout);
                    console.log('STOMP Connected: ' + frame + ' (userId=' + currentUserId + ')');
                    showConnectionStatus('ok');
                    setupWsHeartbeat();

                    stompClient.subscribe('/user/queue/messages', function (messageOutput) {
                        const message = JSON.parse(messageOutput.body);
                        console.log('WS received message:', message);
                        handleIncomingMessage(message);
                    });

                    stompClient.subscribe('/user/queue/webrtc', function (messageOutput) {
                        const signal = JSON.parse(messageOutput.body);
                        handleWebRTCSignal(signal);
                    });

                    stompClient.send("/app/chat.online", {}, JSON.stringify(currentUserId));
                }, function (error) {
                    clearTimeout(connectTimeout);
                    console.error('STOMP error:', error);
                    showConnectionStatus('error');
                    setTimeout(connectWebSocket, 5000);
                }
            );
        }

        // WebSocket 断连监听（STOMP.js 用 webSocket.onclose）
        function setupWsHeartbeat() {
            if (!stompClient || !stompClient.ws) return;
            stompClient.ws.onclose = function() {
                console.warn('STOMP disconnected');
                showConnectionStatus('disconnected');
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        function handleIncomingMessage(messageDTO) {
            const typeIncoming = (messageDTO.messageType || '').toLowerCase();
            // 自己发的普通消息不再重复展示；SYSTEM（如通话结束）多端同步仍需写入并展示
            if (messageDTO.senderUserId == currentUserId && typeIncoming !== 'system') {
                return;
            }

            const isFromConsultant = messageDTO.isFromConsultant;
            const type = messageDTO.messageType.toLowerCase();
            const content = messageDTO.content;
            const mediaUrl = messageDTO.mediaUrl;
            
            addMessage(isFromConsultant, type, content, mediaUrl, false); 
        }

        function handleWebRTCSignal(signal) {
            if (!signal || !signal.type) return;
            const targetAppointmentId = serverAppointmentId > 0 ? String(serverAppointmentId) : String(currentAppointmentId);
            if (signal.appointmentId && targetAppointmentId && String(signal.appointmentId) !== targetAppointmentId) {
                return;
            }
            if (signal.type === 'call') {
                const incomingCallType = signal.data && signal.data.callType ? signal.data.callType : 'video';
                startIncomingCallNotification(signal, targetAppointmentId, incomingCallType);
            }
        }

                            : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`

                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9"/></svg>

                            <button class="call-notif-btn reject" onclick="rejectIncomingCall()">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                拒绝
                            </button>

                    </div>
                    <button class="call-notif-close" onclick="dismissCallNotification()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            `;

            // 自动拒绝超时（60秒）
            setTimeout(() => {
                if (callState === 'calling') {
                    dismissCallNotification();

                }

        }

        function acceptIncomingCall(appointmentId, consultantName, targetUserId, incomingCallType) {
            dismissCallNotification();
            callState = 'connected';
            callStartTime = Date.now();

            if (typeof Android.startVideoCallWithType === 'function') {
                Android.startVideoCallWithType(appointmentId, consultantName, targetUserId, incomingCallType);
            } else if (typeof Android.startVideoCall === 'function') {
                Android.startVideoCall(appointmentId, consultantName, targetUserId);
            }
        }

        function rejectIncomingCall() {
            dismissCallNotification();
            callState = 'rejected';
            // 发送拒绝信号
            if (stompClient && stompClient.connected) {
                const payload = {
                    type: 'reject',
                    fromUserId: currentUserId,
                    toUserId: consultantUserId,
                    appointmentId: serverAppointmentId > 0 ? serverAppointmentId : currentAppointmentId
                };
                stompClient.send('/app/webrtc.signal', {}, JSON.stringify(payload));
            }
            showToast('已拒绝通话');
        }

        function dismissCallNotification() {
            const container = document.getElementById('callNotificationContainer');
            const notif = document.getElementById('callNotif');
            if (notif) {
                notif.classList.add('fade-out');
                setTimeout(() => {
                    if (container) container.innerHTML = '';
                }, 300);
            }
        }

        // 显示通话状态通知（呼出、已接听等）
        function showCallStatusNotification(type, title, subtitle) {
            const container = document.getElementById('callNotificationContainer');
            if (!container) return;

            container.innerHTML = `
                <div class="call-notification" id="callNotif">
                    <div class="call-notif-icon ${type}">

                            ? `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`
                            : type === 'connected'
                            ? `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`
                            : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
                        }
                    </div>
