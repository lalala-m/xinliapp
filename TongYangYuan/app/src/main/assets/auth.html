<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 童康源</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --blue: #6FA6F8;
            --blue-dark: #4A8AE8;
            --blue-light: #EEF3FE;
            --blue-bg: #F4F7FF;
            --text-primary: #2C3345;
            --text-secondary: #627089;
            --text-hint: #9BA5BF;
            --border: #E8ECF2;
            --danger: #FF5252;
            --success: #4CAF50;
            --radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #EEF3FE 0%, #FFFFFF 55%);
            min-height: 100vh;
            color: var(--text-primary);
            max-width: 520px;
            margin: 0 auto;
        }

        /* 顶部留白 + logo */
        .header {
            padding: 56px 32px 24px;
            text-align: center;
        }

        .logo-wrap {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(111, 166, 248, 0.35);
            overflow: hidden;
        }

        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 标签切换 */
        .tab-bar {
            display: flex;
            margin: 0 24px 20px;
            background: var(--blue-light);
            border-radius: 14px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            border-radius: 11px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: var(--text-secondary);
        }

        .tab-btn.active {
            background: white;
            color: var(--blue);
            box-shadow: 0 2px 8px rgba(111, 166, 248, 0.2);
        }

        /* 卡片 */
        .card {
            margin: 0 16px 16px;
            background: white;
            border-radius: var(--radius);
            padding: 28px 20px;
            box-shadow: 0 4px 20px rgba(69, 110, 255, 0.06);
        }

        /* 输入组 */
        .field-group { margin-bottom: 16px; }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-row {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
            background: #FAFAFA;
        }

        .input-row:focus-within {
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(111, 166, 248, 0.12);
        }

        .input-row.error { border-color: var(--danger); }
        .input-row.error:focus-within { box-shadow: 0 0 0 3px rgba(255, 82, 82, 0.1); }

        .input-prefix {
            padding: 0 14px;
            font-size: 15px;
            color: var(--text-secondary);
            white-space: nowrap;
            border-right: 1.5px solid var(--border);
            height: 52px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .field-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 14px;
            font-size: 16px;
            color: var(--text-primary);
            background: transparent;
            height: 52px;
        }

        .field-input::placeholder { color: var(--text-hint); }

        .code-input-wrap {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #FAFAFA;
        }

        .code-input-wrap:focus-within {
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(111, 166, 248, 0.12);
        }

        .code-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 16px;
            font-size: 16px;
            color: var(--text-primary);
            background: transparent;
            height: 52px;
            letter-spacing: 4px;
        }

        .code-input::placeholder { letter-spacing: 0; }

        .send-btn {
            margin: 0 6px 0 0;
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            background: var(--blue);
            color: white;
            transition: background 0.2s, transform 0.1s;
            height: 38px;
            flex-shrink: 0;
        }

        .send-btn:active { transform: scale(0.96); }

        .send-btn:disabled {
            background: #DDE4F0;
            color: var(--text-hint);
            cursor: not-allowed;
            transform: none;
        }

        /* 错误提示 */
        .field-error {
            font-size: 12px;
            color: var(--danger);
            margin-top: 6px;
            display: none;
        }

        .field-error.show { display: block; }

        /* 主按钮 */
        .btn-primary {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(111, 166, 248, 0.35);
        }

        .btn-primary:active { transform: scale(0.98); box-shadow: 0 4px 12px rgba(111, 166, 248, 0.25); }

        .btn-primary:disabled {
            background: #DDE4F0;
            color: #A8B4CC;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 找回密码 */
        .forgot-row {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-row a {
            font-size: 13px;
            color: var(--text-hint);
            text-decoration: none;
        }

        .forgot-row a:active { color: var(--blue); }

        /* 分隔线 */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 24px;
            color: var(--text-hint);
            font-size: 13px;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* 微信登录 */
        .wechat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 54px;
            border: 1.5px solid #E8F5E9;
            border-radius: 14px;
            background: #F1F8E9;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: 600;
            color: #2E7D32;
        }

        .wechat-btn:active { transform: scale(0.98); background: #DCEDC8; }

        .wechat-btn svg { width: 24px; height: 24px; }

        /* 底部协议 */
        .agreement-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 16px;
            padding: 0 4px;
        }

        .agreement-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            accent-color: var(--blue);
            flex-shrink: 0;
            cursor: pointer;
        }

        .agreement-row label {
            font-size: 12px;
            color: var(--text-hint);
            line-height: 1.5;
            cursor: pointer;
        }

        .agreement-row label a {
            color: var(--blue);
            text-decoration: none;
        }

        /* 底部占位 */
        .bottom-spacer { height: 32px; }

        /* toast */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 51, 69, 0.92);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 280px;
            text-align: center;
        }

        #toast.show { opacity: 1; }

        /* 登录内容区 */
        .login-pane { display: none; }
        .login-pane.active { display: block; }

        /* loading spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* auto-login hint */
        .auto-hint {
            font-size: 12px;
            color: var(--text-hint);
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        .auto-hint.show { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-wrap">
            <img src="images/tongkangyuan.png" alt="Logo">
        </div>
        <h1>欢迎来到童康源</h1>
        <p>为孩子的成长保驾护航</p>
    </div>

    <!-- 标签切换：快捷登录 / 密码登录 -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tabSms" onclick="switchTab('sms')">快捷登录</button>
        <button class="tab-btn" id="tabPwd" onclick="switchTab('pwd')">密码登录</button>
    </div>

    <!-- ===== 快捷登录（手机号 + 验证码） ===== -->
    <div class="card login-pane active" id="paneSms">

        <div class="field-group">
            <div class="field-label">手机号</div>
            <div class="input-row" id="phoneRow">
                <span class="input-prefix">+86</span>
                <input type="tel" class="field-input" id="phoneInput"
                       placeholder="请输入手机号" maxlength="11" autocomplete="off" inputmode="numeric">
            </div>
            <div class="field-error" id="phoneError">请输入正确的11位手机号</div>
        </div>

        <div class="field-group">
            <div class="field-label">验证码</div>
            <div class="code-input-wrap" id="codeRow">
                <input type="text" class="code-input" id="codeInput"
                       placeholder="请输入6位验证码" maxlength="6" autocomplete="off" inputmode="numeric">
                <button class="send-btn" id="sendBtn" onclick="sendCode()">获取验证码</button>
            </div>
            <div class="field-error" id="codeError">验证码错误</div>
        </div>

        <button class="btn-primary" id="smsLoginBtn" onclick="doSmsLogin()" disabled>
            登录 / 注册
        </button>

        <div class="auto-hint" id="autoHint">填写完验证码后将自动登录</div>

        <div class="agreement-row">
            <input type="checkbox" id="agreeCheck">
            <label for="agreeCheck">我已阅读并同意
                <a href="#" onclick="openAgreement(); return false;">《用户服务协议》</a> 和 <a href="#" onclick="openPrivacy(); return false;">《隐私政策》</a>
            </label>
        </div>
    </div>

    <!-- ===== 密码登录 ===== -->
    <div class="card login-pane" id="panePwd">

        <div class="field-group">
            <div class="field-label">手机号 / 用户名</div>
            <div class="input-row">
                <input type="text" class="field-input" id="accountInput"
                       placeholder="请输入手机号或用户名" autocomplete="off">
            </div>
            <div class="field-error" id="accountError">请输入账号</div>
        </div>

        <div class="field-group">
            <div class="field-label">密码</div>
            <div class="input-row">
                <input type="password" class="field-input" id="pwdInput"
                       placeholder="请输入密码" autocomplete="off">
            </div>
            <div class="field-error" id="pwdError">请输入密码</div>
        </div>

        <div class="forgot-row">
            <a href="#" onclick="showToast('请联系客服找回密码'); return false;">忘记密码？</a>
        </div>

        <button class="btn-primary" id="pwdLoginBtn" onclick="doPwdLogin()">
            登录
        </button>

        <div class="agreement-row">
            <input type="checkbox" id="agreeCheck2">
            <label for="agreeCheck2">我已阅读并同意
                <a href="#" onclick="openAgreement(); return false;">《用户服务协议》</a> 和 <a href="#" onclick="openPrivacy(); return false;">《隐私政策》</a>
            </label>
        </div>

        <div class="or-divider">其他登录方式</div>

        <button class="wechat-btn" onclick="doWechatLogin()">
            <svg viewBox="0 0 24 24" fill="#07C160">
                <path d="M8.5 11.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm4 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zM12 2C6.477 2 2 6.025 2 11c0 2.824 1.373 5.343 3.535 7.042l-.683 2.052A.5.5 0 0 0 5.5 21a.5.5 0 0 0 .448-.276C8.01 19.32 10.052 19 12 19c5.523 0 10-4.025 10-9s-4.477-8-10-8z"/>
            </svg>
            微信一键登录
        </button>

        <div style="text-align:center; margin-top: 16px; font-size: 14px; color: var(--text-secondary);">
            还没有账号？<a href="register.html" style="color: var(--blue); font-weight: 600; text-decoration: none;">立即注册</a>
        </div>
    </div>

    <div class="bottom-spacer"></div>
    <div id="toast"></div>

    <script src="js/app.js"></script>
    <script>
        // ---------- 状态 ----------
        let countdownTimer = null;
        let currentTab = 'sms';
        let smsSent = false;

        // ---------- 初始化 ----------
        document.addEventListener('DOMContentLoaded', function () {
            // 自动聚焦手机号输入框
            document.getElementById('phoneInput').focus();

            // 监听手机号输入变化：自动发送验证码（11位后）
            document.getElementById('phoneInput').addEventListener('input', onPhoneInput);
            document.getElementById('codeInput').addEventListener('input', onCodeInput);
            document.getElementById('phoneInput').addEventListener('blur', validatePhoneField);
        });

        // ---------- 标签切换 ----------
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabSms').classList.toggle('active', tab === 'sms');
            document.getElementById('tabPwd').classList.toggle('active', tab === 'pwd');
            document.getElementById('paneSms').classList.toggle('active', tab === 'sms');
            document.getElementById('panePwd').classList.toggle('active', tab === 'pwd');
        }

        // ---------- 快捷登录逻辑 ----------
        function onPhoneInput(e) {
            const phone = e.target.value.replace(/\D/g, '');
            e.target.value = phone;
            clearError('phoneRow', 'phoneError');
            updateSmsLoginBtn();

            // 输入到第11位时自动发送验证码
            if (phone.length === 11 && !smsSent) {
                setTimeout(() => {
                    if (document.getElementById('phoneInput').value.length === 11) {
                        sendCode();
                    }
                }, 400);
            }
        }

        function onCodeInput(e) {
            const code = e.target.value.replace(/\D/g, '');
            e.target.value = code;
            clearError('codeRow', 'codeError');
            updateSmsLoginBtn();

            // 输入6位时自动登录
            if (code.length === 6 && smsSent) {
                setTimeout(() => {
                    if (document.getElementById('codeInput').value.length === 6) {
                        doSmsLogin();
                    }
                }, 300);
            }
        }

        function updateSmsLoginBtn() {
            const phone = document.getElementById('phoneInput').value;
            const code = document.getElementById('codeInput').value;
            const btn = document.getElementById('smsLoginBtn');
            const agree = document.getElementById('agreeCheck').checked;
            btn.disabled = !(phone.length === 11 && code.length === 6 && agree);
        }

        // 监听协议勾选
        document.getElementById('agreeCheck').addEventListener('change', updateSmsLoginBtn);
        document.getElementById('agreeCheck2').addEventListener('change', function () {
            document.getElementById('pwdLoginBtn').disabled = !this.checked;
        });

        // ---------- 发送验证码 ----------
        function sendCode() {
            const phone = document.getElementById('phoneInput').value;
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFieldError('phoneRow', 'phoneError', '请输入正确的11位手机号');
                return;
            }

            if (!document.getElementById('agreeCheck').checked) {
                showToast('请先阅读并同意用户协议');
                return;
            }

            clearError('phoneRow', 'phoneError');

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            if (window.Android && typeof Android.sendVerifyCode === 'function') {
                Android.sendVerifyCode(phone);
            }

            smsSent = true;
            startCountdown();
            showToast('验证码已发送到 ' + phone.substring(0, 3) + '****' + phone.substring(7));

            // 自动聚焦到验证码输入框
            setTimeout(() => document.getElementById('codeInput').focus(), 600);
        }

        function startCountdown() {
            let seconds = 60;
            const btn = document.getElementById('sendBtn');
            btn.textContent = '60s';
            btn.disabled = true;

            countdownTimer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(countdownTimer);
                    btn.textContent = '重新获取';
                    btn.disabled = false;
                    smsSent = false;
                } else {
                    btn.textContent = seconds + 's';
                }
            }, 1000);
        }

        // ---------- 验证码登录 ----------
        function doSmsLogin() {
            const phone = document.getElementById('phoneInput').value;
            const code = document.getElementById('codeInput').value;

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFieldError('phoneRow', 'phoneError', '请输入正确的11位手机号');
                return;
            }
            if (!/^\d{6}$/.test(code)) {
                showFieldError('codeRow', 'codeError', '请输入6位验证码');
                return;
            }
            if (!document.getElementById('agreeCheck').checked) {
                showToast('请先阅读并同意用户协议');
                return;
            }

            clearAllErrors();
            const btn = document.getElementById('smsLoginBtn');
            setLoading(btn, true);

            if (window.Android && typeof Android.loginWithPhone === 'function') {
                Android.loginWithPhone(phone, code);
            } else {
                setLoading(btn, false);
                showToast('环境异常，请重启应用');
            }
        }

        // ---------- 密码登录 ----------
        function doPwdLogin() {
            const account = document.getElementById('accountInput').value.trim();
            const pwd = document.getElementById('pwdInput').value;
            const agree = document.getElementById('agreeCheck2').checked;

            clearAllErrors();

            if (!account) {
                showFieldError(null, 'accountError', '请输入手机号或用户名');
                return;
            }
            if (!pwd) {
                showFieldError(null, 'pwdError', '请输入密码');
                return;
            }
            if (!agree) {
                showToast('请先阅读并同意用户协议');
                return;
            }

            const btn = document.getElementById('pwdLoginBtn');
            setLoading(btn, true);

            if (window.Android && typeof Android.loginWithPassword === 'function') {
                Android.loginWithPassword(account, pwd);
            } else {
                setLoading(btn, false);
                showToast('环境异常，请重启应用');
            }
        }

        // ---------- 微信登录 ----------
        function doWechatLogin() {
            if (window.Android && typeof Android.loginWithWechat === 'function') {
                Android.loginWithWechat();
            } else {
                showToast('微信登录暂未开放');
            }
        }

        // ---------- UI 工具函数 ----------
        function showFieldError(rowId, errorId, msg) {
            if (rowId) document.getElementById(rowId).classList.add('error');
            const el = document.getElementById(errorId);
            el.textContent = msg;
            el.classList.add('show');
        }

        function clearError(rowId, errorId) {
            if (rowId) document.getElementById(rowId).classList.remove('error');
            document.getElementById(errorId).classList.remove('show');
        }

        function clearAllErrors() {
            ['phoneRow', 'codeRow'].forEach(id => document.getElementById(id) && document.getElementById(id).classList.remove('error'));
            ['phoneError', 'codeError', 'accountError', 'pwdError'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('show');
            });
        }

        function validatePhoneField() {
            const phone = document.getElementById('phoneInput').value;
            if (phone.length > 0 && phone.length < 11) {
                showFieldError('phoneRow', 'phoneError', '请输入正确的11位手机号');
            }
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.classList.add('loading');
                btn.innerHTML = '<span class="spinner"></span>登录中...';
            } else {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = btn.id === 'smsLoginBtn' ? '登录 / 注册' : '登录';
            }
        }

        // ---------- Toast ----------
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ---------- 打开用户服务协议 ----------
        function openAgreement() {
            if (window.Android && typeof Android.openWebPage === 'function') {
                Android.openWebPage('agreement.html');
            } else {
                window.location.href = 'agreement.html';
            }
        }

        // ---------- 打开隐私政策 ----------
        function openPrivacy() {
            if (window.Android && typeof Android.openWebPage === 'function') {
                Android.openWebPage('privacy.html');
            } else {
                window.location.href = 'privacy.html';
            }
        }

        // ---------- 页面卸载清理 ----------
        window.onunload = function () {
            if (countdownTimer) clearInterval(countdownTimer);
        };
    </script>
</body>
</html>
