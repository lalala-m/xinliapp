<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 16px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: #333333;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 16px;
            color: #666666;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 8px;
        }

        .register-btn {
            width: 100%;
            margin-top: 32px;
        }

        .error-message {
            color: #FF5252;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .success-message {
            color: #4CAF50;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666666;
        }

        .login-link a {
            color: #6FA6F8;
            text-decoration: none;
        }

        .login-link a:active {
            opacity: 0.7;
        }

        .user-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .user-type-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            background: white;
            color: #666666;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-type-btn.active {
            border-color: #6FA6F8;
            background: #F0F7FF;
            color: #6FA6F8;
        }

        .consultant-fields {
            display: none;
        }

        .consultant-fields.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">欢迎注册</h1>
            <p class="auth-subtitle">创建您的童养园账号</p>
        </div>

        <div class="user-type-selector">
            <button class="user-type-btn active" data-type="parent">家长注册</button>
            <button class="user-type-btn" data-type="consultant">咨询师注册</button>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label class="input-label">手机号</label>
                <input type="tel" id="phone" class="input" placeholder="请输入手机号" maxlength="11" required>
            </div>

            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" id="password" class="input" placeholder="请输入密码（至少6位）" required>
            </div>

            <div class="input-group">
                <label class="input-label">确认密码</label>
                <input type="password" id="confirmPassword" class="input" placeholder="请再次输入密码" required>
            </div>

            <div class="input-group">
                <label class="input-label">昵称</label>
                <input type="text" id="nickname" class="input" placeholder="请输入昵称">
            </div>

            <!-- 咨询师专用字段 -->
            <div class="consultant-fields" id="consultantFields">
                <div class="input-group">
                    <label class="input-label">真实姓名 *</label>
                    <input type="text" id="realName" class="input" placeholder="请输入真实姓名">
                </div>

                <div class="input-group">
                    <label class="input-label">职称</label>
                    <input type="text" id="title" class="input" placeholder="例如：国家二级心理咨询师">
                </div>

                <div class="input-group">
                    <label class="input-label">专长领域</label>
                    <input type="text" id="specialization" class="input" placeholder="例如：儿童心理、家庭关系">
                </div>

                <div class="input-group">
                    <label class="input-label">个人简介</label>
                    <textarea id="introduction" class="input" rows="4" placeholder="请简单介绍您的专业背景和经验"></textarea>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <button type="submit" class="btn btn-primary register-btn" id="registerBtn">
                注册
            </button>
        </form>

        <div class="login-link">
            已有账号？<a href="auth.html">立即登录</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let currentUserType = 'parent';

        // 用户类型切换
        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentUserType = this.dataset.type;
                
                const consultantFields = document.getElementById('consultantFields');
                if (currentUserType === 'consultant') {
                    consultantFields.classList.add('show');
                } else {
                    consultantFields.classList.remove('show');
                }
            });
        });

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const nickname = document.getElementById('nickname').value.trim();
            
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            // 隐藏之前的消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // 验证手机号
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                errorMessage.textContent = '请输入正确的手机号';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 验证密码
            if (password.length < 6) {
                errorMessage.textContent = '密码长度至少6位';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 验证密码一致性
            if (password !== confirmPassword) {
                errorMessage.textContent = '两次输入的密码不一致';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 构建请求数据
            const requestData = {
                phone: phone,
                password: password,
                confirmPassword: confirmPassword,
                nickname: nickname || null
            };
            
            // 如果是咨询师注册，添加额外字段
            if (currentUserType === 'consultant') {
                const realName = document.getElementById('realName').value.trim();
                if (!realName) {
                    errorMessage.textContent = '请输入真实姓名';
                    errorMessage.style.display = 'block';
                    return;
                }
                
                requestData.realName = realName;
                requestData.title = document.getElementById('title').value.trim() || null;
                requestData.specialization = document.getElementById('specialization').value.trim() || null;
                requestData.introduction = document.getElementById('introduction').value.trim() || null;
            }
            
            // 禁用按钮
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            try {
                const endpoint = currentUserType === 'parent' ? '/auth/register/parent' : '/auth/register/consultant';
                const response = await fetch(API_BASE_URL + endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存token和用户信息
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('userId', data.data.userId);
                    localStorage.setItem('userType', data.data.userType);
                    localStorage.setItem('phone', data.data.phone);
                    localStorage.setItem('nickname', data.data.nickname);
                    
                    if (data.data.consultantId) {
                        localStorage.setItem('consultantId', data.data.consultantId);
                    }
                    
                    successMessage.textContent = data.message || '注册成功！';
                    successMessage.style.display = 'block';
                    
                    // 延迟跳转
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    errorMessage.textContent = data.message || '注册失败，请重试';
                    errorMessage.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                }
            } catch (error) {
                console.error('注册错误:', error);
                errorMessage.textContent = '网络错误，请检查网络连接';
                errorMessage.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
