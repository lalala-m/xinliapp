<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一对一指导套餐</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upgrade-hero {
            background: linear-gradient(135deg, rgba(111, 166, 248, 0.15), rgba(189, 235, 200, 0.25));
            border-radius: 22px;
            padding: 24px;
            margin: 16px;
            text-align: center;
        }

        .upgrade-hero h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .upgrade-hero p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .discount-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF5252, #FF8A80);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .package-list {
            padding: 0 16px;
        }

        .package-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .package-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(111,166,248,0.12), rgba(189,235,200,0.4));
            opacity: 0.6;
            filter: blur(24px);
            transform: translateY(-20%);
            pointer-events: none;
        }

        .package-card > * {
            position: relative;
            z-index: 1;
        }

        .package-card:active {
            transform: scale(0.98);
        }

        .package-card.selected {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(111, 166, 248, 0.05), rgba(189, 235, 200, 0.05));
            box-shadow: var(--shadow-hover);
        }

        .package-card.recommended::before {
            content: '推荐';
            position: absolute;
            top: 16px;
            right: -30px;
            background: linear-gradient(135deg, #FF5252, #FF8A80);
            color: white;
            padding: 4px 40px;
            font-size: 12px;
            font-weight: 600;
            transform: rotate(45deg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .package-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .package-info {
            flex: 1;
        }

        .package-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .package-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .package-price {
            text-align: right;
        }

        .price-original {
            font-size: 16px;
            color: var(--text-secondary);
            text-decoration: line-through;
            margin-bottom: 4px;
        }

        .price-current {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .price-unit {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: normal;
        }

        .package-features {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #F0F0F0;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: #4CAF50;
            margin-top: 2px;
        }

        .purchase-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px env(safe-area-inset-bottom);
            background: white;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .purchase-total {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .pay-btn {
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
        }

        .pay-btn.alipay {
            background: #1677FF;
        }

        .pay-btn.wechat {
            background: #07C160;
        }

        .service-details {
            margin: 16px;
            padding: 20px;
            background: rgba(111, 166, 248, 0.05);
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
        }

        .service-details-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .service-details-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .service-details-item {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .service-details-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="top-app-bar glass">
        <div class="title">一对一指导套餐</div>
    </div>

    <div class="content">
        <div class="upgrade-hero">
            <h2>升级长期定制服务</h2>
            <p>享受一对一专属指导，获得持续的家庭教育支持</p>
            <div class="discount-badge">限时立减50元</div>
        </div>

        <div class="package-list" id="packageList">
            <!-- 套餐卡片将动态生成 -->
        </div>

        <div class="service-details">
            <div class="service-details-title">服务内容</div>
            <ul class="service-details-list">
                <li class="service-details-item">一对一专属咨询师，全程跟踪指导</li>
                <li class="service-details-item">个性化成长方案定制，定期调整优化</li>
                <li class="service-details-item">24小时在线支持，随时解答疑问</li>
                <li class="service-details-item">定期家庭评估报告，科学跟踪进展</li>
                <li class="service-details-item">优先预约权，快速响应需求</li>
                <li class="service-details-item">专属学习资源库，持续更新内容</li>
            </ul>
        </div>

        <div class="purchase-bar">
            <div class="purchase-total" id="purchaseTotal">请选择套餐</div>
            <button class="pay-btn alipay" onclick="payWith('alipay')">支付宝支付</button>
            <button class="pay-btn wechat" onclick="payWith('wechat')">微信支付</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const packages = [
            {
                id: 'monthly',
                name: '月度套餐',
                desc: '适合短期咨询需求',
                originalPrice: 299,
                currentPrice: 249,
                duration: '1个月',
                features: [
                    '4次一对一咨询（每周1次）',
                    '个性化成长方案',
                    '在线答疑支持',
                    '月度评估报告'
                ],
                recommended: false
            },
            {
                id: 'quarterly',
                name: '季度套餐',
                desc: '性价比之选，推荐',
                originalPrice: 799,
                currentPrice: 749,
                duration: '3个月',
                features: [
                    '12次一对一咨询（每周1次）',
                    '个性化成长方案定制',
                    '24小时在线支持',
                    '季度评估报告',
                    '优先预约权',
                    '专属学习资源'
                ],
                recommended: true
            },
            {
                id: 'yearly',
                name: '年度套餐',
                desc: '长期陪伴，最优惠',
                originalPrice: 2999,
                currentPrice: 2949,
                duration: '12个月',
                features: [
                    '48次一对一咨询（每周1次）',
                    '个性化成长方案定制与优化',
                    '24小时在线支持',
                    '月度评估报告',
                    '优先预约权',
                    '专属学习资源库',
                    '家庭成长档案',
                    '年度总结报告'
                ],
                recommended: false
            }
        ];

        let selectedPackage = null;
        let selectedPayment = null;

        function initPage() {
            renderPackages();
        }

        function renderPackages() {
            const container = document.getElementById('packageList');
            container.innerHTML = packages.map(pkg => `
                <div class="package-card ${pkg.recommended ? 'recommended' : ''} ${selectedPackage?.id === pkg.id ? 'selected' : ''}" 
                     onclick="selectPackage('${pkg.id}')">
                    <div class="package-header">
                        <div class="package-info">
                            <div class="package-name">${pkg.name}</div>
                            <div class="package-desc">${pkg.desc}</div>
                        </div>
                        <div class="package-price">
                            <div class="price-original">¥${pkg.originalPrice}</div>
                            <div class="price-current">
                                ¥${pkg.currentPrice}
                                <span class="price-unit">/${pkg.duration}</span>
                            </div>
                        </div>
                    </div>
                    <div class="package-features">
                        <ul class="feature-list">
                            ${pkg.features.map(feature => `
                                <li class="feature-item">
                                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 6L9 17l-5-5"/>
                                    </svg>
                                    <span>${feature}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        }

        function selectPackage(packageId) {
            selectedPackage = packages.find(p => p.id === packageId);
            renderPackages();
            updatePurchaseBar();
        }

        function updatePurchaseBar() {
            const totalEl = document.getElementById('purchaseTotal');
            if (selectedPackage) {
                totalEl.textContent = `应付金额 ¥${selectedPackage.currentPrice}`;
            } else {
                totalEl.textContent = '请选择套餐';
            }
        }

        function payWith(method) {
            if (!selectedPackage) {
                showToast('请先选择套餐');
                return;
            }
            const purchaseData = {
                packageId: selectedPackage.id,
                packageName: selectedPackage.name,
                price: selectedPackage.currentPrice,
                originalPrice: selectedPackage.originalPrice,
                paymentMethod: method
            };
            if (window.Android && typeof Android.purchaseUpgradeService === 'function') {
                Android.purchaseUpgradeService(JSON.stringify(purchaseData));
            } else {
                showToast(`正在跳转到${method === 'alipay' ? '支付宝' : '微信'}支付...`);
                setTimeout(() => {
                    showToast('支付成功！已为您开通一对一指导服务');
                    setTimeout(() => {
                        if (window.Android && typeof Android.goBack === 'function') {
                            Android.goBack();
                        } else {
                            window.location.href = 'profile.html';
                        }
                    }, 1200);
                }, 1000);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
            updatePurchaseBar();
        });
    </script>
</body>
</html>
