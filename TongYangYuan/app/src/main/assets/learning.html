<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线学习中心</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .learning-header {
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .learning-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
        }
        .learning-tab {
            padding: 6px 14px;
            border-radius: 999px;
            background: #f3f4f6;
            color: #666;
            font-size: 13px;
            flex-shrink: 0;
        }
        .learning-tab.active {
            background: #6FA6F8;
            color: #fff;
        }
        .course-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .course-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            background: #fff;
            box-shadow: var(--shadow);
        }
        .course-cover {
            width: 96px;
            height: 72px;
            border-radius: 12px;
            object-fit: cover;
            background: #e5e7eb;
            flex-shrink: 0;
        }
        .course-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .course-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }
        .course-desc {
            font-size: 13px;
            color: #6b7280;
            max-height: 36px;
            overflow: hidden;
        }
        .course-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 12px;
            color: #9ca3af;
        }
        .course-tag {
            padding: 2px 8px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #2563eb;
            font-size: 11px;
        }
        .course-progress-pill {
            padding: 2px 8px;
            border-radius: 999px;
            background: #ecfdf3;
            color: #16a34a;
            font-size: 11px;
        }
        .loading-text {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            padding: 24px 0;
        }
        .empty-text {
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="top-app-bar glass">
        <div class="title">在线学习</div>
    </div>

    <div class="content">
        <div class="section-title learning-header">精选课程</div>
        <div class="learning-tabs" id="categoryTabs">
            <div class="learning-tab active" data-category="all">全部</div>
            <div class="learning-tab" data-category="情绪调节">情绪调节</div>
            <div class="learning-tab" data-category="人际沟通">人际沟通</div>
            <div class="learning-tab" data-category="亲子教育">亲子教育</div>
            <div class="learning-tab" data-category="职场心理">职场心理</div>
        </div>

        <div class="section-title" style="margin-top: 4px;">课程列表</div>
        <div id="courseList" class="course-list">
            <div class="loading-text">正在加载课程...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentCategory = "all";
        let packageProgress = {};

        function getApiBase() {
            if (window.Android && typeof Android.getBaseUrl === "function") {
                return Android.getBaseUrl();
            }
            if (window.API_BASE_URL) {
                return window.API_BASE_URL + "/api";
            }
            return "http://10.0.2.2:8080/api";
        }

        function getAuthToken() {
            try {
                if (window.Android && typeof Android.getToken === "function") {
                    const t = Android.getToken();
                    if (t) return t;
                }
            } catch (e) {}
            const saved = localStorage.getItem("token");
            return saved || "";
        }

        async function apiGet(path) {
            const base = getApiBase();
            const token = getAuthToken();
            const headers = {};
            if (token) {
                headers["Authorization"] = "Bearer " + token;
            }
            const res = await fetch(base + path, { headers: headers });
            if (!res.ok) {
                throw new Error("网络错误");
            }
            const json = await res.json();
            if (json && typeof json.code !== "undefined") {
                if (json.code === 200) {
                    return json.data;
                }
                throw new Error(json.message || "请求失败");
            }
            return json;
        }

        function bindCategoryTabs() {
            const tabs = document.querySelectorAll(".learning-tab");
            tabs.forEach(function(tab) {
                tab.addEventListener("click", function() {
                    tabs.forEach(function(t) {
                        t.classList.remove("active");
                    });
                    this.classList.add("active");
                    currentCategory = this.getAttribute("data-category") || "all";
                    loadPackages();
                });
            });
        }

        async function loadPackages() {
            const listEl = document.getElementById("courseList");
            listEl.innerHTML = '<div class="loading-text">正在加载课程...</div>';
            try {
                let path = "/learning/packages";
                if (currentCategory !== "all") {
                    path = "/learning/packages/category/" + encodeURIComponent(currentCategory);
                }
                const packages = await apiGet(path);
                await loadProgressForPackages(packages);
                renderPackages(packages || []);
            } catch (e) {
                console.error(e);
                listEl.innerHTML = '<div class="empty-text">加载失败，请稍后重试</div>';
            }
        }

        async function loadProgressForPackages(packages) {
            packageProgress = {};
            if (!packages || !packages.length) {
                return;
            }
            try {
                const token = getAuthToken();
                if (!token) {
                    return;
                }
                const base = getApiBase();
                const headers = { "Authorization": "Bearer " + token };
                const promises = packages.map(function(p) {
                    return fetch(base + "/learning/packages/" + p.id + "/progress", { headers: headers })
                        .then(function(res) {
                            if (!res.ok) return null;
                            return res.json();
                        })
                        .then(function(json) {
                            if (!json || (typeof json.code !== "undefined" && json.code !== 200)) {
                                return;
                            }
                            const data = json.data || json;
                            packageProgress[p.id] = data;
                        })
                        .catch(function() {});
                });
                await Promise.all(promises);
            } catch (e) {
                console.error(e);
            }
        }

        function renderPackages(packages) {
            const listEl = document.getElementById("courseList");
            if (!packages || packages.length === 0) {
                listEl.innerHTML = '<div class="empty-text">暂无课程，稍后再来看看</div>';
                return;
            }
            const html = packages.map(function(pkg) {
                const cover = pkg.coverImage || "";
                const title = pkg.title || "未命名课程";
                const desc = pkg.description || "暂无简介";
                const category = pkg.category || "通用";
                const videoCount = pkg.videoCount || pkg.totalVideos || 0;
                const totalDuration = pkg.totalDuration || 0;
                const progressInfo = packageProgress[pkg.id] || {};
                const completed = progressInfo.completedVideos || 0;
                const total = progressInfo.totalVideos || videoCount;
                let progressText = "";
                if (total > 0 && completed > 0) {
                    progressText = Math.round(completed * 100 / total) + "% 已完成";
                } else if (total > 0) {
                    progressText = "尚未开始";
                }
                return (
                    '<div class="course-item" onclick="openCourse(' + pkg.id + ')">' +
                        (cover
                            ? '<img class="course-cover" src="' + cover + '" alt="cover">'
                            : '<div class="course-cover"></div>') +
                        '<div class="course-main">' +
                            '<div>' +
                                '<div class="course-title">' + title + '</div>' +
                                '<div class="course-desc">' + desc + '</div>' +
                            '</div>' +
                            '<div class="course-meta-row">' +
                                '<span class="course-tag">' + category + '</span>' +
                                '<span>' + videoCount + " 节 · " + totalDuration + " 分钟</span>" +
                            '</div>' +
                            (progressText
                                ? '<div class="course-meta-row"><span class="course-progress-pill">' + progressText + "</span></div>"
                                : "") +
                        "</div>" +
                    "</div>"
                );
            }).join("");
            listEl.innerHTML = html;
        }

        function openCourse(id) {
            window.location.href = "course.html?id=" + encodeURIComponent(id);
        }

        document.addEventListener("DOMContentLoaded", function() {
            bindCategoryTabs();
            loadPackages();
        });
    </script>
</body>
</html>
