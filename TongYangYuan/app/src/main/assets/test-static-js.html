<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JS 加载测试</title>
</head>
<body>
    <h1>JS 加载测试</h1>
    <p>stomp.min.js: <span id="s1">loading...</span></p>
    <p>app.js: <span id="s2">loading...</span></p>
    
    <!-- 静态方式加载 -->
    <script src="js/stomp.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.getElementById('s1').textContent = 'Stomp: ' + (typeof Stomp !== 'undefined' ? 'OK' : 'FAIL');
        document.getElementById('s2').textContent = 'resolveIdentityTag: ' + (typeof window.resolveIdentityTag !== 'undefined' ? 'OK' : 'FAIL');
        
        console.log('Stomp:', typeof Stomp);
        console.log('resolveIdentityTag:', typeof window.resolveIdentityTag);
    </script>
</body>
</html>
