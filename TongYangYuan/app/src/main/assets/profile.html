<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card {
            margin-top: 16px;
        }

        .profile-card .info-item {
            cursor: default;
        }

        .info-item {
            padding: 16px 0;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 16px;
            color: #333333;
        }

        .info-value {
            font-size: 16px;
            color: #666666;
        }

        .management-card {
            margin-top: 12px;
            padding: 0;
        }

        .management-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .management-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            color: #6FA6F8;
            flex-shrink: 0;
        }

        .management-item-content {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .quick-stat-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            color: #6FA6F8;
        }

        .management-item:last-child {
            border-bottom: none;
        }

        .management-item:active {
            background: rgba(111, 166, 248, 0.06);
        }

        .management-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .management-title {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
        }

        .management-desc {
            font-size: 13px;
            color: #999999;
        }

        .chevron-icon {
            width: 20px;
            height: 20px;
            stroke: #C0C0C0;
            stroke-width: 2;
            fill: none;
        }
    </style>
</head>
<body>
    <div class="top-app-bar glass">
        <div class="title">我的</div>
    </div>

    <div class="content">
        <div class="card profile-hero">
            <div class="hero-avatar" id="heroAvatar">访</div>
            <div class="hero-title" id="heroTitle">欢迎来到童康源</div>
            <div class="hero-subtitle" id="heroSubtitle">登录后获取个性化成长方案</div>
            <div class="status-pill" id="heroStatusPill">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/>
                </svg>
                <span id="pillText">未开通会员</span>
            </div>
            <button class="btn hero-action" id="heroActionBtn">立即登录</button>
        </div>

        <div class="section-title">账户总览</div>
        <div class="card profile-card">
            <div class="info-item">
                <span class="info-label">手机号</span>
                <span class="info-value" id="phone">未登录</span>
            </div>
            <div class="info-item">
                <span class="info-label">登录状态</span>
                <span class="info-value" id="loginStatus">未登录</span>
            </div>
            <div class="info-item">
                <span class="info-label">会员权益</span>
                <span class="info-value" id="memberStatus">未开通</span>
            </div>
            <!-- 当前操作孩子信息 -->
            <div class="info-item" id="currentChildInfo" style="display: none;">
                <span class="info-label">当前孩子</span>
                <span class="info-value" id="currentChildDisplay">-</span>
            </div>
        </div>

        <!-- 孩子成长档案卡片 -->
        <div class="card" id="childGrowthCard" style="margin-top: 16px; display: none;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                <div class="child-avatar-lg" id="growthChildAvatar" style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 600; flex-shrink: 0;"></div>
                <div style="flex: 1;">
                    <div style="font-size: 16px; font-weight: 600; color: var(--text-primary);" id="growthChildName">-</div>
                    <div style="font-size: 13px; color: var(--text-secondary);" id="growthChildMeta">-</div>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                <div style="text-align: center; padding: 12px; background: rgba(111, 166, 248, 0.08); border-radius: 12px;">
                    <div style="font-size: 18px; font-weight: 700; color: var(--primary-color);" id="growthConsultCount">0</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">咨询次数</div>
                </div>
                <div style="text-align: center; padding: 12px; background: rgba(255, 183, 197, 0.15); border-radius: 12px;">
                    <div style="font-size: 18px; font-weight: 700; color: #FF8FAB;" id="growthBadgeCount">0</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">获得勋章</div>
                </div>
                <div style="text-align: center; padding: 12px; background: rgba(189, 235, 200, 0.2); border-radius: 12px;">
                    <div style="font-size: 18px; font-weight: 700; color: #66BB6A;" id="growthDayCount">0</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">守护天数</div>
                </div>
            </div>
        </div>

        <div class="section-title">快捷数据</div>
        <div class="quick-stats">
            <div class="quick-stat-card">
                <img src="icons/membership-status.svg" alt="会员状态" class="quick-stat-icon">
                <div class="quick-stat-label">会员状态</div>
                <div class="quick-stat-value" id="statMember">未开通</div>
                <div class="quick-stat-sub" id="statMemberHint">开通后解锁专属咨询</div>
            </div>
            <div class="quick-stat-card" onclick="openChildManagement()">
                <img src="icons/child-profile.svg" alt="孩子档案" class="quick-stat-icon">
                <div class="quick-stat-label">孩子档案</div>
                <div class="quick-stat-value" id="statChild">未完善</div>
                <div class="quick-stat-sub" id="statChildHint">完成后推荐更精准</div>
            </div>
            <div class="quick-stat-card" id="badgeCard" style="display:none;">
                <img src="icons/certified-mentor.svg" alt="智慧妈妈徽章" class="quick-stat-icon">
                <div class="quick-stat-label">成长勋章</div>
                <div class="quick-stat-value" id="statBadge">未获得</div>
                <div class="quick-stat-sub" id="statBadgeHint">通过指导师考试后解锁</div>
            </div>
        </div>

        <div class="section-title">常用功能</div>
        <div class="card management-card">
            <div class="management-item" onclick="openAccountManagement()">
                <div class="management-item-content">
                    <img src="icons/account-management.svg" alt="账号管理" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">账号管理</span>
                        <span class="management-desc">调整登录方式、更新手机号</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
            <div class="management-item" onclick="openChildManagement()">
                <div class="management-item-content">
                    <img src="icons/child-management.svg" alt="孩子管理" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">孩子管理</span>
                        <span class="management-desc">完善或新增孩子信息</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
            <div class="management-item" onclick="openRechargePage()">
                <div class="management-item-content">
                    <img src="icons/membership-center.svg" alt="会员中心" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">会员中心</span>
                        <span class="management-desc">查看权益 / 立即开通</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
            <div class="management-item" onclick="window.location.href='my_consultations.html'">
                <div class="management-item-content">
                    <img src="icons/consultation-plan.svg" alt="我的咨询" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">我的咨询</span>
                        <span class="management-desc">查看历史咨询记录</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
        </div>

        <div class="section-title">咨询师中心</div>
        <div class="card management-card">
            <!-- 咨询师入口：登录后根据 userType 决定显示 -->
            <div class="management-item" id="consultantLoginEntry" onclick="openConsultantLogin()">
                <div class="management-item-content">
                    <img src="icons/certified-mentor.svg" alt="咨询师" class="management-icon">
                    <div class="management-info">
                        <span class="management-title" id="consultantEntryTitle">咨询师入口</span>
                        <span class="management-desc" id="consultantEntryDesc">登录管理咨询师账号</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
            <div class="management-item" onclick="window.location.href='consultant_training.html'">
                <div class="management-item-content">
                    <img src="icons/certified-mentor.svg" alt="加入咨询师" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">加入咨询师团队</span>
                        <span class="management-desc">蓝V认证通道</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
            <div class="management-item" onclick="window.location.href='consultant_certification.html'">
                <div class="management-item-content">
                    <img src="icons/satisfaction-rate.svg" alt="黄V认证" class="management-icon">
                    <div class="management-info">
                        <span class="management-title">黄V认证中心</span>
                        <span class="management-desc">资质认证 / 保证金管理</span>
                    </div>
                </div>
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M9 6l6 6-6 6" />
                </svg>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 孩子数据
        let childProfiles = [];
        let currentChildId = -1;

        // 获取用户配置
        function getUserProfile() {
            if (window.Android && Android.getUserProfile) {
                try {
                    return JSON.parse(Android.getUserProfile());
                } catch (e) {
                    return {};
                }
            }
            return {};
        }

        // 加载孩子信息
        function loadChildInfo() {
            if (window.Android && typeof Android.getChildProfiles === 'function') {
                try {
                    const json = Android.getChildProfiles();
                    const parsed = JSON.parse(json || '[]');
                    if (Array.isArray(parsed)) {
                        childProfiles = parsed;
                    }
                } catch (e) {
                    childProfiles = [];
                }
            }

            if (window.Android && typeof Android.getCurrentChildId === 'function') {
                try {
                    currentChildId = parseInt(Android.getCurrentChildId());
                } catch (e) {
                    currentChildId = -1;
                }
            }

            // 更新UI
            updateChildInfoUI();
        }

        // 计算年龄
        function calculateAge(birthDate) {
            if (!birthDate) return 0;
            try {
                const birth = new Date(birthDate);
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                const monthDiff = today.getMonth() - birth.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }
                return age;
            } catch (e) {
                return 0;
            }
        }

        // 更新孩子信息UI
        function updateChildInfoUI() {
            const currentChildInfo = document.getElementById('currentChildInfo');
            const currentChildDisplay = document.getElementById('currentChildDisplay');
            const childGrowthCard = document.getElementById('childGrowthCard');

            // 查找当前孩子
            const currentChild = childProfiles.find(c => {
                const cid = typeof c.id === 'string' ? parseInt(c.id) : c.id;
                return cid === currentChildId;
            });

            if (currentChild) {
                currentChildInfo.style.display = 'flex';
                const age = calculateAge(currentChild.birthDate);
                currentChildDisplay.textContent = `${currentChild.name || '未命名'} · ${age > 0 ? age + '岁' : '年龄未知'}`;

                // 显示成长档案卡片
                childGrowthCard.style.display = 'block';
                document.getElementById('growthChildName').textContent = currentChild.name || '未命名';
                document.getElementById('growthChildMeta').textContent = 
                    `${currentChild.gender === 'GIRL' ? '女孩' : '男孩'} · ${currentChild.birthDate || '生日未填'}`;
                document.getElementById('growthChildAvatar').textContent = (currentChild.name || '子').charAt(0);

                // TODO: 从服务器获取真实数据
                // 暂时使用模拟数据
                document.getElementById('growthConsultCount').textContent = '0';
                document.getElementById('growthBadgeCount').textContent = '0';
                document.getElementById('growthDayCount').textContent = '0';
            } else if (childProfiles.length > 0) {
                currentChildInfo.style.display = 'flex';
                const first = childProfiles[0];
                const age = calculateAge(first.birthDate);
                currentChildDisplay.textContent = `${first.name || '未命名'} · ${age > 0 ? age + '岁' : '年龄未知'}`;
                childGrowthCard.style.display = 'block';
                document.getElementById('growthChildName').textContent = first.name || '未命名';
            } else {
                currentChildInfo.style.display = 'none';
                childGrowthCard.style.display = 'none';
            }
        }

        function openAccountManagement() {
            if (window.Android && Android.openAccountManagement) {
                Android.openAccountManagement();
            } else {
                window.location.href = 'account_manage.html';
            }
        }

        function openConsultantLogin() {
            if (window.Android && Android.openConsultantLogin) {
                Android.openConsultantLogin();
            } else {
                window.location.href = 'consultant_login.html';
            }
        }

        function openChildManagement() {
            if (window.Android && Android.openChildManagement) {
                Android.openChildManagement();
            } else {
                window.location.href = 'child_info.html';
            }
        }

        function maskPhone(phone) {
            if (!phone || phone.length < 7) {
                return phone || '未登录';
            }
            return phone.slice(0, 3) + '****' + phone.slice(-4);
        }

        function hydrateProfile() {
            const user = getUserProfile ? getUserProfile() : {};
            const isLoggedIn = !!user.isLoggedIn;
            const phone = user.phone || '';
            const isPaid = !!user.isPaid;
            const hasChildProfile = !!user.hasChildProfile;

            document.getElementById('phone').textContent = isLoggedIn ? maskPhone(phone) : '未登录';
            document.getElementById('loginStatus').textContent = isLoggedIn ? '已登录' : '未登录';
            document.getElementById('memberStatus').textContent = isPaid ? '会员已开通' : '未开通';
            document.getElementById('statMember').textContent = isPaid ? '已激活' : '未开通';
            document.getElementById('statMemberHint').textContent = isPaid ? '可随时预约咨询师' : '开通后可预约专属咨询';
            document.getElementById('statChild').textContent = hasChildProfile ? '已完善' : '未完善';
            document.getElementById('statChildHint').textContent = hasChildProfile ? '已生成成长档案' : '完善后推荐更精准';

            let hasWisdomMomBadge = false;
            if (window.Android && Android.hasBadge) {
                try {
                    hasWisdomMomBadge = Android.hasBadge('wisdom_mom');
                } catch (e) {
                    hasWisdomMomBadge = false;
                }
            } else {
                hasWisdomMomBadge = localStorage.getItem('hasWisdomMomBadge') === 'true';
            }
            const badgeCard = document.getElementById('badgeCard');
            if (hasWisdomMomBadge) {
                badgeCard.style.display = 'block';
                document.getElementById('statBadge').textContent = '智慧妈妈';
                document.getElementById('statBadgeHint').textContent = '已通过指导师考试，获得成长勋章';
            } else {
                badgeCard.style.display = 'none';
            }

            const heroAvatar = document.getElementById('heroAvatar');
            const heroTitle = document.getElementById('heroTitle');
            const heroSubtitle = document.getElementById('heroSubtitle');
            const pillText = document.getElementById('pillText');
            const heroActionBtn = document.getElementById('heroActionBtn');

            heroAvatar.textContent = isLoggedIn && phone ? phone.slice(-2) : '访';
            heroTitle.textContent = isLoggedIn ? `Hi, ${maskPhone(phone)}` : '欢迎来到童康源';
            heroSubtitle.textContent = isPaid ? '感谢加入会员，享受专属守护' : '登录并开通会员，获得孩子成长方案';
            pillText.textContent = isPaid ? '童康源会员 · 有效' : '未开通会员';

            if (!isLoggedIn) {
                heroActionBtn.textContent = '立即登录';
                heroActionBtn.onclick = openAccountManagement;
            } else if (!isPaid) {
                heroActionBtn.textContent = '开通会员';
                heroActionBtn.onclick = openRechargePage;
            } else {
                heroActionBtn.textContent = '管理账号';
                heroActionBtn.onclick = openAccountManagement;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadChildInfo();
            hydrateProfile();
            updateConsultantEntry();
        });

        function updateConsultantEntry() {
            // 检查是否为咨询师账号
            var userType = '';
            if (window.Android && Android.getUserType) {
                try { userType = Android.getUserType() || ''; } catch(e) {}
            }
            var entryTitle = document.getElementById('consultantEntryTitle');
            var entryDesc = document.getElementById('consultantEntryDesc');
            if (entryTitle && entryDesc) {
                if (userType === 'CONSULTANT') {
                    entryTitle.textContent = '我的主页（咨询师）';
                    entryDesc.textContent = '查看和编辑咨询师资料';
                } else {
                    entryTitle.textContent = '咨询师入口';
                    entryDesc.textContent = '登录管理咨询师账号';
                }
            }
        }
    </script>
</body>
</html>
