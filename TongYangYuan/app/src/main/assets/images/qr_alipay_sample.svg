<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- 简化的二维码图案 - 支付宝风格 -->
  <g fill="#1677FF">
    <!-- 左上角定位点 -->
    <rect x="10" y="10" width="50" height="50" rx="5"/>
    <rect x="20" y="20" width="30" height="30" fill="#ffffff"/>
    <rect x="25" y="25" width="20" height="20"/>

    <!-- 右上角定位点 -->
    <rect x="140" y="10" width="50" height="50" rx="5"/>
    <rect x="150" y="20" width="30" height="30" fill="#ffffff"/>
    <rect x="155" y="25" width="20" height="20"/>

    <!-- 左下角定位点 -->
    <rect x="10" y="140" width="50" height="50" rx="5"/>
    <rect x="20" y="150" width="30" height="30" fill="#ffffff"/>
    <rect x="25" y="155" width="20" height="20"/>

    <!-- 中间数据区域 - 简化图案 -->
    <rect x="70" y="10" width="10" height="10"/>
    <rect x="85" y="10" width="10" height="10"/>
    <rect x="100" y="10" width="10" height="10"/>
    <rect x="115" y="10" width="10" height="10"/>

    <rect x="10" y="70" width="10" height="10"/>
    <rect x="10" y="85" width="10" height="10"/>
    <rect x="10" y="100" width="10" height="10"/>
    <rect x="10" y="115" width="10" height="10"/>

    <rect x="180" y="70" width="10" height="10"/>
    <rect x="180" y="85" width="10" height="10"/>
    <rect x="180" y="100" width="10" height="10"/>
    <rect x="180" y="115" width="10" height="10"/>

    <rect x="70" y="180" width="10" height="10"/>
    <rect x="85" y="180" width="10" height="10"/>
    <rect x="100" y="180" width="10" height="10"/>
    <rect x="115" y="180" width="10" height="10"/>

    <!-- 中心区域图案 -->
    <rect x="70" y="70" width="10" height="10"/>
    <rect x="85" y="75" width="10" height="10"/>
    <rect x="100" y="70" width="10" height="10"/>
    <rect x="115" y="75" width="10" height="10"/>

    <rect x="75" y="85" width="10" height="10"/>
    <rect x="90" y="90" width="20" height="20"/>
    <rect x="115" y="85" width="10" height="10"/>

    <rect x="70" y="115" width="10" height="10"/>
    <rect x="85" y="120" width="10" height="10"/>
    <rect x="100" y="115" width="10" height="10"/>
    <rect x="115" y="120" width="10" height="10"/>

    <!-- 更多装饰性图案 -->
    <rect x="140" y="70" width="10" height="10"/>
    <rect x="155" y="75" width="10" height="10"/>
    <rect x="140" y="100" width="10" height="10"/>
    <rect x="155" y="105" width="10" height="10"/>
    <rect x="140" y="120" width="10" height="10"/>

    <rect x="70" y="140" width="10" height="10"/>
    <rect x="85" y="145" width="10" height="10"/>
    <rect x="100" y="140" width="10" height="10"/>
    <rect x="115" y="145" width="10" height="10"/>
    <rect x="140" y="140" width="10" height="10"/>
    <rect x="155" y="145" width="10" height="10"/>
    <rect x="170" y="140" width="10" height="10"/>

    <rect x="140" y="160" width="10" height="10"/>
    <rect x="155" y="165" width="10" height="10"/>
    <rect x="170" y="160" width="10" height="10"/>
    <rect x="140" y="180" width="10" height="10"/>
    <rect x="155" y="180" width="10" height="10"/>
    <rect x="170" y="180" width="10" height="10"/>
  </g>
</svg>
