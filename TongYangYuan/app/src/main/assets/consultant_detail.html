<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>咨询师详情</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 头像区域 - 页面上三分之一 */
        .avatar-section {
            padding: 24px 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #BDEBC8 0%, #A9C9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(189, 235, 200, 0.4);
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-initial {
            font-size: 48px;
            font-weight: 700;
            color: white;
        }

        .avatar-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .avatar-badge.yellow-v {
            background: linear-gradient(135deg, #FFD54F 0%, #FFC107 100%);
        }

        .avatar-badge.blue-v {
            background: linear-gradient(135deg, #64B5F6 0%, #42A5F5 100%);
        }

        .consultant-name {
            font-size: 22px;
            font-weight: 700;
            color: #1E2A3B;
            margin-top: 16px;
        }

        .consultant-title {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .consultant-identity-tag {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .consultant-identity-tag.yellow-v {
            background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%);
            color: #F57C00;
        }

        .consultant-identity-tag.blue-v {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            color: #1976D2;
        }

        /* 统计数据 */
        .detail-stats {
            display: flex;
            gap: 1px;
            background: linear-gradient(135deg, #BDEBC8 0%, #A9C9FF 100%);
            margin: 16px;
            border-radius: 20px;
            overflow: hidden;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            background: white;
        }

        .stat-item:first-child {
            border-radius: 20px 0 0 20px;
        }

        .stat-item:last-child {
            border-radius: 0 20px 20px 0;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1E2A3B;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        /* 内容卡片 */
        .detail-card {
            margin: 0 16px 16px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(189, 235, 200, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #BDEBC8 0%, #A9C9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1E2A3B;
        }

        .specialty-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .specialty-tag {
            padding: 8px 16px;
            background: rgba(189, 235, 200, 0.15);
            border-radius: 12px;
            font-size: 14px;
            color: #2E7D32;
            border: 1px solid rgba(189, 235, 200, 0.3);
        }

        .intro-text {
            font-size: 15px;
            color: #666;
            line-height: 1.7;
        }

        /* 评价区域 */
        .reviews-card {
            margin: 0 16px 100px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(189, 235, 200, 0.2);
        }

        .reviews-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .reviews-count {
            font-size: 12px;
            color: #999;
        }

        .review-tag {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(189, 235, 200, 0.15);
            border-radius: 12px;
            font-size: 14px;
            color: #2E7D32;
            margin: 0 8px 8px 0;
        }

        /* 底部按钮 */
        .bottom-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: white;
            box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
            z-index: 100;
            max-width: 520px;
            margin: 0 auto;
        }

        .action-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #BDEBC8 0%, #A9C9FF 100%);
            color: #1E2A3B;
            box-shadow: 0 4px 16px rgba(189, 235, 200, 0.4);
        }

        .action-btn.primary:active {
            transform: scale(0.98);
        }

        .action-btn.secondary {
            background: rgba(189, 235, 200, 0.2);
            color: #2E7D32;
            flex: 0 0 auto;
            padding: 14px 20px;
        }

        /* 内容区域 */
        .content {
            padding: 0 !important;
            padding-bottom: 90px !important;
        }
    </style>
</head>
<body>
    <div class="top-app-bar glass">
        <button class="back-btn" onclick="history.back()">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div class="title" id="pageTitle">咨询师详情</div>
    </div>

    <div class="content">
        <!-- 头像区域 - 正中间 -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div class="avatar-large" id="avatarContainer">
                    <span class="avatar-initial">咨</span>
                </div>
                <span class="avatar-badge" id="avatarBadge" style="display: none;">V</span>
            </div>
            <div class="consultant-name" id="consultantName">加载中...</div>
            <div class="consultant-title" id="consultantTitle">-</div>
            <span class="consultant-identity-tag" id="identityTag"></span>
        </div>

        <!-- 统计数据 -->
        <div class="detail-stats">
            <div class="stat-item">
                <div class="stat-value" id="statRating">0.0</div>
                <div class="stat-label">综合评分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statServed">0</div>
                <div class="stat-label">服务家庭</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statYears">0</div>
                <div class="stat-label">从业年限</div>
            </div>
        </div>

        <!-- 擅长领域 -->
        <div class="detail-card">
            <div class="card-header">
                <div class="card-icon">🎯</div>
                <div class="card-title">擅长领域</div>
            </div>
            <div class="specialty-tags" id="specialtyTags">
                <span class="specialty-tag">加载中...</span>
            </div>
        </div>

        <!-- 咨询风格 -->
        <div class="detail-card">
            <div class="card-header">
                <div class="card-icon">💬</div>
                <div class="card-title">咨询风格</div>
            </div>
            <div class="intro-text" id="introText">-</div>
        </div>

        <!-- 家长反馈 -->
        <div class="reviews-card">
            <div class="reviews-header">
                <div class="card-icon">⭐</div>
                <div class="card-title">家长反馈</div>
                <div class="reviews-count" id="reviewsCount">0 条</div>
            </div>
            <div id="reviews">
                <span class="review-tag">欢迎预约后查看更多反馈</span>
            </div>
        </div>
    </div>

    <!-- 底部操作按钮 -->
    <div class="bottom-action">
        <button class="action-btn secondary" onclick="handleMessage()">
            💬 私信
        </button>
        <button class="action-btn primary" id="actionButton" onclick="handlePrimaryAction()">
            立即预约
        </button>
    </div>

    <script src="js/app.js"></script>
    <script>
        let currentConsultant = null;
        let paidUser = false;

        function escapeHtml(text) {
            if (text === undefined || text === null) return '';
            return String(text)
                .replace(/&/g, '&')
                .replace(/</g, '<')
                .replace(/>/g, '>')
                .replace(/"/g, '"')
                .replace(/'/g, '&#39;');
        }

        function loadConsultantData() {
            const name = getUrlParam('name');
            const consultant = resolveConsultant(name);
            if (!consultant) {
                showToast('咨询师信息不存在');
                return;
            }

            currentConsultant = consultant;
            
            // 更新页面标题
            document.getElementById('pageTitle').textContent = consultant.name + ' 咨询师';
            document.getElementById('consultantName').textContent = consultant.name;
            document.getElementById('consultantTitle').textContent = consultant.title || '-';

            // 渲染头像
            renderAvatar(consultant);
            
            // 渲染认证标签
            renderIdentityTag(consultant);
            
            // 渲染统计数据
            document.getElementById('statRating').textContent = Number(consultant.rating || 0).toFixed(1);
            document.getElementById('statServed').textContent = consultant.servedCount || consultant.served || 0;
            document.getElementById('statYears').textContent = consultant.years || consultant.experience || 0;

            // 渲染擅长领域
            renderSpecialty(consultant);
            
            // 渲染咨询风格
            document.getElementById('introText').textContent = consultant.intro || '暂无简介';

            // 渲染评价
            renderReviews(consultant.reviews);
            
            // 更新按钮状态
            updateActionButton();
        }

        function renderAvatar(consultant) {
            const container = document.getElementById('avatarContainer');
            const badge = document.getElementById('avatarBadge');
            
            // 检查是否有头像URL
            const avatarUrl = consultant.avatarUrl || consultant.photo || consultant.avatar;
            
            if (avatarUrl) {
                container.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(consultant.name)}" onerror="this.parentElement.innerHTML='<span class=\\'avatar-initial\\'>' + (consultant.name ? consultant.name.charAt(0) : '咨') + '</span>'">`;
            } else {
                const initial = consultant.name ? consultant.name.charAt(0) : '咨';
                container.innerHTML = `<span class="avatar-initial">${escapeHtml(initial)}</span>`;
            }
            
            // 渲染徽章
            if (consultant.identityTier === 'YELLOW_V') {
                badge.style.display = 'flex';
                badge.className = 'avatar-badge yellow-v';
                badge.textContent = 'V';
            } else if (consultant.identityTier === 'BLUE_V') {
                badge.style.display = 'flex';
                badge.className = 'avatar-badge blue-v';
                badge.textContent = 'V';
            } else {
                badge.style.display = 'none';
            }
        }

        function renderIdentityTag(consultant) {
            const tagEl = document.getElementById('identityTag');
            const tags = {
                'YELLOW_V': { text: '黄V认证', class: 'yellow-v' },
                'BLUE_V': { text: '蓝V咨询师', class: 'blue-v' },
                'INTERNAL': { text: '平台专家', class: '' }
            };
            
            const tag = tags[consultant.identityTier];
            if (tag) {
                tagEl.textContent = tag.text;
                tagEl.className = 'consultant-identity-tag' + (tag.class ? ' ' + tag.class : '');
            } else {
                tagEl.style.display = 'none';
            }
        }

        function renderSpecialty(consultant) {
            const container = document.getElementById('specialtyTags');
            const specialty = consultant.specialty || '';
            const list = specialty.split(/[,，、]/).filter(s => s.trim());
            
            if (list.length > 0) {
                container.innerHTML = list.map(s => 
                    `<span class="specialty-tag">${escapeHtml(s.trim())}</span>`
                ).join('');
            } else {
                container.innerHTML = '<span class="specialty-tag">暂无擅长领域</span>';
            }
        }

        function renderReviews(reviews = []) {
            const container = document.getElementById('reviews');
            const countEl = document.getElementById('reviewsCount');
            
            countEl.textContent = reviews.length + ' 条';
            
            if (!reviews.length) {
                container.innerHTML = '<span class="review-tag">欢迎预约后查看更多反馈</span>';
                return;
            }
            
            container.innerHTML = reviews.map(r => 
                `<span class="review-tag">${escapeHtml(r)}</span>`
            ).join('');
        }

        function resolveConsultant(name) {
            if (window.Android && Android.getConsultantDetail) {
                try {
                    const json = Android.getConsultantDetail(name || '');
                    const detail = JSON.parse(json || '{}');
                    if (detail && detail.name) {
                        return detail;
                    }
                } catch (e) {
                    console.error('加载咨询师详情失败', e);
                }
            }
            
            // Fallback
            if (Array.isArray(window.FALLBACK_CONSULTANTS)) {
                return window.FALLBACK_CONSULTANTS.find(item => item.name === name) 
                    || window.FALLBACK_CONSULTANTS[0];
            }
            return null;
        }

        function handleMessage() {
            if (window.Android && Android.navigateToChat) {
                Android.navigateToChat(currentConsultant.name);
            } else {
                showToast('私信功能开发中');
            }
        }

        function bookAppointment() {
            if (window.Android) {
                Android.navigateToAppointment(currentConsultant.name);
            } else {
                showToast('预约咨询功能');
            }
        }

        function handlePayNow() {
            if (window.openRechargePage) {
                window.openRechargePage();
            } else if (window.Android && Android.navigateToRecharge) {
                Android.navigateToRecharge();
            } else {
                window.location.href = 'recharge.html';
            }
        }

        function handlePrimaryAction() {
            if (paidUser) {
                bookAppointment();
            } else {
                handlePayNow();
            }
        }

        function updateActionButton() {
            const button = document.getElementById('actionButton');
            if (!button) return;
            
            if (paidUser) {
                button.textContent = '立即预约';
            } else {
                button.textContent = '开通会员预约';
            }
        }

        function refreshPaymentState() {
            if (window.Android && Android.isPaidUser) {
                paidUser = Android.isPaidUser();
            } else {
                paidUser = window.isPaidUser ? window.isPaidUser() : false;
            }
            updateActionButton();
        }

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadConsultantData();
            refreshPaymentState();
        });

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                refreshPaymentState();
            }
        });
    </script>
</body>
</html>
