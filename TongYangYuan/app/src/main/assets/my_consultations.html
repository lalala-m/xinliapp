<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的咨询</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .consultations-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .consultation-tab {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            background: white;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .consultation-tab.active {
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(111, 166, 248, 0.35);
        }

        .consultation-card {
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .consultation-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .consultation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .consultation-info {
            flex: 1;
        }

        .consultation-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .consultation-domain {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .consultation-status {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .consultation-status.pending {
            background: rgba(255, 152, 0, 0.12);
            color: #E65100;
        }

        .consultation-status.confirmed {
            background: rgba(76, 175, 80, 0.12);
            color: #2E7D32;
        }

        .consultation-status.completed {
            background: rgba(33, 150, 243, 0.12);
            color: #1565C0;
        }

        .consultation-status.cancelled {
            background: rgba(158, 158, 158, 0.12);
            color: #616161;
        }

        .consultation-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .consultation-detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .consultation-detail-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .consultation-detail-value {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .consultation-child {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(111, 166, 248, 0.08);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .consultation-child-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB3C6 0%, #FF8FAB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .consultation-child-name {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .consultation-child-age {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .consultation-actions {
            display: flex;
            gap: 8px;
        }

        .consultation-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .consultation-btn.primary {
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            color: white;
        }

        .consultation-btn.primary:active {
            transform: scale(0.98);
        }

        .consultation-btn.secondary {
            background: rgba(0,0,0,0.04);
            color: var(--text-secondary);
        }

        .consultation-empty {
            text-align: center;
            padding: 60px 20px;
        }

        .consultation-empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .consultation-empty h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: var(--text-primary);
        }

        .consultation-empty p {
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .consultation-empty-btn {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6FA6F8 0%, #A9C9FF 100%);
            color: white;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }

        .consultation-list {
            display: none;
        }

        .consultation-list.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="top-app-bar glass">
        <button class="back-btn" onclick="goBack()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div class="title">我的咨询</div>
    </div>

    <div class="content">
        <!-- 标签切换 -->
        <div class="consultations-tabs">
            <button class="consultation-tab active" data-tab="all" onclick="switchTab('all')">全部</button>
            <button class="consultation-tab" data-tab="pending" onclick="switchTab('pending')">待确认</button>
            <button class="consultation-tab" data-tab="confirmed" onclick="switchTab('confirmed')">已确认</button>
            <button class="consultation-tab" data-tab="completed" onclick="switchTab('completed')">已完成</button>
        </div>

        <!-- 全部咨询 -->
        <div class="consultation-list active" id="list-all">
            <div class="consultation-card" id="consultationCard1">
                <div class="consultation-header">
                    <div class="consultation-avatar">李</div>
                    <div class="consultation-info">
                        <div class="consultation-name">李明咨询师</div>
                        <div class="consultation-domain">亲子沟通 · 家庭教育</div>
                    </div>
                    <span class="consultation-status confirmed">已确认</span>
                </div>
                <div class="consultation-details">
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">预约日期</span>
                        <span class="consultation-detail-value">2024-03-15</span>
                    </div>
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">预约时段</span>
                        <span class="consultation-detail-value">10:00-11:00</span>
                    </div>
                </div>
                <div class="consultation-child">
                    <div class="consultation-child-avatar">小</div>
                    <div>
                        <div class="consultation-child-name">小明</div>
                        <div class="consultation-child-age">8岁</div>
                    </div>
                </div>
                <div class="consultation-actions">
                    <button class="consultation-btn primary" onclick="openChat('record1')">进入咨询</button>
                    <button class="consultation-btn secondary" onclick="viewDetail('record1')">查看详情</button>
                </div>
            </div>

            <div class="consultation-card">
                <div class="consultation-header">
                    <div class="consultation-avatar" style="background: linear-gradient(135deg, #FFB3C6 0%, #FF8FAB 100%);">王</div>
                    <div class="consultation-info">
                        <div class="consultation-name">王芳咨询师</div>
                        <div class="consultation-domain">学习困难 · 注意力训练</div>
                    </div>
                    <span class="consultation-status pending">待确认</span>
                </div>
                <div class="consultation-details">
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">预约日期</span>
                        <span class="consultation-detail-value">2024-03-18</span>
                    </div>
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">预约时段</span>
                        <span class="consultation-detail-value">15:00-16:00</span>
                    </div>
                </div>
                <div class="consultation-child">
                    <div class="consultation-child-avatar">小</div>
                    <div>
                        <div class="consultation-child-name">小明</div>
                        <div class="consultation-child-age">8岁</div>
                    </div>
                </div>
                <div class="consultation-actions">
                    <button class="consultation-btn secondary" onclick="cancelAppointment('record2')">取消预约</button>
                    <button class="consultation-btn secondary" onclick="viewDetail('record2')">查看详情</button>
                </div>
            </div>

            <div class="consultation-card">
                <div class="consultation-header">
                    <div class="consultation-avatar" style="background: linear-gradient(135deg, #B9F6CA 0%, #69F0AE 100%);">张</div>
                    <div class="consultation-info">
                        <div class="consultation-name">张伟咨询师</div>
                        <div class="consultation-domain">情绪管理 · 心理辅导</div>
                    </div>
                    <span class="consultation-status completed">已完成</span>
                </div>
                <div class="consultation-details">
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">咨询日期</span>
                        <span class="consultation-detail-value">2024-03-10</span>
                    </div>
                    <div class="consultation-detail-item">
                        <span class="consultation-detail-label">咨询时长</span>
                        <span class="consultation-detail-value">60分钟</span>
                    </div>
                </div>
                <div class="consultation-child">
                    <div class="consultation-child-avatar" style="background: linear-gradient(135deg, #B9F6CA 0%, #69F0AE 100%);">小</div>
                    <div>
                        <div class="consultation-child-name">小华</div>
                        <div class="consultation-child-age">10岁</div>
                    </div>
                </div>
                <div class="consultation-actions">
                    <button class="consultation-btn primary" onclick="viewConsultationRecord('record3')">查看记录</button>
                    <button class="consultation-btn secondary" onclick="rebookConsultant('record3')">再次预约</button>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="consultation-empty" id="emptyState" style="display: none;">
            <div class="consultation-empty-icon">📋</div>
            <h3>暂无咨询记录</h3>
            <p>您还没有预约过咨询师<br>快去预约一位专业咨询师吧</p>
            <button class="consultation-empty-btn" onclick="findConsultant()">查找咨询师</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 标签切换
        function switchTab(tab) {
            // 更新标签样式
            document.querySelectorAll('.consultation-tab').forEach(t => {
                t.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // 更新列表显示
            document.querySelectorAll('.consultation-list').forEach(list => {
                list.classList.remove('active');
            });
            
            if (tab === 'all') {
                document.getElementById('list-all').classList.add('active');
            }
        }

        // 进入咨询聊天
        function openChat(appointmentId) {
            if (window.Android && Android.navigateToChat) {
                Android.navigateToChat(appointmentId);
            } else {
                showToast('正在进入咨询...');
            }
        }

        // 查看详情
        function viewDetail(appointmentId) {
            if (window.Android && Android.viewAppointmentDetail) {
                Android.viewAppointmentDetail(appointmentId);
            } else {
                showToast('查看详情功能开发中...');
            }
        }

        // 取消预约
        function cancelAppointment(appointmentId) {
            if (confirm('确定要取消这个预约吗？')) {
                if (window.Android && Android.cancelAppointment) {
                    Android.cancelAppointment(appointmentId);
                } else {
                    showToast('预约已取消');
                }
            }
        }

        // 查看咨询记录
        function viewConsultationRecord(appointmentId) {
            if (window.Android && Android.viewConsultationRecord) {
                Android.viewConsultationRecord(appointmentId);
            } else {
                showToast('查看记录功能开发中...');
            }
        }

        // 再次预约
        function rebookConsultant(appointmentId) {
            if (window.Android && Android.rebookConsultant) {
                Android.rebookConsultant(appointmentId);
            } else {
                showToast('正在跳转预约页面...');
            }
        }

        // 查找咨询师
        function findConsultant() {
            if (window.Android && Android.navigateToConsultantList) {
                Android.navigateToConsultantList();
            } else if (window.Android && Android.openWebPage) {
                Android.openWebPage('consult.html');
            } else {
                showToast('查找咨询师功能开发中...');
            }
        }

        function goBack() {
            if (window.Android && Android.goBack) {
                Android.goBack();
            } else {
                window.history.back();
            }
        }

        function showToast(message) {
            if (window.Android && Android.showToast) {
                Android.showToast(message);
            } else {
                alert(message);
            }
        }
    </script>
</body>
</html>
