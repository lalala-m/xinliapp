<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咨询师管理 - 童养园管理后台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo" style="display: flex; align-items: center; gap: 12px;">
                <img src="../images/tongkangyuan.png" alt="Logo" style="width: 60px; height: 60px; object-fit: cover; border-radius: 10px;">
                <h2>童养园管理后台</h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="users.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </a>
                <a href="consultants.html" class="nav-item active">
                    <span class="icon">👨‍⚕️</span>
                    <span>咨询师管理</span>
                </a>
                <a href="learning.html" class="nav-item">
                    <span class="icon">📚</span>
                    <span>学习资源</span>
                </a>
                <a href="appointments.html" class="nav-item">
                    <span class="icon">📅</span>
                    <span>预约管理</span>
                </a>
                <a href="statistics.html" class="nav-item">
                    <span class="icon">📈</span>
                    <span>数据统计</span>
                </a>
                <a href="home-config.html" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>首页配置</span>
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <span class="icon">🚪</span>
                    <span>退出登录</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>首页</span>
                    <span class="separator">/</span>
                    <span>咨询师管理</span>
                </div>
                <div class="user-info">
                    <span id="adminName">管理员</span>
                    <span class="badge">ADMIN</span>
                </div>
            </header>

            <!-- 搜索和筛选 -->
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索咨询师（姓名、专业领域）">
                    <button onclick="searchConsultants()">🔍 搜索</button>
                </div>
                <div class="filter-box">
                    <select id="statusFilter" onchange="filterConsultants()">
                        <option value="">全部状态</option>
                        <option value="ACTIVE">在线</option>
                        <option value="BUSY">忙碌</option>
                        <option value="OFFLINE">离线</option>
                    </select>
                    <select id="verifyFilter" onchange="filterConsultants()">
                        <option value="">全部认证</option>
                        <option value="true">已认证</option>
                        <option value="false">未认证</option>
                    </select>
                    <button onclick="refreshConsultants()">🔄 刷新</button>
                    <button onclick="showAddConsultantModal()" class="btn-primary" style="margin-left: 10px;">+ 添加咨询师</button>
                </div>
            </div>

            <!-- 咨询师列表 -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>头像</th>
                            <th>姓名</th>
                            <th>擅长的心理咨询领域</th>
                            <th>评分</th>
                            <th>咨询次数</th>
                            <th>认证状态</th>
                            <th>在线状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="consultantTableBody">
                        <tr>
                            <td colspan="9" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button onclick="prevPage()" id="prevBtn">上一页</button>
                <span id="pageInfo">第 1 页 / 共 1 页</span>
                <button onclick="nextPage()" id="nextBtn">下一页</button>
            </div>
        </main>
    </div>

    <!-- 咨询师详情模态框 -->
    <div id="consultantModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="modalTitle">咨询师详情</h2>
                <button class="close" onclick="closeModal()">×</button>
            </div>
            
            <div class="modal-body">
                <div id="consultantDetails"></div>
                
                <!-- 编辑表单 -->
                <form id="consultantForm" style="display:none;">
                    <input type="hidden" id="editConsultantId">
                    <div class="form-grid">
                        <!-- 头像上传区域 -->
                        <div class="form-group full-width">
                            <label>咨询师头像</label>
                            <div class="avatar-upload-container">
                                <div class="avatar-preview" id="avatarPreview">
                                    <img src="../images/default-avatar.svg" alt="头像预览" id="avatarPreviewImg">
                                    <div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()">
                                        <span>更换头像</span>
                                    </div>
                                </div>
                                <div class="avatar-actions">
                                    <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarFileSelect(event)">
                                    <input type="text" id="editAvatarUrl" class="form-control" placeholder="或直接输入头像图片URL">
                                    <button type="button" class="btn-secondary" onclick="document.getElementById('avatarInput').click()">上传图片</button>
                                    <button type="button" class="btn-warning" onclick="clearAvatar()">清除头像</button>
                                </div>
                                <div class="avatar-tips">
                                    <small>支持 JPG、PNG 格式，建议尺寸 256x256 像素</small>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>姓名 <span>*</span></label>
                            <input type="text" id="editName" class="form-control" placeholder="请输入咨询师姓名" required>
                        </div>
                        <div class="form-group">
                            <label>手机号 (仅新增需填)</label>
                            <input type="text" id="editPhone" class="form-control" placeholder="用于登录账号">
                        </div>
                        <div class="form-group">
                            <label>职称 <span>*</span></label>
                            <input type="text" id="editTitle" class="form-control" placeholder="例如：资深心理咨询师" required>
                        </div>
                        <div class="form-group">
                            <label>等级</label>
                            <select id="editIdentityTier" class="form-control">
                                <option value="BRONZE">普通 (BRONZE)</option>
                                <option value="SILVER">黄V (SILVER)</option>
                                <option value="GOLD">蓝V (GOLD)</option>
                                <option value="PLATINUM">内部人员 (PLATINUM)</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>擅长的心理咨询领域 <span>*</span></label>
                            <div class="multi-select" id="specialtyMultiSelect">
                                <div class="multi-select-control" id="specialtyControl">
                                    <div class="multi-select-values" id="specialtyDisplay">请选择擅长领域</div>
                                    <div class="multi-select-arrow">⌄</div>
                                </div>
                                <div class="multi-select-dropdown" id="specialtyDropdown">
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_attention" value="注意力与多动">
                                        <label for="specialty_attention">注意力与多动</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_emotion" value="情绪管理">
                                        <label for="specialty_emotion">情绪管理</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_social" value="社交适应">
                                        <label for="specialty_social">社交适应</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_family" value="亲子关系与家庭沟通">
                                        <label for="specialty_family">亲子关系与家庭沟通</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_school" value="学习动力与学校适应">
                                        <label for="specialty_school">学习动力与学校适应</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_anxiety" value="焦虑与情绪困扰">
                                        <label for="specialty_anxiety">焦虑与情绪困扰</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_behavior" value="行为管理与规则意识">
                                        <label for="specialty_behavior">行为管理与规则意识</label>
                                    </div>
                                    <div class="multi-select-option">
                                        <input type="checkbox" id="specialty_other" value="其他儿童青少年心理问题">
                                        <label for="specialty_other">其他儿童青少年心理问题</label>
                                    </div>
                                </div>
                                <input type="hidden" id="editSpecialty" required>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>个人简介</label>
                            <textarea id="editIntro" class="form-control" rows="4" placeholder="请输入咨询师的详细介绍..."></textarea>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer" id="modalActions">
                <!-- 动态按钮 -->
            </div>
        </div>
    </div>

    <script src="../js/config.js?v=3.3"></script>
    <script src="js/admin-common.js?v=3.3"></script>
    <script src="js/admin-consultants.js?v=3.3"></script>
    <link rel="stylesheet" href="css/admin.css?v=3.4">
</body>
</html>
