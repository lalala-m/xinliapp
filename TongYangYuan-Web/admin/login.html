<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员登录 - 童养园管理后台</title>
    <link rel="stylesheet" href="../css/common.css" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          sans-serif;
      }

      .login-container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        width: 400px;
        max-width: 90%;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        color: #333;
        font-size: 28px;
        margin: 0 0 10px 0;
      }

      .logo p {
        color: #666;
        font-size: 14px;
        margin: 0;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #333;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        color: #999;
        font-size: 12px;
      }

      .consultant-link {
        text-align: center;
        margin-top: 16px;
      }

      .consultant-link a {
        color: #667eea;
        font-size: 13px;
        text-decoration: none;
        font-weight: 600;
      }

      .consultant-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1>🔐 管理员登录</h1>
        <p>童养园管理后台系统</p>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="phone">账号</label>
          <input
            type="text"
            id="phone"
            name="phone"
            placeholder="请输入管理员账号"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="请输入密码"
            required
          />
        </div>

        <button type="submit" class="btn-login">登录</button>
      </form>

      <div class="footer">
        <p>© 2024 童养园. All rights reserved.</p>
      </div>

      <div class="consultant-link">
        <a href="../dashboard.html">👨‍⚕️ 我是咨询师，点击此处登录</a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
      // Extract API_BASE_URL from CONFIG
      const API_BASE_URL = CONFIG.API_BASE_URL;

      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("errorMessage");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const phone = document.getElementById("phone").value;
        const password = document.getElementById("password").value;

        // API_BASE_URL 已在 config.js 中含 /api；context-path=/api 时登录地址为 /api/auth/login
        const loginUrl = API_BASE_URL.endsWith("/api")
          ? API_BASE_URL.replace("/api", "") + "/api/auth/login"
          : API_BASE_URL + "/auth/login";

        try {
          const response = await fetch(loginUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ phone, password }),
          });

          const data = await response.json();

          if (response.ok && data.data && data.data.token) {
            const loginData = data.data;
            // 检查是否是管理员
            if (loginData.userType !== "ADMIN") {
              showError("权限不足，需要管理员账号");
              return;
            }

            // 保存token和用户信息
            localStorage.setItem("token", loginData.token);
            localStorage.setItem(
              "userInfo",
              JSON.stringify({
                id: loginData.userId,
                phone: loginData.phone,
                name: loginData.nickname || "管理员",
                role: loginData.userType,
              }),
            );

            // 跳转到管理后台首页
            window.location.href = "index.html";
          } else {
            showError(data.message || "登录失败");
          }
        } catch (error) {
          console.error("登录错误:", error);
          const hint =
            "无法连接登录接口（" +
            loginUrl +
            "）。请确认：① Spring Boot 已启动；② MySQL/Redis 正常；③ config.js 中 API_BASE_URL 与后端端口一致。";
          showError(hint);
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
        setTimeout(() => {
          errorMessage.style.display = "none";
        }, 3000);
      }

      // 检查是否已登录
      const token = localStorage.getItem("token");
      const userInfo = JSON.parse(localStorage.getItem("userInfo") || "{}");
      if (token && userInfo.role === "ADMIN") {
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
