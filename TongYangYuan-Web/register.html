<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咨询师注册 - 童养园</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .register-form {
            max-width: 500px;
        }

        .form-section {
            margin-bottom: 32px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #6FA6F8;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .input-label .required {
            color: #FF5252;
            margin-left: 4px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6FA6F8;
            box-shadow: 0 0 0 3px rgba(111, 166, 248, 0.1);
        }

        textarea.input-field {
            resize: vertical;
            min-height: 100px;
        }

        .error-message {
            color: #FF5252;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #4CAF50;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .btn-register {
            width: 100%;
            margin-top: 24px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #6FA6F8;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .info-box {
            background: #F0F7FF;
            border-left: 4px solid #6FA6F8;
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 4px;
        }

        .info-box-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .info-box-text {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="max-width: 600px;">
            <div class="login-header">
                <div class="login-logo">童</div>
                <h1 class="login-title">咨询师注册</h1>
                <p class="login-subtitle">加入童养园专业咨询师团队</p>
            </div>

            <div class="info-box">
                <div class="info-box-title">注册须知</div>
                <div class="info-box-text">
                    1. 请确保填写真实的个人信息<br>
                    2. 注册成功后即可开始接受咨询预约<br>
                    3. 如有问题请联系管理员
                </div>
            </div>

            <form class="login-form register-form" id="registerForm">
                <!-- 账号信息 -->
                <div class="form-section">
                    <div class="form-section-title">账号信息</div>
                    
                    <div class="input-group">
                        <label class="input-label" for="phone">
                            手机号<span class="required">*</span>
                        </label>
                        <input
                            type="tel"
                            id="phone"
                            class="input-field"
                            placeholder="请输入11位手机号"
                            maxlength="11"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="password">
                            密码<span class="required">*</span>
                        </label>
                        <input
                            type="password"
                            id="password"
                            class="input-field"
                            placeholder="请输入密码（至少6位）"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="confirmPassword">
                            确认密码<span class="required">*</span>
                        </label>
                        <input
                            type="password"
                            id="confirmPassword"
                            class="input-field"
                            placeholder="请再次输入密码"
                            required
                        >
                    </div>
                </div>

                <!-- 个人信息 -->
                <div class="form-section">
                    <div class="form-section-title">个人信息</div>
                    
                    <div class="input-group">
                        <label class="input-label" for="realName">
                            真实姓名<span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="realName"
                            class="input-field"
                            placeholder="请输入真实姓名"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="title">
                            职称
                        </label>
                        <input
                            type="text"
                            id="title"
                            class="input-field"
                            placeholder="例如：国家二级心理咨询师"
                        >
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="specialization">
                            专长领域
                        </label>
                        <input
                            type="text"
                            id="specialization"
                            class="input-field"
                            placeholder="例如：儿童心理、家庭关系、情绪管理"
                        >
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="introduction">
                            个人简介
                        </label>
                        <textarea
                            id="introduction"
                            class="input-field"
                            placeholder="请简单介绍您的专业背景、工作经验和咨询理念"
                        ></textarea>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <button type="submit" class="btn btn-primary btn-register" id="registerBtn">
                    注册
                </button>
            </form>

            <div class="login-link">
                已有账号？<a href="index.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const realName = document.getElementById('realName').value.trim();
            const title = document.getElementById('title').value.trim();
            const specialization = document.getElementById('specialization').value.trim();
            const introduction = document.getElementById('introduction').value.trim();
            
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            // 隐藏之前的消息
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            // 验证手机号
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                errorMessage.textContent = '请输入正确的手机号';
                errorMessage.classList.add('show');
                return;
            }
            
            // 验证密码
            if (password.length < 6) {
                errorMessage.textContent = '密码长度至少6位';
                errorMessage.classList.add('show');
                return;
            }
            
            // 验证密码一致性
            if (password !== confirmPassword) {
                errorMessage.textContent = '两次输入的密码不一致';
                errorMessage.classList.add('show');
                return;
            }
            
            // 验证真实姓名
            if (!realName) {
                errorMessage.textContent = '请输入真实姓名';
                errorMessage.classList.add('show');
                return;
            }
            
            // 禁用按钮
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            try {
                const response = await fetch(API_BASE_URL + '/auth/register/consultant', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone,
                        password: password,
                        confirmPassword: confirmPassword,
                        realName: realName,
                        title: title || null,
                        specialization: specialization || null,
                        introduction: introduction || null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存token和用户信息
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('userId', data.data.userId);
                    localStorage.setItem('userType', data.data.userType);
                    localStorage.setItem('phone', data.data.phone);
                    localStorage.setItem('nickname', data.data.nickname);
                    localStorage.setItem('consultantId', data.data.consultantId);
                    
                    successMessage.textContent = data.message || '注册成功！';
                    successMessage.classList.add('show');
                    
                    // 延迟跳转
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    errorMessage.textContent = data.message || '注册失败，请重试';
                    errorMessage.classList.add('show');
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                }
            } catch (error) {
                console.error('注册错误:', error);
                errorMessage.textContent = '网络错误，请检查网络连接';
                errorMessage.classList.add('show');
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
