<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>视频咨询室 - 童康源</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/video-call.css">
</head>
<body>
    <div class="vc-root">

        <!-- 远端视频全屏 -->
        <div class="vc-remote" id="vcRemote">
            <video id="remoteVideo" autoplay playsinline></video>
            <!-- 远端未连上时显示头像等待区 -->
            <div class="vc-waiting" id="vcWaiting">
                <div class="vc-avatar-wrap" id="vcAvatarWrap">
                    <div class="vc-ring vc-ring-1"></div>
                    <div class="vc-ring vc-ring-2"></div>
                    <div class="vc-avatar" id="callAvatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>
                <div class="vc-cname" id="callClientName">家长</div>
                <div class="vc-state" id="callStateText">等待接入…</div>
                <div class="vc-timer" id="callDuration">00:00</div>
            </div>
        </div>

        <!-- 本地小窗预览（右上角） -->
        <div class="vc-local-wrap" id="vcLocalWrap">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="vc-local-ph" id="localVideoPlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </div>
        </div>

        <!-- 顶部状态栏 -->
        <div class="vc-topbar">
            <button class="vc-close" id="vcClose" onclick="VideoCall.endCall()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="vc-badge" id="callTypeBadge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                    <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
                </svg>
                视频通话
            </div>
            <div class="vc-net" id="vcNetIndicator">
                <div class="vc-net-dot"></div>
                <span>连接中</span>
            </div>
        </div>

        <!-- 连接中旋转遮罩 -->
        <div class="vc-loading" id="connectionStatus">
            <div class="vc-spinner"></div>
            <div class="vc-spinner-ring"></div>
            <span id="connStatusText">正在建立连接…</span>
        </div>

        <!-- 来电等待界面（被叫场景：显示振铃，等待对方接听） -->
        <div class="vc-incoming-overlay" id="incomingCallOverlay" style="display:none">
            <div class="vc-incoming-card">
                <div class="vc-incoming-rings">
                    <div class="vc-incoming-ring vc-ring-a"></div>
                    <div class="vc-incoming-ring vc-ring-b"></div>
                </div>
                <div class="vc-incoming-avatar" id="incomingAvatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="vc-incoming-name" id="incomingName">家长</div>
                <div class="vc-incoming-sub" id="incomingSub">来电呼叫中…</div>
                <div class="vc-incoming-actions">
                    <button class="vc-incoming-btn reject" id="btnRejectIncoming" onclick="VideoCall.rejectIncomingCall()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                        拒绝
                    </button>
                    <button class="vc-incoming-btn accept" id="btnAcceptIncoming" onclick="VideoCall.acceptIncomingCall()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        接听
                    </button>
                </div>
            </div>
        </div>

        <!-- 等待对方接听界面（主叫场景） -->
        <div class="vc-waiting-peer-overlay" id="waitingPeerOverlay" style="display:none">
            <div class="vc-waiting-peer-card">
                <div class="vc-waiting-rings">
                    <div class="vc-ring vc-ring-1"></div>
                    <div class="vc-ring vc-ring-2"></div>
                </div>
                <div class="vc-waiting-peer-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="vc-waiting-peer-name" id="waitingPeerName">家长</div>
                <div class="vc-waiting-peer-state" id="waitingPeerState">等待对方接听…</div>
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="vc-bottom">
            <!-- 麦克风 -->
            <div class="vc-ctrl">
                <button class="vc-btn vc-btn-n" id="btnMute" onclick="VideoCall.toggleMute()">
                    <svg class="ic-mic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                    <svg class="ic-mic-off" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" style="display:none">
                        <line x1="1" y1="1" x2="23" y2="23"/>
                        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                </button>
                <span class="vc-lbl" id="lblMute">静音</span>
            </div>

            <!-- 挂断 -->
            <div class="vc-ctrl">
                <button class="vc-btn vc-btn-hangup" onclick="VideoCall.endCall()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                </button>
                <span class="vc-lbl">挂断</span>
            </div>

            <!-- 摄像头 -->
            <div class="vc-ctrl" id="videoCtrlBtn">
                <button class="vc-btn vc-btn-n" id="btnVideo" onclick="VideoCall.toggleVideo()">
                    <svg class="ic-cam-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
                    </svg>
                    <svg class="ic-cam-off" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <line x1="1" y1="1" x2="23" y2="23"/>
                        <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34"/>
                    </svg>
                </button>
                <span class="vc-lbl" id="lblVideo">关摄像头</span>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.0/dist/livekit-client.umd.min.js"></script>
    <script src="js/video-call.js?v=2.1.0"></script>
</body>
</html>
