<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>视频通话 - 童养园咨询师端</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/video-call.css">
</head>
<body>
    <div class="video-call-container">

        <!-- 远端视频（全屏显示） -->
        <div class="remote-video-area" id="remoteVideoArea">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <!-- 头像等待区 -->
        <div class="call-center" id="avatarCenter">
            <div class="avatar-zone" id="avatarZone">
                <div class="ring-1" id="ring1"></div>
                <div class="ring-2" id="ring2"></div>
                <div class="avatar-circle" id="callAvatar">张</div>
            </div>
            <div class="consultant-label" id="callClientName">家长</div>
            <div class="call-state-text" id="callStateText">等待接入...</div>
            <div class="call-timer" id="callDuration">00:00</div>
        </div>

        <!-- 连接中状态遮罩 -->
        <div class="conn-status" id="connectionStatus">
            <div class="conn-spinner"></div>
            <div class="conn-text">正在建立连接...</div>
        </div>

        <!-- 顶部栏 -->
        <div class="call-top-bar">
            <a class="back-btn" href="javascript:void(0)" onclick="VideoCall.goBack()">✕</a>
            <div class="call-badge" id="callTypeBadge">视频通话</div>
        </div>

        <!-- 底部控制栏 -->
        <div class="call-bottom">
            <div class="ctrl-btn" id="muteCtrlBtn">
                <div class="ctrl-circle" id="btnMute" onclick="VideoCall.toggleMute()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconMicOn">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconMicOff" style="display:none">
                        <line x1="1" y1="1" x2="23" y2="23"/>
                        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                </div>
                <span class="ctrl-label" id="lblMute">静音</span>
            </div>

            <div class="ctrl-btn">
                <div class="ctrl-circle hangup-circle" onclick="VideoCall.endCall()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                </div>
                <span class="ctrl-label">挂断</span>
            </div>

            <div class="ctrl-btn" id="videoCtrlBtn">
                <div class="ctrl-circle" id="btnVideo" onclick="VideoCall.toggleVideo()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconVideoOn">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconVideoOff" style="display:none">
                        <line x1="1" y1="1" x2="23" y2="23"/>
                        <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34m-7.72-2.06A4 4 0 1 1 7.93 9"/>
                    </svg>
                </div>
                <span class="ctrl-label" id="lblVideo">关摄像头</span>
            </div>
        </div>

        <!-- 本地视频（小窗） -->
        <div style="position:absolute;top:56px;right:16px;width:96px;height:130px;border-radius:12px;overflow:hidden;background:#1a1a2a;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,0.5);">
            <video id="localVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;display:none;"></video>
            <div id="localVideoPlaceholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:24px;">👤</div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="js/video-call.js?v=1.0.4"></script>
</body>
</html>
