<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - 童养园</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .video-player-container {
            width: 100%;
            background: black;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        video {
            width: 100%;
            max-height: 40vh;
            display: block;
        }
        .course-content {
            padding: 20px;
        }
        .video-list {
            margin-top: 20px;
        }
        .video-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            background: white;
        }
        .video-item.active {
            background: #f0f7ff;
        }
        .video-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ddd;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .video-item.completed .video-status {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }
        .video-item.locked .video-status {
            background: #eee;
            border-color: #eee;
        }
        .video-info {
            flex: 1;
        }
        .video-title {
            font-size: 15px;
            color: #333;
            margin-bottom: 4px;
        }
        .video-duration {
            font-size: 12px;
            color: #999;
        }
        .quiz-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .quiz-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="video-player-container">
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <div class="course-content">
        <h2 id="packageTitle" style="margin-bottom: 10px;">加载中...</h2>
        <p id="packageDesc" style="color: #666; font-size: 14px; margin-bottom: 20px;"></p>
        
        <div class="progress-bar-container" style="background: #eee; height: 6px; border-radius: 3px; overflow: hidden;">
            <div id="totalProgress" style="width: 0%; height: 100%; background: #4caf50; transition: width 0.3s;"></div>
        </div>
        <div style="text-align: right; font-size: 12px; color: #999; margin-top: 4px;">
            已学习 <span id="progressText">0%</span>
        </div>

        <div class="video-list" id="videoList">
            <!-- 视频列表 -->
        </div>
    </div>

    <!-- 课后验证弹窗 -->
    <div class="quiz-modal" id="quizModal">
        <div class="quiz-content">
            <h3>📝 课后小测</h3>
            <p id="quizQuestion" style="margin: 15px 0; font-size: 16px;"></p>
            <div id="quizOptions" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- 选项 -->
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/course.js"></script>
</body>
</html>
